<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>游戏编辑器 - King of Survive</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; background: #1a1a2e; color: #fff; }
  /* Nav */
  .nav { display: flex; background: #0d0d1a; border-bottom: 2px solid #ffd700; padding: 0 20px; }
  .nav-btn { padding: 12px 24px; background: none; border: none; color: #888; cursor: pointer; font-size: 15px; font-weight: bold; border-bottom: 3px solid transparent; }
  .nav-btn:hover { color: #fff; background: #1a1a3e; }
  .nav-btn.active { color: #ffd700; border-bottom-color: #ffd700; }
  .nav-title { padding: 12px 20px; color: #ffd700; font-size: 16px; font-weight: bold; margin-right: auto; }
  .nav-save { padding: 8px 16px; margin: 6px 0; background: #2a6a2a; border: 1px solid #4a4; color: #fff; cursor: pointer; border-radius: 4px; font-size: 13px; }
  .nav-save:hover { background: #3a8a3a; }
  /* Tab content */
  .tab-content { display: none; padding: 20px; }
  .tab-content.active { display: block; }
  /* Common */
  .toolbar { margin-bottom: 15px; display: flex; gap: 8px; flex-wrap: wrap; }
  .toolbar button { padding: 6px 14px; background: #2a2a4e; border: 1px solid #555; color: #fff; cursor: pointer; border-radius: 4px; font-size: 13px; }
  .toolbar button:hover { background: #3a3a6e; }
  table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
  th, td { padding: 5px 6px; border: 1px solid #333; text-align: left; font-size: 12px; }
  th { background: #2a2a4e; color: #ffd700; position: sticky; top: 0; z-index: 1; }
  td input, td select { background: #111; color: #fff; border: 1px solid #444; padding: 3px; width: 100%; font-size: 11px; }
  td input[type="color"] { width: 30px; height: 22px; padding: 0; }
  .delete-btn { background: #a33; color: #fff; border: none; padding: 3px 8px; cursor: pointer; border-radius: 3px; font-size: 11px; }
  .delete-btn:hover { background: #c44; }
  /* Toast */
  .toast { position: fixed; top: 20px; right: 20px; padding: 12px 20px; border-radius: 6px; color: #fff; font-size: 14px; z-index: 9999; display: none; }
  .toast.success { background: #2a6a2a; border: 1px solid #4a4; }
  .toast.error { background: #6a2a2a; border: 1px solid #a44; }
  /* Panels */
  .panel { background: #111; padding: 15px; border-radius: 8px; border: 1px solid #333; margin-bottom: 15px; }
  .panel h3 { color: #ffd700; margin-bottom: 10px; font-size: 14px; }
  .form-row { display: flex; gap: 10px; margin-bottom: 8px; align-items: center; flex-wrap: wrap; }
  .form-row label { color: #aaa; font-size: 12px; min-width: 70px; }
  .form-row input, .form-row select { background: #222; color: #fff; border: 1px solid #555; padding: 4px 6px; font-size: 12px; }
  .form-row input[type="number"] { width: 80px; }
  .form-row input[type="text"] { width: 150px; }
  /* Map canvas */
  #map-canvas { border: 1px solid #555; cursor: crosshair; display: block; margin-bottom: 10px; }
  .map-layout { display: flex; gap: 15px; }
  .map-sidebar { width: 350px; flex-shrink: 0; }
  .map-main { flex: 1; }
  .camp-item { padding: 6px 8px; background: #1a1a3e; margin-bottom: 4px; border-radius: 4px; cursor: pointer; font-size: 12px; border: 1px solid transparent; }
  .camp-item:hover, .camp-item.selected { border-color: #ffd700; }
  .camp-monster-row { display: flex; gap: 5px; margin-bottom: 4px; align-items: center; }
  .camp-monster-row select, .camp-monster-row input { background: #222; color: #fff; border: 1px solid #555; padding: 3px; font-size: 11px; }
  /* Wave comp sliders */
  .wave-row { display: flex; gap: 8px; align-items: center; margin-bottom: 4px; font-size: 12px; }
  .wave-row label { width: 60px; color: #aaa; }
  .wave-row input[type="range"] { flex: 1; }
  .wave-row .val { width: 35px; color: #ffd700; text-align: right; }
</style>
</head>
<body>
<div class="nav">
  <span class="nav-title">King of Survive 编辑器</span>
  <button class="nav-btn active" onclick="switchTab('skills')">技能</button>
  <button class="nav-btn" onclick="switchTab('monsters')">怪物</button>
  <button class="nav-btn" onclick="switchTab('maps')">地图</button>
  <button class="nav-btn" onclick="switchTab('xpcurve')">经验曲线</button>
  <button class="nav-save" onclick="saveCurrentTab()">💾 保存 (Ctrl+S)</button>
</div>
<div id="toast" class="toast"></div>

<!-- ====== SKILLS TAB ====== -->
<div id="tab-skills" class="tab-content active">
  <div class="toolbar">
    <button onclick="addSkill()">+ 添加技能</button>
    <button onclick="undo()">撤销</button>
    <button onclick="redo()">重做</button>
  </div>
  <table>
    <thead><tr>
      <th>ID</th><th>名称</th><th>类型</th><th>伤害类型</th><th>基础伤害</th>
      <th>缩放属性</th><th>缩放系数</th><th>冷却</th><th>最大等级</th>
      <th>图标</th><th>颜色</th><th>描述</th><th>levelScaling</th><th>操作</th>
    </tr></thead>
    <tbody id="skill-list"></tbody>
  </table>

  <div class="panel">
    <h3>进化组合</h3>
    <div class="toolbar">
      <button onclick="addEvolution()">+ 添加进化</button>
    </div>
    <table>
      <thead><tr>
        <th>ID</th><th>名称</th><th>技能A</th><th>技能B</th><th>效果 (JSON)</th><th>图标</th><th>颜色</th><th>操作</th>
      </tr></thead>
      <tbody id="evo-list"></tbody>
    </table>
  </div>
</div>

<!-- ====== MONSTERS TAB ====== -->
<div id="tab-monsters" class="tab-content">
  <div class="toolbar">
    <button onclick="addMonster()">+ 添加怪物</button>
  </div>
  <table>
    <thead><tr>
      <th>类型ID</th><th>名称</th><th>阵营</th><th>HP</th><th>ATK</th><th>速度</th>
      <th>XP</th><th>半径</th><th>颜色</th>
      <th>HP缩放</th><th>ATK缩放</th><th>速缩放</th><th>XP缩放</th>
      <th>特殊属性</th><th>操作</th>
    </tr></thead>
    <tbody id="monster-list"></tbody>
  </table>
</div>

<!-- ====== XP CURVE TAB ====== -->
<div id="tab-xpcurve" class="tab-content">
  <div class="panel">
    <h3>等级经验曲线</h3>
    <p style="color:#888;font-size:12px;margin-bottom:10px;">设置每个等级升级所需的经验值。例如：Lv1→Lv2 需要 100 XP，Lv2→Lv3 需要 200 XP。超出最大等级后使用最后一项的值。</p>
    <div class="toolbar">
      <button onclick="addXpLevel()">+ 添加等级</button>
      <button onclick="removeLastXpLevel()">- 删除末尾</button>
    </div>
    <table>
      <thead><tr>
        <th style="width:80px">等级提升</th>
        <th style="width:120px">所需经验 (XP)</th>
        <th style="width:200px">经验条</th>
      </tr></thead>
      <tbody id="xp-list"></tbody>
    </table>
  </div>
</div>

<!-- ====== MAPS TAB ====== -->
<div id="tab-maps" class="tab-content">
  <div class="toolbar">
    <label style="color:#aaa;font-size:13px;line-height:30px;">选择地图：</label>
    <select id="map-selector" onchange="loadSelectedMap()" style="background:#222;color:#fff;border:1px solid #555;padding:4px;font-size:13px;"></select>
    <button onclick="createNewMap()">+ 新建地图</button>
  </div>
  <div class="map-layout">
    <div class="map-main">
      <canvas id="map-canvas" width="600" height="600"></canvas>
      <div class="form-row">
        <label>地图名称:</label><input type="text" id="map-name" onchange="currentMap.name=this.value">
        <label>宽:</label><input type="number" id="map-width" onchange="currentMap.width=+this.value;renderMapCanvas()">
        <label>高:</label><input type="number" id="map-height" onchange="currentMap.height=+this.value;renderMapCanvas()">
      </div>
    </div>
    <div class="map-sidebar">
      <!-- Spawn Camps -->
      <div class="panel">
        <h3>刷怪营地 <button onclick="addCamp()" style="float:right;font-size:11px;padding:2px 8px;background:#2a4a2a;color:#fff;border:1px solid #4a4;cursor:pointer;border-radius:3px;">+ 添加</button></h3>
        <div id="camp-list"></div>
      </div>
      <!-- Camp detail -->
      <div class="panel" id="camp-detail" style="display:none;">
        <h3>营地详情</h3>
        <div class="form-row"><label>ID:</label><input type="text" id="camp-id" onchange="updateCampField('id',this.value)"></div>
        <div class="form-row"><label>名称:</label><input type="text" id="camp-name" onchange="updateCampField('name',this.value)"></div>
        <div class="form-row"><label>X:</label><input type="number" id="camp-x" onchange="updateCampField('x',+this.value);renderMapCanvas()"></div>
        <div class="form-row"><label>Y:</label><input type="number" id="camp-y" onchange="updateCampField('y',+this.value);renderMapCanvas()"></div>
        <div class="form-row"><label>半径:</label><input type="number" id="camp-radius" onchange="updateCampField('radius',+this.value);renderMapCanvas()"></div>
        <div class="form-row"><label>首刷时间:</label><input type="number" id="camp-first" onchange="updateCampField('firstSpawnTime',+this.value)">s</div>
        <div class="form-row"><label>重生冷却:</label><input type="number" id="camp-respawn" onchange="updateCampField('respawnCooldown',+this.value)">s</div>
        <div class="form-row"><label>最大次数:</label><input type="number" id="camp-maxresp" onchange="updateCampField('maxRespawns',+this.value)"></div>
        <h3 style="margin-top:10px;">怪物组合 <button onclick="addCampMonster()" style="float:right;font-size:11px;padding:2px 8px;background:#2a4a2a;color:#fff;border:1px solid #4a4;cursor:pointer;border-radius:3px;">+</button></h3>
        <div id="camp-monsters"></div>
        <button class="delete-btn" style="margin-top:8px;" onclick="deleteCamp()">删除此营地</button>
      </div>
      <!-- Wave composition -->
      <div class="panel">
        <h3>波次配置</h3>
        <div class="form-row"><label>Boss间隔:</label><input type="number" id="wave-boss-every" value="5" style="width:50px" onchange="updateWaveConfig('bossEvery',+this.value)">波</div>
        <div class="form-row"><label>基础数量:</label><input type="number" id="wave-base-count" value="8" style="width:50px" onchange="updateWaveConfig('baseCount',+this.value)"></div>
        <div id="wave-comp"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ====== STATE ======
var skillsData = [], evoData = [], monstersRaw = {}, monsterTypes = [], xpCurveData = [];
var currentTab = 'skills';
var undoStack = [], redoStack = [];
var currentMap = null, selectedCampIdx = -1, mapList = [];
var dragCamp = -1, mapScale = 1;

// ====== NAV ======
function switchTab(tab) {
  currentTab = tab;
  var btns = document.querySelectorAll('.nav-btn');
  for (var i = 0; i < btns.length; i++) btns[i].className = 'nav-btn';
  document.querySelector('.nav-btn[onclick*="' + tab + '"]').className = 'nav-btn active';
  var tabs = document.querySelectorAll('.tab-content');
  for (var i = 0; i < tabs.length; i++) tabs[i].className = 'tab-content';
  document.getElementById('tab-' + tab).className = 'tab-content active';
  if (tab === 'maps' && !currentMap) loadMapList();
}

function toast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + (type || 'success');
  el.style.display = 'block';
  setTimeout(function() { el.style.display = 'none'; }, 2500);
}

// ====== UNDO/REDO ======
function saveState() {
  undoStack.push(JSON.stringify({ skills: skillsData, evo: evoData }));
  redoStack = [];
  if (undoStack.length > 50) undoStack.shift();
}
function undo() {
  if (!undoStack.length) return;
  redoStack.push(JSON.stringify({ skills: skillsData, evo: evoData }));
  var s = JSON.parse(undoStack.pop());
  skillsData = s.skills; evoData = s.evo;
  renderSkills(); renderEvolutions();
}
function redo() {
  if (!redoStack.length) return;
  undoStack.push(JSON.stringify({ skills: skillsData, evo: evoData }));
  var s = JSON.parse(redoStack.pop());
  skillsData = s.skills; evoData = s.evo;
  renderSkills(); renderEvolutions();
}

document.addEventListener('keydown', function(e) {
  if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); }
  if (e.ctrlKey && e.key === 'y') { e.preventDefault(); redo(); }
  if (e.ctrlKey && e.key === 's') { e.preventDefault(); saveCurrentTab(); }
});

// ====== SAVE ======
function saveCurrentTab() {
  if (currentTab === 'skills') {
    // Save skills + evolutions
    fetch('/api/editor/skills', { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ skills: skillsData }) })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d.error) { toast(d.error, 'error'); return; }
        // Also save evolutions
        return fetch('/api/editor/evolutions', { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ evolutions: evoData }) });
      })
      .then(function(r) { if (r) return r.json(); })
      .then(function(d) {
        if (d && d.error) { toast(d.error, 'error'); return; }
        toast('技能和进化已保存');
      })
      .catch(function(e) { toast('保存失败: ' + e.message, 'error'); });
  } else if (currentTab === 'monsters') {
    // Rebuild monsters JSON from monsterTypes array
    var obj = {};
    for (var i = 0; i < monsterTypes.length; i++) {
      var m = monsterTypes[i];
      obj[m._typeId] = {
        name: m.name, baseHP: m.baseHP, baseATK: m.baseATK, baseSpeed: m.baseSpeed,
        baseXP: m.baseXP, radius: m.radius, color: m.color,
        levelScaling: m.levelScaling || {}
      };
      if (m.special && Object.keys(m.special).length > 0) obj[m._typeId].special = m.special;
    }
    // Preserve levelDiffCorrection
    if (monstersRaw.levelDiffCorrection) obj.levelDiffCorrection = monstersRaw.levelDiffCorrection;
    fetch('/api/editor/monsters', { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(obj) })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d.error) { toast(d.error, 'error'); return; }
        toast('怪物数据已保存');
      })
      .catch(function(e) { toast('保存失败: ' + e.message, 'error'); });
  } else if (currentTab === 'xpcurve') {
    var xpBody = { description: '每个等级升级所需经验值。index 0 = Lv1→Lv2 所需XP，以此类推。超出数组范围的等级使用最后一项的值。', xpPerLevel: xpCurveData };
    fetch('/api/editor/xp-curve', { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(xpBody) })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d.error) { toast(d.error, 'error'); return; }
        toast('经验曲线已保存');
      })
      .catch(function(e) { toast('保存失败: ' + e.message, 'error'); });
  } else if (currentTab === 'maps' && currentMap) {
    var mapId = currentMap.id;
    fetch('/api/editor/maps/' + mapId, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(currentMap) })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d.error) { toast(d.error, 'error'); return; }
        toast('地图 ' + mapId + ' 已保存');
      })
      .catch(function(e) { toast('保存失败: ' + e.message, 'error'); });
  }
}

// ====== SKILLS ======
function loadSkills() {
  fetch('/api/editor/skills')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      skillsData = data.skills || [];
      renderSkills();
    })
    .catch(function(e) { toast('加载技能失败', 'error'); });
}

function renderSkills() {
  var tbody = document.getElementById('skill-list');
  tbody.innerHTML = '';
  for (var i = 0; i < skillsData.length; i++) {
    var s = skillsData[i];
    var tr = document.createElement('tr');
    tr.innerHTML =
      '<td><input value="' + esc(s.id) + '" onchange="saveState();skillsData[' + i + '].id=this.value"></td>' +
      '<td><input value="' + esc(s.name) + '" onchange="saveState();skillsData[' + i + '].name=this.value"></td>' +
      '<td>' + selOpts(['projectile','aoe','buff','summon','passive'], s.type, 'saveState();skillsData[' + i + '].type=this.value') + '</td>' +
      '<td>' + selOpts(['physical','magic','none'], s.damageType, 'saveState();skillsData[' + i + '].damageType=this.value') + '</td>' +
      '<td><input type="number" value="' + (s.baseDamage||0) + '" onchange="saveState();skillsData[' + i + '].baseDamage=+this.value"></td>' +
      '<td>' + selOpts(['STR','INT','AGI','STA',''], s.scalingAttribute||'', 'saveState();skillsData[' + i + '].scalingAttribute=this.value') + '</td>' +
      '<td><input type="number" step="0.01" value="' + (s.scalingRatio||0) + '" onchange="saveState();skillsData[' + i + '].scalingRatio=+this.value" style="width:60px"></td>' +
      '<td><input type="number" step="0.1" value="' + (s.cooldown||0) + '" onchange="saveState();skillsData[' + i + '].cooldown=+this.value" style="width:50px"></td>' +
      '<td><input type="number" value="' + (s.maxLevel||5) + '" onchange="saveState();skillsData[' + i + '].maxLevel=+this.value" style="width:40px"></td>' +
      '<td><input value="' + esc(s.icon||'') + '" style="width:30px" onchange="saveState();skillsData[' + i + '].icon=this.value"></td>' +
      '<td><input type="color" value="' + (s.color||'#fff') + '" onchange="saveState();skillsData[' + i + '].color=this.value"></td>' +
      '<td><input value="' + esc(s.description||'') + '" onchange="saveState();skillsData[' + i + '].description=this.value"></td>' +
      '<td><input value=\'' + esc(JSON.stringify(s.levelScaling||{})) + '\' onchange="saveState();try{skillsData[' + i + '].levelScaling=JSON.parse(this.value);this.style.borderColor=\'#444\'}catch(e){this.style.borderColor=\'red\'}" style="font-size:10px"></td>' +
      '<td><button class="delete-btn" onclick="deleteSkill(' + i + ')">删除</button></td>';
    tbody.appendChild(tr);
  }
}

function addSkill() {
  saveState();
  skillsData.push({ id:'new_skill', name:'新技能', type:'projectile', damageType:'physical', baseDamage:10, scalingAttribute:'STR', scalingRatio:1.0, cooldown:1.0, maxLevel:5, icon:'?', color:'#ffffff', description:'', levelScaling:{damage:5} });
  renderSkills();
}

function deleteSkill(i) {
  if (!confirm('删除 "' + skillsData[i].name + '"？')) return;
  saveState(); skillsData.splice(i, 1); renderSkills();
}

// ====== EVOLUTIONS ======
function loadEvolutions() {
  fetch('/api/editor/evolutions')
    .then(function(r) { return r.json(); })
    .then(function(data) { evoData = data.evolutions || []; renderEvolutions(); })
    .catch(function() { toast('加载进化失败', 'error'); });
}

function renderEvolutions() {
  var tbody = document.getElementById('evo-list');
  tbody.innerHTML = '';
  for (var i = 0; i < evoData.length; i++) {
    var e = evoData[i];
    var from = e.evolveFrom || [];
    var tr = document.createElement('tr');
    tr.innerHTML =
      '<td><input value="' + esc(e.id) + '" onchange="saveState();evoData[' + i + '].id=this.value"></td>' +
      '<td><input value="' + esc(e.name) + '" onchange="saveState();evoData[' + i + '].name=this.value"></td>' +
      '<td>' + skillSelectHtml(from[0], 'saveState();evoData[' + i + '].evolveFrom[0]=this.value') + '</td>' +
      '<td>' + skillSelectHtml(from[1], 'saveState();evoData[' + i + '].evolveFrom[1]=this.value') + '</td>' +
      '<td><input value=\'' + esc(JSON.stringify(e.bonusEffect||{})) + '\' onchange="saveState();try{evoData[' + i + '].bonusEffect=JSON.parse(this.value);this.style.borderColor=\'#444\'}catch(x){this.style.borderColor=\'red\'}" style="font-size:10px"></td>' +
      '<td><input value="' + esc(e.icon||'') + '" style="width:30px" onchange="saveState();evoData[' + i + '].icon=this.value"></td>' +
      '<td><input type="color" value="' + (e.color||'#fff') + '" onchange="saveState();evoData[' + i + '].color=this.value"></td>' +
      '<td><button class="delete-btn" onclick="deleteEvolution(' + i + ')">删除</button></td>';
    tbody.appendChild(tr);
  }
}

function addEvolution() {
  evoData.push({ id:'new_evo', name:'新进化', evolveFrom:['',''], bonusEffect:{}, icon:'★', color:'#ffffff' });
  renderEvolutions();
}

function deleteEvolution(i) {
  if (!confirm('删除进化 "' + evoData[i].name + '"？')) return;
  evoData.splice(i, 1); renderEvolutions();
}

function skillSelectHtml(selected, onchange) {
  var h = '<select onchange="' + onchange + '"><option value="">--</option>';
  for (var i = 0; i < skillsData.length; i++) {
    var s = skillsData[i];
    h += '<option value="' + s.id + '"' + (s.id === selected ? ' selected' : '') + '>' + s.id + '</option>';
  }
  return h + '</select>';
}

// ====== MONSTERS ======
function loadMonsters() {
  fetch('/api/editor/monsters')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      monstersRaw = data;
      monsterTypes = [];
      var keys = Object.keys(data);
      for (var i = 0; i < keys.length; i++) {
        if (keys[i] === 'levelDiffCorrection') continue;
        var m = JSON.parse(JSON.stringify(data[keys[i]]));
        m._typeId = keys[i];
        monsterTypes.push(m);
      }
      renderMonsters();
    })
    .catch(function(e) { toast('加载怪物失败', 'error'); });
}

function renderMonsters() {
  var tbody = document.getElementById('monster-list');
  tbody.innerHTML = '';
  for (var i = 0; i < monsterTypes.length; i++) {
    var m = monsterTypes[i];
    var ls = m.levelScaling || {};
    var hostile = !m.special || m.special.hostile !== false;
    // Determine hostile from type defaults (matching SpawnSystem logic)
    var greenTypes = ['normal', 'swarm', 'treasure'];
    var isGreen = greenTypes.indexOf(m._typeId) >= 0;
    if (m.special && m.special.hostile !== undefined) isGreen = !m.special.hostile;
    var tr = document.createElement('tr');
    tr.innerHTML =
      '<td><input value="' + esc(m._typeId) + '" onchange="monsterTypes[' + i + ']._typeId=this.value"></td>' +
      '<td><input value="' + esc(m.name) + '" onchange="monsterTypes[' + i + '].name=this.value"></td>' +
      '<td>' + selOpts(['红名(敌对)','绿名(友善)'], isGreen?'绿名(友善)':'红名(敌对)', 'setMonsterHostile(' + i + ',this.value)') + '</td>' +
      '<td><input type="number" value="' + (m.baseHP||0) + '" onchange="monsterTypes[' + i + '].baseHP=+this.value" style="width:50px"></td>' +
      '<td><input type="number" value="' + (m.baseATK||0) + '" onchange="monsterTypes[' + i + '].baseATK=+this.value" style="width:50px"></td>' +
      '<td><input type="number" value="' + (m.baseSpeed||0) + '" onchange="monsterTypes[' + i + '].baseSpeed=+this.value" style="width:50px"></td>' +
      '<td><input type="number" value="' + (m.baseXP||0) + '" onchange="monsterTypes[' + i + '].baseXP=+this.value" style="width:50px"></td>' +
      '<td><input type="number" value="' + (m.radius||10) + '" onchange="monsterTypes[' + i + '].radius=+this.value" style="width:40px"></td>' +
      '<td><input type="color" value="' + (m.color||'#fff') + '" onchange="monsterTypes[' + i + '].color=this.value"></td>' +
      '<td><input type="number" step="0.01" value="' + (ls.hp||0) + '" onchange="ensureLS(' + i + ');monsterTypes[' + i + '].levelScaling.hp=+this.value" style="width:50px"></td>' +
      '<td><input type="number" step="0.01" value="' + (ls.atk||0) + '" onchange="ensureLS(' + i + ');monsterTypes[' + i + '].levelScaling.atk=+this.value" style="width:50px"></td>' +
      '<td><input type="number" step="0.01" value="' + (ls.speed||0) + '" onchange="ensureLS(' + i + ');monsterTypes[' + i + '].levelScaling.speed=+this.value" style="width:50px"></td>' +
      '<td><input type="number" step="0.01" value="' + (ls.xp||0) + '" onchange="ensureLS(' + i + ');monsterTypes[' + i + '].levelScaling.xp=+this.value" style="width:50px"></td>' +
      '<td><input value=\'' + esc(JSON.stringify(m.special||{})) + '\' onchange="try{monsterTypes[' + i + '].special=JSON.parse(this.value);this.style.borderColor=\'#444\'}catch(e){this.style.borderColor=\'red\'}" style="font-size:10px;width:120px"></td>' +
      '<td><button class="delete-btn" onclick="deleteMonster(' + i + ')">删除</button></td>';
    tbody.appendChild(tr);
  }
}

function ensureLS(i) { if (!monsterTypes[i].levelScaling) monsterTypes[i].levelScaling = {}; }

function setMonsterHostile(i, val) {
  if (!monsterTypes[i].special) monsterTypes[i].special = {};
  monsterTypes[i].special.hostile = val.indexOf('绿') < 0;
}

function addMonster() {
  monsterTypes.push({ _typeId:'new_type', name:'新怪物', baseHP:20, baseATK:5, baseSpeed:60, baseXP:15, radius:10, color:'#ff5555', levelScaling:{hp:0.15,atk:0.1,speed:0.02,xp:0.1}, special:{} });
  renderMonsters();
}

function deleteMonster(i) {
  if (!confirm('删除 "' + monsterTypes[i].name + '"？')) return;
  monsterTypes.splice(i, 1); renderMonsters();
}

// ====== MAPS ======
function loadMapList() {
  fetch('/api/editor/maps')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      mapList = data;
      var sel = document.getElementById('map-selector');
      sel.innerHTML = '<option value="">-- 选择地图 --</option>';
      for (var i = 0; i < data.length; i++) {
        var opt = document.createElement('option');
        opt.value = data[i].id;
        opt.textContent = data[i].name + ' (' + data[i].id + ') ' + data[i].width + 'x' + data[i].height;
        sel.appendChild(opt);
      }
    });
}

function loadSelectedMap() {
  var sel = document.getElementById('map-selector');
  if (!sel.value) return;
  fetch('/api/editor/maps/' + sel.value)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      currentMap = data;
      if (!currentMap.spawnCamps) currentMap.spawnCamps = [];
      if (!currentMap.waves) currentMap.waves = {};
      document.getElementById('map-name').value = currentMap.name || '';
      document.getElementById('map-width').value = currentMap.width || 1200;
      document.getElementById('map-height').value = currentMap.height || 1200;
      var w = currentMap.waves || {};
      document.getElementById('wave-boss-every').value = w.bossEvery || 5;
      document.getElementById('wave-base-count').value = w.baseCount || 8;
      selectedCampIdx = -1;
      renderCampList();
      renderWaveComp();
      renderMapCanvas();
    });
}

function createNewMap() {
  var id = prompt('地图 ID (英文小写+下划线):');
  if (!id || !/^[a-z0-9_]+$/.test(id)) { alert('无效 ID'); return; }
  var newMap = { id: id, name: '新地图', width: 1200, height: 1200, shape: 'rect', zones: [], spawnCamps: [], spawnPoints: [], obstacles: [], waves: { bossEvery: 5, baseCount: 8, composition: [] }, trickle: { interval: 1.2 }, ambush: { enabled: true, interval: 20, chance: 0.25 } };
  fetch('/api/editor/maps', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(newMap) })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.error) { toast(d.error, 'error'); return; }
      toast('地图已创建: ' + id);
      loadMapList();
    });
}

// Map Canvas
function renderMapCanvas() {
  var canvas = document.getElementById('map-canvas');
  var ctx = canvas.getContext('2d');
  if (!currentMap) { ctx.clearRect(0, 0, 600, 600); return; }
  var w = currentMap.width || 1200, h = currentMap.height || 1200;
  mapScale = Math.min(580 / w, 580 / h);
  var ox = (600 - w * mapScale) / 2, oy = (600 - h * mapScale) / 2;

  ctx.clearRect(0, 0, 600, 600);
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, 600, 600);

  // Map border
  ctx.strokeStyle = '#555';
  ctx.strokeRect(ox, oy, w * mapScale, h * mapScale);

  // Grid
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 0.5;
  for (var gx = 0; gx <= w; gx += 200) {
    ctx.beginPath(); ctx.moveTo(ox + gx * mapScale, oy); ctx.lineTo(ox + gx * mapScale, oy + h * mapScale); ctx.stroke();
  }
  for (var gy = 0; gy <= h; gy += 200) {
    ctx.beginPath(); ctx.moveTo(ox, oy + gy * mapScale); ctx.lineTo(ox + w * mapScale, oy + gy * mapScale); ctx.stroke();
  }
  ctx.lineWidth = 1;

  // Zones
  var zones = currentMap.zones || [];
  for (var zi = 0; zi < zones.length; zi++) {
    var z = zones[zi];
    var zx = ox + (z.x || 0) * mapScale, zy = oy + (z.y || 0) * mapScale;
    var zw = (z.width || 200) * mapScale, zh = (z.height || 200) * mapScale;
    ctx.globalAlpha = 0.15;
    ctx.fillStyle = z.type === 'safe' ? '#0f0' : (z.type === 'hazard' ? '#f00' : '#88f');
    ctx.fillRect(zx, zy, zw, zh);
    ctx.globalAlpha = 1;
    ctx.strokeStyle = z.type === 'safe' ? '#0f0' : (z.type === 'hazard' ? '#f00' : '#88f');
    ctx.strokeRect(zx, zy, zw, zh);
    ctx.fillStyle = '#fff'; ctx.font = '10px Arial'; ctx.textAlign = 'center';
    ctx.fillText(z.name || z.type, zx + zw / 2, zy + zh / 2);
  }

  // Spawn camps
  var camps = currentMap.spawnCamps || [];
  for (var ci = 0; ci < camps.length; ci++) {
    var c = camps[ci];
    var campX = c.position ? c.position.x : c.x; var campY = c.position ? c.position.y : c.y;
    var cx = ox + (campX || 0) * mapScale, cy = oy + (campY || 0) * mapScale;
    var cr = (c.radius || 60) * mapScale;
    var selected = ci === selectedCampIdx;

    ctx.globalAlpha = 0.2;
    ctx.fillStyle = selected ? '#ffd700' : '#f80';
    ctx.beginPath(); ctx.arc(cx, cy, cr, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
    ctx.strokeStyle = selected ? '#ffd700' : '#f80';
    ctx.lineWidth = selected ? 2 : 1;
    ctx.beginPath(); ctx.arc(cx, cy, cr, 0, Math.PI * 2); ctx.stroke();
    ctx.lineWidth = 1;

    // Label
    ctx.fillStyle = '#fff'; ctx.font = selected ? 'bold 11px Arial' : '10px Arial';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(c.name || c.id || 'camp', cx, cy - 8);

    // Monster summary
    var mons = c.monsters || [];
    var summary = '';
    for (var mi = 0; mi < mons.length; mi++) summary += mons[mi].type + '×' + mons[mi].count + ' ';
    if (summary) {
      ctx.font = '9px Arial'; ctx.fillStyle = '#ffa';
      ctx.fillText(summary.trim(), cx, cy + 8);
    }
  }
}

// Camp list
function renderCampList() {
  var div = document.getElementById('camp-list');
  var camps = currentMap ? currentMap.spawnCamps || [] : [];
  div.innerHTML = '';
  for (var i = 0; i < camps.length; i++) {
    var c = camps[i];
    var el = document.createElement('div');
    el.className = 'camp-item' + (i === selectedCampIdx ? ' selected' : '');
    el.textContent = (c.name || c.id) + ' (' + (c.monsters || []).length + ' types)';
    el.onclick = (function(idx) { return function() { selectCamp(idx); }; })(i);
    div.appendChild(el);
  }
}

function selectCamp(idx) {
  selectedCampIdx = idx;
  renderCampList();
  renderMapCanvas();
  var detail = document.getElementById('camp-detail');
  if (idx < 0 || !currentMap || !currentMap.spawnCamps[idx]) { detail.style.display = 'none'; return; }
  detail.style.display = 'block';
  var c = currentMap.spawnCamps[idx];
  document.getElementById('camp-id').value = c.id || '';
  document.getElementById('camp-name').value = c.name || '';
  document.getElementById('camp-x').value = c.position ? c.position.x : (c.x || 0);
  document.getElementById('camp-y').value = c.position ? c.position.y : (c.y || 0);
  document.getElementById('camp-radius').value = c.radius || 60;
  document.getElementById('camp-first').value = c.firstSpawnTime || 0;
  document.getElementById('camp-respawn').value = c.respawnCooldown || 15;
  document.getElementById('camp-maxresp').value = c.maxRespawns !== undefined ? c.maxRespawns : -1;
  renderCampMonsters();
}

function updateCampField(field, val) {
  if (selectedCampIdx < 0 || !currentMap) return;
  var c = currentMap.spawnCamps[selectedCampIdx];
  if (field === 'x' || field === 'y') {
    if (c.position) { c.position[field] = val; } else { c[field] = val; }
  } else {
    c[field] = val;
  }
  renderCampList();
}

function addCamp() {
  if (!currentMap) return;
  if (!currentMap.spawnCamps) currentMap.spawnCamps = [];
  currentMap.spawnCamps.push({ id: 'camp_' + (currentMap.spawnCamps.length + 1), name: '新营地', position: { x: currentMap.width / 2, y: currentMap.height / 2 }, radius: 60, monsters: [{ type: 'normal', count: 3 }], firstSpawnTime: 5, respawnCooldown: 15, maxRespawns: -1 });
  selectedCampIdx = currentMap.spawnCamps.length - 1;
  renderCampList(); selectCamp(selectedCampIdx); renderMapCanvas();
}

function deleteCamp() {
  if (selectedCampIdx < 0 || !currentMap) return;
  if (!confirm('删除此营地？')) return;
  currentMap.spawnCamps.splice(selectedCampIdx, 1);
  selectedCampIdx = -1;
  document.getElementById('camp-detail').style.display = 'none';
  renderCampList(); renderMapCanvas();
}

// Camp monsters
function renderCampMonsters() {
  var div = document.getElementById('camp-monsters');
  div.innerHTML = '';
  if (selectedCampIdx < 0 || !currentMap) return;
  var mons = currentMap.spawnCamps[selectedCampIdx].monsters || [];
  for (var i = 0; i < mons.length; i++) {
    var row = document.createElement('div');
    row.className = 'camp-monster-row';
    row.innerHTML = monsterSelectHtml(mons[i].type, 'updateCampMonster(' + i + ',\'type\',this.value)') +
      '<input type="number" value="' + (mons[i].count || 1) + '" style="width:40px" onchange="updateCampMonster(' + i + ',\'count\',+this.value)">' +
      '<button class="delete-btn" onclick="removeCampMonster(' + i + ')">×</button>';
    div.appendChild(row);
  }
}

function monsterSelectHtml(selected, onchange) {
  var h = '<select onchange="' + onchange + '" style="width:100px">';
  for (var i = 0; i < monsterTypes.length; i++) {
    var t = monsterTypes[i]._typeId;
    h += '<option value="' + t + '"' + (t === selected ? ' selected' : '') + '>' + t + '</option>';
  }
  return h + '</select>';
}

function updateCampMonster(idx, field, val) {
  if (selectedCampIdx < 0) return;
  currentMap.spawnCamps[selectedCampIdx].monsters[idx][field] = val;
}

function addCampMonster() {
  if (selectedCampIdx < 0) return;
  var mons = currentMap.spawnCamps[selectedCampIdx].monsters;
  if (!mons) { currentMap.spawnCamps[selectedCampIdx].monsters = []; mons = currentMap.spawnCamps[selectedCampIdx].monsters; }
  mons.push({ type: 'normal', count: 1 });
  renderCampMonsters();
}

function removeCampMonster(idx) {
  if (selectedCampIdx < 0) return;
  currentMap.spawnCamps[selectedCampIdx].monsters.splice(idx, 1);
  renderCampMonsters();
}

// Camp drag on canvas
var mapCanvas = document.getElementById('map-canvas');
mapCanvas.addEventListener('mousedown', function(e) {
  if (!currentMap) return;
  var rect = mapCanvas.getBoundingClientRect();
  var mx = e.clientX - rect.left, my = e.clientY - rect.top;
  var w = currentMap.width || 1200, h = currentMap.height || 1200;
  var ox = (600 - w * mapScale) / 2, oy = (600 - h * mapScale) / 2;
  var camps = currentMap.spawnCamps || [];
  for (var i = 0; i < camps.length; i++) {
    var dcx = camps[i].position ? camps[i].position.x : camps[i].x;
    var dcy = camps[i].position ? camps[i].position.y : camps[i].y;
    var cx = ox + (dcx || 0) * mapScale, cy = oy + (dcy || 0) * mapScale;
    if (Math.sqrt((mx - cx) * (mx - cx) + (my - cy) * (my - cy)) < 15) {
      dragCamp = i;
      selectCamp(i);
      return;
    }
  }
});

mapCanvas.addEventListener('mousemove', function(e) {
  if (dragCamp < 0 || !currentMap) return;
  var rect = mapCanvas.getBoundingClientRect();
  var mx = e.clientX - rect.left, my = e.clientY - rect.top;
  var w = currentMap.width || 1200, h = currentMap.height || 1200;
  var ox = (600 - w * mapScale) / 2, oy = (600 - h * mapScale) / 2;
  var newX = Math.round((mx - ox) / mapScale);
  var newY = Math.round((my - oy) / mapScale);
  newX = Math.max(0, Math.min(w, newX));
  newY = Math.max(0, Math.min(h, newY));
  var dc = currentMap.spawnCamps[dragCamp];
  if (dc.position) { dc.position.x = newX; dc.position.y = newY; }
  else { dc.x = newX; dc.y = newY; }
  document.getElementById('camp-x').value = newX;
  document.getElementById('camp-y').value = newY;
  renderMapCanvas();
});

mapCanvas.addEventListener('mouseup', function() { dragCamp = -1; });

// Wave composition
function renderWaveComp() {
  var div = document.getElementById('wave-comp');
  if (!currentMap || !currentMap.waves) { div.innerHTML = ''; return; }
  var comp = currentMap.waves.composition || [];
  div.innerHTML = '<p style="color:#888;font-size:11px;margin-bottom:5px">每个波次阶段的怪物类型概率配置</p>';
  if (comp.length === 0) {
    div.innerHTML += '<p style="color:#666;font-size:11px">无配置。会使用默认概率。</p>';
  }
  for (var i = 0; i < comp.length; i++) {
    var c = comp[i];
    var sec = document.createElement('div');
    sec.style.cssText = 'border:1px solid #333;padding:6px;margin-bottom:5px;border-radius:4px;';
    var h = '<div style="font-size:11px;color:#ffd700;margin-bottom:4px">波 ' + (c.wave || '?') + '+ <input type="number" value="' + (c.wave||1) + '" style="width:40px;background:#222;color:#fff;border:1px solid #555;padding:2px;font-size:11px" onchange="currentMap.waves.composition[' + i + '].wave=+this.value;renderWaveComp()"></div>';
    var types = c.types || {};
    var tkeys = Object.keys(types);
    for (var t = 0; t < tkeys.length; t++) {
      var pct = Math.round((types[tkeys[t]] || 0) * 100);
      h += '<div class="wave-row"><label>' + tkeys[t] + '</label><span class="val">' + pct + '%</span></div>';
    }
    sec.innerHTML = h;
    div.appendChild(sec);
  }
}

function updateWaveConfig(field, val) {
  if (!currentMap) return;
  if (!currentMap.waves) currentMap.waves = {};
  currentMap.waves[field] = val;
}

// ====== XP CURVE ======
function loadXpCurve() {
  fetch('/api/editor/xp-curve')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      xpCurveData = data.xpPerLevel || [];
      renderXpCurve();
    })
    .catch(function() { toast('加载经验曲线失败', 'error'); });
}

function renderXpCurve() {
  var tbody = document.getElementById('xp-list');
  tbody.innerHTML = '';
  var maxXp = 0;
  for (var i = 0; i < xpCurveData.length; i++) {
    if (xpCurveData[i] > maxXp) maxXp = xpCurveData[i];
  }
  for (var i = 0; i < xpCurveData.length; i++) {
    var tr = document.createElement('tr');
    var barWidth = maxXp > 0 ? Math.round((xpCurveData[i] / maxXp) * 180) : 0;
    tr.innerHTML =
      '<td style="color:#ffd700;font-weight:bold">Lv' + (i + 1) + ' → Lv' + (i + 2) + '</td>' +
      '<td><input type="number" value="' + xpCurveData[i] + '" onchange="xpCurveData[' + i + ']=+this.value;renderXpCurve()" style="width:100px"></td>' +
      '<td><div style="background:#ffd700;height:16px;width:' + barWidth + 'px;border-radius:3px;display:inline-block"></div> <span style="color:#888;font-size:11px">' + xpCurveData[i] + '</span></td>';
    tbody.appendChild(tr);
  }
}

function addXpLevel() {
  var last = xpCurveData.length > 0 ? xpCurveData[xpCurveData.length - 1] : 100;
  xpCurveData.push(Math.round(last * 1.3));
  renderXpCurve();
}

function removeLastXpLevel() {
  if (xpCurveData.length <= 1) return;
  xpCurveData.pop();
  renderXpCurve();
}

// ====== HELPERS ======
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;'); }

function selOpts(options, selected, onchange) {
  var h = '<select onchange="' + onchange + '">';
  for (var i = 0; i < options.length; i++) {
    h += '<option' + (options[i] === selected ? ' selected' : '') + '>' + options[i] + '</option>';
  }
  return h + '</select>';
}

// ====== INIT ======
loadSkills();
loadEvolutions();
loadMonsters();
loadXpCurve();
</script>
