<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>游戏编辑器 - King of Survive</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; background: #1a1a2e; color: #fff; }
  /* Nav */
  .nav { display: flex; background: #0d0d1a; border-bottom: 2px solid #ffd700; padding: 0 20px; }
  .nav-btn { padding: 12px 24px; background: none; border: none; color: #888; cursor: pointer; font-size: 15px; font-weight: bold; border-bottom: 3px solid transparent; }
  .nav-btn:hover { color: #fff; background: #1a1a3e; }
  .nav-btn.active { color: #ffd700; border-bottom-color: #ffd700; }
  .nav-title { padding: 12px 20px; color: #ffd700; font-size: 16px; font-weight: bold; margin-right: auto; }
  .nav-save { padding: 8px 16px; margin: 6px 0; background: #2a6a2a; border: 1px solid #4a4; color: #fff; cursor: pointer; border-radius: 4px; font-size: 13px; }
  .nav-save:hover { background: #3a8a3a; }
  /* Tab content */
  .tab-content { display: none; padding: 20px; }
  .tab-content.active { display: block; }
  /* Common */
  .toolbar { margin-bottom: 15px; display: flex; gap: 8px; flex-wrap: wrap; }
  .toolbar button { padding: 6px 14px; background: #2a2a4e; border: 1px solid #555; color: #fff; cursor: pointer; border-radius: 4px; font-size: 13px; }
  .toolbar button:hover { background: #3a3a6e; }
  table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
  th, td { padding: 5px 6px; border: 1px solid #333; text-align: left; font-size: 12px; }
  th { background: #2a2a4e; color: #ffd700; position: sticky; top: 0; z-index: 1; }
  td input, td select { background: #111; color: #fff; border: 1px solid #444; padding: 3px; width: 100%; font-size: 11px; }
  td input[type="color"] { width: 30px; height: 22px; padding: 0; }
  .delete-btn { background: #a33; color: #fff; border: none; padding: 3px 8px; cursor: pointer; border-radius: 3px; font-size: 11px; }
  .delete-btn:hover { background: #c44; }
  /* Toast */
  .toast { position: fixed; top: 20px; right: 20px; padding: 12px 20px; border-radius: 6px; color: #fff; font-size: 14px; z-index: 9999; display: none; }
  .toast.success { background: #2a6a2a; border: 1px solid #4a4; }
  .toast.error { background: #6a2a2a; border: 1px solid #a44; }
  /* Panels */
  .panel { background: #111; padding: 15px; border-radius: 8px; border: 1px solid #333; margin-bottom: 15px; }
  .panel h3 { color: #ffd700; margin-bottom: 10px; font-size: 14px; }
  .form-row { display: flex; gap: 10px; margin-bottom: 8px; align-items: center; flex-wrap: wrap; }
  .form-row label { color: #aaa; font-size: 12px; min-width: 70px; }
  .form-row input, .form-row select { background: #222; color: #fff; border: 1px solid #555; padding: 4px 6px; font-size: 12px; }
  .form-row input[type="number"] { width: 80px; }
  .form-row input[type="text"] { width: 150px; }
  /* Map canvas */
  #map-canvas { border: 1px solid #555; cursor: crosshair; display: block; margin-bottom: 10px; }
  .map-layout { display: flex; gap: 15px; }
  .map-sidebar { width: 350px; flex-shrink: 0; max-height: calc(100vh - 100px); overflow-y: auto; }
  .map-main { flex: 1; }
  .camp-item { padding: 6px 8px; background: #1a1a3e; margin-bottom: 4px; border-radius: 4px; cursor: pointer; font-size: 12px; border: 1px solid transparent; }
  .camp-item:hover, .camp-item.selected { border-color: #ffd700; }
  .camp-monster-row { display: flex; gap: 5px; margin-bottom: 4px; align-items: center; }
  .camp-monster-row select, .camp-monster-row input { background: #222; color: #fff; border: 1px solid #555; padding: 3px; font-size: 11px; }
  /* Wave comp sliders */
  .wave-row { display: flex; gap: 8px; align-items: center; margin-bottom: 4px; font-size: 12px; }
  .wave-row label { width: 60px; color: #aaa; }
  .wave-row input[type="range"] { flex: 1; }
  .wave-row .val { width: 35px; color: #ffd700; text-align: right; }
  /* Skill cards */
  .skill-card { background: #111; border: 1px solid #333; border-radius: 8px; margin-bottom: 12px; overflow: hidden; }
  .skill-header { display: flex; align-items: center; gap: 10px; padding: 10px 14px; cursor: pointer; user-select: none; background: #1a1a3e; border-bottom: 1px solid #333; }
  .skill-header:hover { background: #222a4e; }
  .skill-header .skill-icon { font-size: 20px; }
  .skill-header .skill-name { font-size: 14px; font-weight: bold; color: #fff; }
  .skill-header .skill-type { font-size: 11px; color: #aaa; background: #2a2a4e; padding: 2px 8px; border-radius: 10px; }
  .skill-header .skill-color-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid #555; }
  .skill-header .expand-arrow { margin-left: auto; color: #888; font-size: 14px; transition: transform 0.2s; }
  .skill-header .expand-arrow.open { transform: rotate(90deg); }
  .skill-body { display: none; padding: 12px 14px; }
  .skill-body.open { display: block; }
  .skill-meta { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; align-items: center; }
  .skill-meta label { color: #aaa; font-size: 11px; }
  .skill-meta input, .skill-meta select { background: #222; color: #fff; border: 1px solid #555; padding: 3px 5px; font-size: 11px; }
  .skill-meta input[type="text"] { width: 100px; }
  .skill-meta input[type="color"] { width: 30px; height: 22px; padding: 0; }
  /* Level table */
  .level-table { width: 100%; border-collapse: collapse; font-size: 11px; }
  .level-table th { background: #2a2a4e; color: #ffd700; padding: 4px 5px; font-size: 11px; border: 1px solid #333; }
  .level-table td { padding: 3px 4px; border: 1px solid #333; }
  .level-table td input { background: #111; color: #fff; border: 1px solid #444; padding: 2px 4px; width: 100%; font-size: 11px; }
  .level-table tr:nth-child(even) { background: #0d0d1a; }
  .level-table tr:nth-child(5) td { border-bottom: 2px solid #ffd700; }
  /* Class card */
  .class-card { background: #111; border: 1px solid #333; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
  .class-card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .class-card-header .class-icon { font-size: 28px; }
  .class-card-header .class-name { font-size: 18px; font-weight: bold; }
  .class-section { margin-bottom: 14px; }
  .class-section h4 { color: #ffd700; font-size: 13px; margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 4px; }
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 6px; }
  .stat-grid .form-row { margin-bottom: 0; }
  /* Skill checkbox */
  .skill-checkbox-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 6px; }
  .skill-checkbox { display: flex; align-items: center; gap: 6px; padding: 5px 8px; background: #1a1a3e; border-radius: 4px; font-size: 12px; cursor: pointer; border: 1px solid #333; }
  .skill-checkbox:hover { border-color: #555; }
  .skill-checkbox.checked { border-color: #ffd700; background: #2a2a3e; }
  .skill-checkbox input[type="checkbox"] { accent-color: #ffd700; }
  .skill-checkbox .cb-icon { font-size: 14px; }
  .skill-checkbox .cb-name { color: #fff; }
  .skill-checkbox .cb-type { color: #888; font-size: 10px; }
  /* Attack preview */
  .attack-preview { display: inline-block; margin-top: 8px; }
  .attack-preview canvas { border: 1px solid #333; border-radius: 4px; background: #0a0a1a; }
  /* Full preview modal */
  .fp-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9000; display: none; align-items: center; justify-content: center; }
  .fp-overlay.open { display: flex; }
  .fp-box { background: #111; border: 2px solid #ffd700; border-radius: 12px; padding: 20px; position: relative; }
  .fp-close { position: absolute; top: 8px; right: 12px; background: #a33; border: none; color: #fff; font-size: 16px; cursor: pointer; padding: 4px 10px; border-radius: 4px; }
  .fp-title { color: #ffd700; font-size: 16px; font-weight: bold; margin-bottom: 10px; }
  .fp-info { display: flex; gap: 20px; margin-top: 10px; }
  .fp-info-col { flex: 1; color: #aaa; font-size: 12px; }
  .fp-info-col b { color: #ffd700; }
</style>
</head>
<body>
<div class="nav">
  <span class="nav-title">King of Survive 编辑器</span>
  <button class="nav-btn active" onclick="switchTab('skills')">技能</button>
  <button class="nav-btn" onclick="switchTab('classes')">职业</button>
  <button class="nav-btn" onclick="switchTab('monsters')">怪物</button>
  <button class="nav-btn" onclick="switchTab('maps')">地图</button>
  <button class="nav-save" onclick="saveCurrentTab()">💾 保存 (Ctrl+S)</button>
</div>
<div id="toast" class="toast"></div>

<!-- Full-screen skill preview modal -->
<div id="fp-overlay" class="fp-overlay" onclick="if(event.target===this)closeFullPreview()">
  <div class="fp-box">
    <button class="fp-close" onclick="closeFullPreview()">✕</button>
    <div class="fp-title" id="fp-title">技能效果预览</div>
    <canvas id="fp-canvas" width="700" height="500" style="border:1px solid #444;border-radius:8px;background:#0a0a1a;display:block;"></canvas>
    <div class="fp-info">
      <div class="fp-info-col" id="fp-desc"></div>
      <div class="fp-info-col" id="fp-stats"></div>
    </div>
  </div>
</div>


<!-- ====== SKILLS TAB ====== -->
<div id="tab-skills" class="tab-content active">
  <div class="toolbar">
    <button onclick="addSkill()">+ 添加技能</button>
    <button onclick="undo()">撤销</button>
    <button onclick="redo()">重做</button>
  </div>
  <div id="skill-cards"></div>
</div>

<!-- ====== CLASSES TAB ====== -->
<div id="tab-classes" class="tab-content">
  <div id="class-cards"></div>
</div>

<!-- ====== MONSTERS TAB ====== -->
<div id="tab-monsters" class="tab-content">
  <div class="toolbar">
    <button onclick="addMonster()">+ 添加怪物</button>
  </div>
  <table>
    <thead><tr>
      <th>类型ID</th><th>名称</th><th>阵营</th><th>HP</th><th>ATK</th><th>速度</th>
      <th>XP</th><th>半径</th><th>颜色</th>
      <th>HP缩放</th><th>ATK缩放</th><th>速缩放</th><th>XP缩放</th>
      <th>特殊属性</th><th>操作</th>
    </tr></thead>
    <tbody id="monster-list"></tbody>
  </table>
</div>

<!-- ====== MAPS TAB ====== -->
<div id="tab-maps" class="tab-content">
  <div class="toolbar">
    <label style="color:#aaa;font-size:13px;line-height:30px;">选择地图：</label>
    <select id="map-selector" onchange="loadSelectedMap()" style="background:#222;color:#fff;border:1px solid #555;padding:4px;font-size:13px;"></select>
    <button onclick="createNewMap()">+ 新建地图</button>
  </div>
  <div class="map-layout">
    <div class="map-main">
      <canvas id="map-canvas" width="600" height="600"></canvas>
      <div class="form-row">
        <label>地图名称:</label><input type="text" id="map-name" onchange="currentMap.name=this.value">
        <label>宽:</label><input type="number" id="map-width" onchange="currentMap.width=+this.value;renderMapCanvas()">
        <label>高:</label><input type="number" id="map-height" onchange="currentMap.height=+this.value;renderMapCanvas()">
      </div>
    </div>
    <div class="map-sidebar">
      <!-- Spawn Camps -->
      <div class="panel">
        <h3>刷怪营地 <button onclick="addCamp()" style="float:right;font-size:11px;padding:2px 8px;background:#2a4a2a;color:#fff;border:1px solid #4a4;cursor:pointer;border-radius:3px;">+ 添加</button></h3>
        <div id="camp-list"></div>
      </div>
      <!-- Camp detail -->
      <div class="panel" id="camp-detail" style="display:none;">
        <h3>营地详情</h3>
        <div class="form-row"><label>ID:</label><input type="text" id="camp-id" onchange="updateCampField('id',this.value)"></div>
        <div class="form-row"><label>名称:</label><input type="text" id="camp-name" onchange="updateCampField('name',this.value)"></div>
        <div class="form-row"><label>X:</label><input type="number" id="camp-x" onchange="updateCampField('x',+this.value);renderMapCanvas()"></div>
        <div class="form-row"><label>Y:</label><input type="number" id="camp-y" onchange="updateCampField('y',+this.value);renderMapCanvas()"></div>
        <div class="form-row"><label>半径:</label><input type="number" id="camp-radius" onchange="updateCampField('radius',+this.value);renderMapCanvas()"></div>
        <div class="form-row"><label>首刷时间:</label><input type="number" id="camp-first" onchange="updateCampField('firstSpawnTime',+this.value)">s</div>
        <div class="form-row"><label>重生冷却:</label><input type="number" id="camp-respawn" onchange="updateCampField('respawnCooldown',+this.value)">s</div>
        <div class="form-row"><label>最大次数:</label><input type="number" id="camp-maxresp" onchange="updateCampField('maxRespawns',+this.value)"></div>
        <h3 style="margin-top:10px;">怪物组合 <button onclick="addCampMonster()" style="float:right;font-size:11px;padding:2px 8px;background:#2a4a2a;color:#fff;border:1px solid #4a4;cursor:pointer;border-radius:3px;">+</button></h3>
        <div id="camp-monsters"></div>
        <button class="delete-btn" style="margin-top:8px;" onclick="deleteCamp()">删除此营地</button>
      </div>
      <!-- Wave composition -->
      <div class="panel">
        <h3>波次配置</h3>
        <div class="form-row"><label>Boss间隔:</label><input type="number" id="wave-boss-every" value="5" style="width:50px" onchange="updateWaveConfig('bossEvery',+this.value)">波</div>
        <div class="form-row"><label>基础数量:</label><input type="number" id="wave-base-count" value="8" style="width:50px" onchange="updateWaveConfig('baseCount',+this.value)"></div>
        <div class="form-row"><label>早期间隔:</label><input type="number" id="wave-interval-early" step="1" style="width:50px" onchange="updateMapField('waveIntervalEarly',+this.value)">s</div>
        <div class="form-row"><label>中期间隔:</label><input type="number" id="wave-interval-mid" step="1" style="width:50px" onchange="updateMapField('waveIntervalMid',+this.value)">s</div>
        <div class="form-row"><label>后期间隔:</label><input type="number" id="wave-interval-late" step="1" style="width:50px" onchange="updateMapField('waveIntervalLate',+this.value)">s</div>
        <div class="form-row"><label>精英概率:</label><input type="number" id="wave-elite-chance" step="0.05" min="0" max="1" style="width:50px" onchange="updateMapField('eliteAffixChance',+this.value)"></div>
        <div id="wave-comp"></div>
      </div>
      <!-- Spawn density -->
      <div class="panel">
        <h3>初始刷怪</h3>
        <div class="form-row"><label>初始密度:</label><input type="number" id="spawn-density" min="0" step="1" style="width:50px" onchange="updateMapField('initialDensity',+this.value)"></div>
        <div class="form-row"><label>最近距离:</label><input type="number" id="spawn-min-dist" min="0" step="10" style="width:50px" onchange="updateMapField('spawnMinDist',+this.value)">px</div>
        <div class="form-row"><label>最远距离:</label><input type="number" id="spawn-max-dist" min="0" step="10" style="width:50px" onchange="updateMapField('spawnMaxDist',+this.value)">px</div>
      </div>
      <!-- Trickle spawn -->
      <div class="panel">
        <h3>涓流刷怪</h3>
        <div class="form-row"><label>刷怪间隔:</label><input type="number" id="trickle-interval" step="0.1" min="0.1" style="width:50px" onchange="updateMapField('trickleInterval',+this.value)">s</div>
        <div class="form-row"><label>最小间隔:</label><input type="number" id="trickle-min" step="0.1" min="0.1" style="width:50px" onchange="updateMapField('trickleMin',+this.value)">s</div>
        <div style="margin-top:8px;padding-top:8px;border-top:1px solid #333;">
          <div style="color:#ffd700;font-size:12px;margin-bottom:6px;">早期加速（开局冲刺）</div>
          <div class="form-row"><label>持续时间:</label><input type="number" id="trickle-boost-dur" step="1" min="0" style="width:50px" onchange="updateTrickleField('earlyBoostDuration',+this.value)">s</div>
          <div class="form-row"><label>加速间隔:</label><input type="number" id="trickle-boost-int" step="0.1" min="0.1" style="width:50px" onchange="updateTrickleField('earlyBoostInterval',+this.value)">s</div>
          <div class="form-row"><label>每次数量:</label><input type="number" id="trickle-boost-cnt" step="1" min="1" style="width:50px" onchange="updateTrickleField('earlyBoostCount',+this.value)"></div>
        </div>
        <div style="margin-top:8px;padding-top:8px;border-top:1px solid #333;">
          <div style="color:#ffd700;font-size:12px;margin-bottom:6px;">怪物配比</div>
          <div id="trickle-comp"></div>
        </div>
      </div>
      <!-- Ambush -->
      <div class="panel">
        <h3>伏击配置</h3>
        <div class="form-row"><label>启用:</label><input type="checkbox" id="ambush-enabled" onchange="updateAmbushField('enabled',this.checked)"></div>
        <div class="form-row"><label>间隔:</label><input type="number" id="ambush-interval" step="1" min="1" style="width:50px" onchange="updateAmbushField('interval',+this.value)">s</div>
        <div class="form-row"><label>触发概率:</label><input type="number" id="ambush-chance" step="0.05" min="0" max="1" style="width:50px" onchange="updateAmbushField('chance',+this.value)"></div>
        <div class="form-row"><label>怪物类型:</label><select id="ambush-type" onchange="updateAmbushField('monsterType',this.value)" style="background:#222;color:#fff;border:1px solid #555;padding:3px;font-size:11px"><option value="normal">普通</option><option value="fast">疾速</option><option value="swarm">虫群</option><option value="tank">坦克</option><option value="ranged">远程</option></select></div>
        <div class="form-row"><label>数量:</label><input type="number" id="ambush-count" step="1" min="1" style="width:50px" onchange="updateAmbushField('monsterCount',+this.value)"></div>
        <div class="form-row"><label>最近距离:</label><input type="number" id="ambush-min-dist" step="10" min="0" style="width:50px" onchange="updateAmbushField('spawnMinDist',+this.value)">px</div>
        <div class="form-row"><label>最远距离:</label><input type="number" id="ambush-max-dist" step="10" min="0" style="width:50px" onchange="updateAmbushField('spawnMaxDist',+this.value)">px</div>
      </div>
    </div>
  </div>
</div>

<script>
// ====== STATE ======
var skillsData = [], monstersRaw = {}, monsterTypes = [];
var charactersData = {};
var currentTab = 'skills';
var undoStack = [], redoStack = [];
var currentMap = null, selectedCampIdx = -1, mapList = [];
var dragCamp = -1, mapScale = 1;
var expandedSkills = {}; // track which skill cards are expanded

// ====== NAV ======
function switchTab(tab) {
  currentTab = tab;
  var btns = document.querySelectorAll('.nav-btn');
  for (var i = 0; i < btns.length; i++) btns[i].className = 'nav-btn';
  document.querySelector('.nav-btn[onclick*="' + tab + '"]').className = 'nav-btn active';
  var tabs = document.querySelectorAll('.tab-content');
  for (var i = 0; i < tabs.length; i++) tabs[i].className = 'tab-content';
  document.getElementById('tab-' + tab).className = 'tab-content active';
  if (tab === 'classes') loadClasses();
  if (tab === 'maps' && !currentMap) loadMapList();
}

function toast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + (type || 'success');
  el.style.display = 'block';
  setTimeout(function() { el.style.display = 'none'; }, 2500);
}

// ====== UNDO/REDO ======
function saveState() {
  undoStack.push(JSON.stringify({ skills: skillsData }));
  redoStack = [];
  if (undoStack.length > 50) undoStack.shift();
}
function undo() {
  if (!undoStack.length) return;
  redoStack.push(JSON.stringify({ skills: skillsData }));
  var s = JSON.parse(undoStack.pop());
  skillsData = s.skills;
  renderSkills();
}
function redo() {
  if (!redoStack.length) return;
  undoStack.push(JSON.stringify({ skills: skillsData }));
  var s = JSON.parse(redoStack.pop());
  skillsData = s.skills;
  renderSkills();
}

document.addEventListener('keydown', function(e) {
  if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); }
  if (e.ctrlKey && e.key === 'y') { e.preventDefault(); redo(); }
  if (e.ctrlKey && e.key === 's') { e.preventDefault(); saveCurrentTab(); }
});

// ====== SAVE ======
function saveCurrentTab() {
  if (currentTab === 'skills') {
    fetch('/api/editor/skills', { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ skills: skillsData }) })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d.error) { toast(d.error, 'error'); return; }
        toast('技能数据已保存');
      })
      .catch(function(e) { toast('保存失败: ' + e.message, 'error'); });
  } else if (currentTab === 'classes') {
    fetch('/api/editor/characters', { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(charactersData) })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d.error) { toast(d.error, 'error'); return; }
        toast('职业数据已保存');
      })
      .catch(function(e) { toast('保存失败: ' + e.message, 'error'); });
  } else if (currentTab === 'monsters') {
    var obj = {};
    for (var i = 0; i < monsterTypes.length; i++) {
      var m = monsterTypes[i];
      obj[m._typeId] = {
        name: m.name, baseHP: m.baseHP, baseATK: m.baseATK, baseSpeed: m.baseSpeed,
        baseXP: m.baseXP, radius: m.radius, color: m.color,
        levelScaling: m.levelScaling || {}
      };
      if (m.special && Object.keys(m.special).length > 0) obj[m._typeId].special = m.special;
    }
    if (monstersRaw.levelDiffCorrection) obj.levelDiffCorrection = monstersRaw.levelDiffCorrection;
    fetch('/api/editor/monsters', { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(obj) })

      .then(function(d) {

        toast('怪物数据已保存');
      })
      .catch(function(e) { toast('保存失败: ' + e.message, 'error'); });
  } else if (currentTab === 'maps' && currentMap) {
    var mapId = currentMap.id;
    fetch('/api/editor/maps/' + mapId, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(currentMap) })

}

function toggleSkill(skillId) {
  expandedSkills[skillId] = !expandedSkills[skillId];
  var body = document.getElementById('skill-body-' + skillId);
  var arrow = document.getElementById('skill-arrow-' + skillId);
  if (body) {
    if (expandedSkills[skillId]) {
      body.className = 'skill-body open';
      arrow.className = 'expand-arrow open';
      // Start preview animation
      var skill = null;
      for (var si = 0; si < skillsData.length; si++) {
        if (skillsData[si].id === skillId) { skill = skillsData[si]; break; }
      }
      if (skill && skill.visual && skill.visual !== 'none') {
        setTimeout(function() { restartSkillPreview(skillId, skill.visual, skill.color); }, 50);
      }
    } else {
      body.className = 'skill-body';
      arrow.className = 'expand-arrow';
      // Stop preview animation
      if (skillPreviewAnims[skillId]) { cancelAnimationFrame(skillPreviewAnims[skillId]); delete skillPreviewAnims[skillId]; }
    }
  }
}

function renderSkills() {
  var container = document.getElementById('skill-cards');

    var s = skillsData[i];

      '<label>类型</label>' + selOpts(['buff','passive','projectile','aoe','summon'], s.type, 'saveState();skillsData[' + i + '].type=this.value;renderSkills()') +
      '<label>图标</label><input type="text" value="' + esc(s.icon || '') + '" style="width:40px" onchange="saveState();skillsData[' + i + '].icon=this.value;renderSkills()">' +

function updateSkillLevel(skillIdx, level, key, value, inputType) {
  saveState();
  var lvStr = String(level);
  if (!skillsData[skillIdx].levels) skillsData[skillIdx].levels = {};
  if (!skillsData[skillIdx].levels[lvStr]) skillsData[skillIdx].levels[lvStr] = {};
  if (inputType === 'number') {
    skillsData[skillIdx].levels[lvStr][key] = value === '' ? 0 : +value;
  } else {
    skillsData[skillIdx].levels[lvStr][key] = value;
  }
}

function addSkill() {
  saveState();
  var newId = 'new_skill_' + Date.now();
  var newSkill = {
    id: newId, name: '新技能', type: 'buff', icon: '?', color: '#ffffff',
    description: '', maxLevel: 10, levels: {}
  };
  for (var lv = 1; lv <= 10; lv++) {
    newSkill.levels[String(lv)] = { value: 0, desc: '等级' + lv };
  }
  skillsData.push(newSkill);
  expandedSkills[newId] = true;
  renderSkills();
}

function deleteSkill(i) {
  if (!confirm('删除 "' + skillsData[i].name + '"？')) return;
  saveState();
  delete expandedSkills[skillsData[i].id];
  skillsData.splice(i, 1);
  renderSkills();
}

function ensureAttr(clsId) {
  if (!charactersData[clsId].initialAttributes) charactersData[clsId].initialAttributes = { INT: 0, STR: 0, AGI: 0, STA: 0 };
}

function ensureGrowth(clsId) {
  if (!charactersData[clsId].growthCoefficients) charactersData[clsId].growthCoefficients = { INT: 0, STR: 0, AGI: 0, STA: 0 };
}

function toggleClassSkill(clsId, skillId, checked) {
  var cls = charactersData[clsId];
  if (!cls.availableSkills) cls.availableSkills = [];
  if (checked) {
    if (cls.availableSkills.length >= 10) {
      toast('最多10个可用技能', 'error');
      return;
    }
    if (cls.availableSkills.indexOf(skillId) < 0) {
      cls.availableSkills.push(skillId);
    }
  } else {
    var idx = cls.availableSkills.indexOf(skillId);
    if (idx >= 0) cls.availableSkills.splice(idx, 1);
  }
}

function ensureAP(idx) {
  if (!skillsData[idx].attackPattern) skillsData[idx].attackPattern = { range: 400, angle: 0.39, projectileSpeed: 300, projectileType: 'projectile', visual: 'bullet' };
}

function drawAttackPreview(clsId, skillIdx) {
  var canvas = document.getElementById('preview-' + clsId);
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var w = canvas.width, h = canvas.height;
  var cx = w / 2, cy = h / 2;
  ctx.clearRect(0, 0, w, h);

  var s = skillsData[skillIdx];
  var ap = s.attackPattern || {};
  var range = ap.range || 100;
  var angle = ap.angle || 0.39;
  var maxR = Math.min(w, h) / 2 - 10;
  var scale = maxR / Math.max(range, 100);
  var r = range * scale;
  var clsColor = charactersData[clsId] ? (charactersData[clsId].color || '#fff') : '#fff';

  // Range circle
  ctx.strokeStyle = '#333';
  ctx.setLineDash([4, 4]);
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();
  ctx.setLineDash([]);

  // Attack arc
  ctx.fillStyle = clsColor;
  ctx.globalAlpha = 0.25;
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.arc(cx, cy, r, -angle / 2, angle / 2);
  ctx.closePath();
  ctx.fill();
  ctx.globalAlpha = 0.8;
  ctx.strokeStyle = clsColor;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.arc(cx, cy, r, -angle / 2, angle / 2);
  ctx.closePath();
  ctx.stroke();
  ctx.globalAlpha = 1;

  // Player dot
  ctx.fillStyle = clsColor;
  ctx.beginPath(); ctx.arc(cx, cy, 5, 0, Math.PI * 2); ctx.fill();

  // Label
  ctx.fillStyle = '#888';
  ctx.font = '10px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(range + 'px / ' + Math.round(angle * 180 / Math.PI) + '°', cx, h - 4);
}

// Map Canvas
function renderMapCanvas() {
  var canvas = document.getElementById('map-canvas');
  var ctx = canvas.getContext('2d');
  if (!currentMap) { ctx.clearRect(0, 0, 600, 600); return; }
  var w = currentMap.width || 1200, h = currentMap.height || 1200;
  mapScale = Math.min(580 / w, 580 / h);
  var ox = (600 - w * mapScale) / 2, oy = (600 - h * mapScale) / 2;

  ctx.clearRect(0, 0, 600, 600);
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, 600, 600);

  // Map border
  ctx.strokeStyle = '#555';
  ctx.strokeRect(ox, oy, w * mapScale, h * mapScale);

  // Grid
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 0.5;
  for (var gx = 0; gx <= w; gx += 200) {
    ctx.beginPath(); ctx.moveTo(ox + gx * mapScale, oy); ctx.lineTo(ox + gx * mapScale, oy + h * mapScale); ctx.stroke();
  }
  for (var gy = 0; gy <= h; gy += 200) {
    ctx.beginPath(); ctx.moveTo(ox, oy + gy * mapScale); ctx.lineTo(ox + w * mapScale, oy + gy * mapScale); ctx.stroke();
  }
  ctx.lineWidth = 1;

  // Zones
  var zones = currentMap.zones || [];
  for (var zi = 0; zi < zones.length; zi++) {
    var z = zones[zi];
    var zx = ox + (z.x || 0) * mapScale, zy = oy + (z.y || 0) * mapScale;
    var zw = (z.width || 200) * mapScale, zh = (z.height || 200) * mapScale;
    ctx.globalAlpha = 0.15;
    ctx.fillStyle = z.type === 'safe' ? '#0f0' : (z.type === 'hazard' ? '#f00' : '#88f');
    ctx.fillRect(zx, zy, zw, zh);
    ctx.globalAlpha = 1;
    ctx.strokeStyle = z.type === 'safe' ? '#0f0' : (z.type === 'hazard' ? '#f00' : '#88f');
    ctx.strokeRect(zx, zy, zw, zh);
    ctx.fillStyle = '#fff'; ctx.font = '10px Arial'; ctx.textAlign = 'center';
    ctx.fillText(z.name || z.type, zx + zw / 2, zy + zh / 2);
  }

  // Spawn camps
  var camps = currentMap.spawnCamps || [];
  for (var ci = 0; ci < camps.length; ci++) {
    var c = camps[ci];
    var campX = c.position ? c.position.x : c.x; var campY = c.position ? c.position.y : c.y;
    var cx = ox + (campX || 0) * mapScale, cy = oy + (campY || 0) * mapScale;
    var cr = (c.radius || 60) * mapScale;
    var selected = ci === selectedCampIdx;

    ctx.globalAlpha = 0.2;
    ctx.fillStyle = selected ? '#ffd700' : '#f80';
    ctx.beginPath(); ctx.arc(cx, cy, cr, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
    ctx.strokeStyle = selected ? '#ffd700' : '#f80';
    ctx.lineWidth = selected ? 2 : 1;
    ctx.beginPath(); ctx.arc(cx, cy, cr, 0, Math.PI * 2); ctx.stroke();
    ctx.lineWidth = 1;

    // Label
    ctx.fillStyle = '#fff'; ctx.font = selected ? 'bold 11px Arial' : '10px Arial';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(c.name || c.id || 'camp', cx, cy - 8);

    // Monster summary
    var mons = c.monsters || [];
    var summary = '';
    for (var mi = 0; mi < mons.length; mi++) summary += mons[mi].type + '×' + mons[mi].count + ' ';
    if (summary) {
      ctx.font = '9px Arial'; ctx.fillStyle = '#ffa';
      ctx.fillText(summary.trim(), cx, cy + 8);
    }
  }
}

// Camp drag on canvas
var mapCanvas = document.getElementById('map-canvas');
mapCanvas.addEventListener('mousedown', function(e) {
  if (!currentMap) return;
  var rect = mapCanvas.getBoundingClientRect();
  var mx = e.clientX - rect.left, my = e.clientY - rect.top;
  var w = currentMap.width || 1200, h = currentMap.height || 1200;
  var ox = (600 - w * mapScale) / 2, oy = (600 - h * mapScale) / 2;
  var camps = currentMap.spawnCamps || [];
  for (var i = 0; i < camps.length; i++) {
    var dcx = camps[i].position ? camps[i].position.x : camps[i].x;
    var dcy = camps[i].position ? camps[i].position.y : camps[i].y;
    var cx = ox + (dcx || 0) * mapScale, cy = oy + (dcy || 0) * mapScale;
    if (Math.sqrt((mx - cx) * (mx - cx) + (my - cy) * (my - cy)) < 15) {
      dragCamp = i;
      selectCamp(i);
      return;
    }
  }
});

mapCanvas.addEventListener('mousemove', function(e) {
  if (dragCamp < 0 || !currentMap) return;
  var rect = mapCanvas.getBoundingClientRect();
  var mx = e.clientX - rect.left, my = e.clientY - rect.top;
  var w = currentMap.width || 1200, h = currentMap.height || 1200;
  var ox = (600 - w * mapScale) / 2, oy = (600 - h * mapScale) / 2;
  var newX = Math.round((mx - ox) / mapScale);
  var newY = Math.round((my - oy) / mapScale);
  newX = Math.max(0, Math.min(w, newX));
  newY = Math.max(0, Math.min(h, newY));
  var dc = currentMap.spawnCamps[dragCamp];
  if (dc.position) { dc.position.x = newX; dc.position.y = newY; }
  else { dc.x = newX; dc.y = newY; }
  document.getElementById('camp-x').value = newX;
  document.getElementById('camp-y').value = newY;
  renderMapCanvas();
});

mapCanvas.addEventListener('mouseup', function() { dragCamp = -1; });

// ====== SKILL PREVIEW ANIMATION ======
var skillPreviewTimers = {};
var skillPreviewAnims = {};

function restartSkillPreview(skillId, visual, color) {
  // Cancel old animation
  if (skillPreviewAnims[skillId]) cancelAnimationFrame(skillPreviewAnims[skillId]);
  if (visual === 'none') {
    var c = document.getElementById('skill-preview-' + skillId);
    if (c) c.getContext('2d').clearRect(0, 0, c.width, c.height);
    return;
  }
  skillPreviewTimers[skillId] = 0;
  animateSkillPreview(skillId, visual, color);
}

function animateSkillPreview(skillId, visual, color) {
  var canvas = document.getElementById('skill-preview-' + skillId);
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  skillPreviewTimers[skillId] = (skillPreviewTimers[skillId] || 0) + 0.033;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  // Draw dark background label
  ctx.fillStyle = '#444'; ctx.globalAlpha = 1; ctx.font = '9px Arial'; ctx.textAlign = 'left';
  ctx.fillText(visual, 4, 12);
  drawSkillEffect(ctx, canvas.width, canvas.height, visual, color, skillPreviewTimers[skillId]);
  ctx.globalAlpha = 1;
  skillPreviewAnims[skillId] = requestAnimationFrame(function() {
    animateSkillPreview(skillId, visual, color);
  });
}

// ====== FULL PREVIEW MODAL ======
var fpAnimId = null, fpTime = 0, fpSkillIdx = -1;

function openFullPreview(idx) {
  fpSkillIdx = idx;
  var s = skillsData[idx];
  document.getElementById('fp-overlay').classList.add('open');
  document.getElementById('fp-title').textContent = s.icon + ' ' + s.name + '  —  效果预览';
  document.getElementById('fp-desc').innerHTML = '<b>描述：</b>' + esc(s.description || '无') + '<br><b>类型：</b>' + (s.type || '-') + '<br><b>视觉：</b>' + (s.visual || 'none');
  var lvl5 = (s.levels || {})['5'] || {};
  var statsHtml = '<b>5级数值：</b><br>';
  var lk = Object.keys(lvl5);
  for (var li = 0; li < lk.length; li++) {
    if (lk[li] !== 'desc') statsHtml += lk[li] + ': ' + lvl5[lk[li]] + '<br>';
  }
  document.getElementById('fp-stats').innerHTML = statsHtml;
  fpTime = 0;
  if (!fpAnimId) fpAnimLoop();
}

function closeFullPreview() {
  document.getElementById('fp-overlay').classList.remove('open');
  if (fpAnimId) { cancelAnimationFrame(fpAnimId); fpAnimId = null; }
  fpSkillIdx = -1;
}

function fpAnimLoop() {
  if (fpSkillIdx < 0) { fpAnimId = null; return; }
  fpAnimId = requestAnimationFrame(fpAnimLoop);
  fpTime += 0.016;
  var s = skillsData[fpSkillIdx];
  var canvas = document.getElementById('fp-canvas');
  var ctx = canvas.getContext('2d');
  var W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = '#151525'; ctx.lineWidth = 1;
  for (var gx = 0; gx < W; gx += 50) { ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, H); ctx.stroke(); }
  for (var gy = 0; gy < H; gy += 50) { ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke(); }

  // Dummy enemies
  ctx.globalAlpha = 0.5;
  var fpEnemies = [];
  for (var ei = 0; ei < 5; ei++) {
    var ex = W * 0.55 + Math.cos(fpTime * 0.5 + ei * 1.3) * (80 + ei * 20);
    var ey = H * 0.5 + Math.sin(fpTime * 0.7 + ei * 1.1) * (40 + ei * 15);
    fpEnemies.push({x: ex, y: ey});
    ctx.fillStyle = '#f44'; ctx.beginPath(); ctx.arc(ex, ey, 10, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 0.3; ctx.font = '10px Arial'; ctx.textAlign = 'center'; ctx.fillStyle = '#f88';

      var fadeP = (phase2 - 0.7) / 0.3;
      ctx.globalAlpha = (1 - fadeP) * 0.3; ctx.fillStyle = '#808';
      ctx.beginPath(); ctx.arc(tgt[0], tgt[1], 25 * sc * (1 + fadeP * 0.5), 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1; ctx.fillStyle = '#c0c';
    ctx.beginPath(); ctx.arc(px3, py3, 5 * sc, 0, Math.PI * 2); ctx.fill();
  } else if (visual === 'tornado') {
    // 龙卷风 — 参考王者荣耀貂蝉/魔兽元素萨满风暴
    var sc = Math.min(w, h) / 260;
    var tcx = w * 0.55, tcy = h * 0.5;
    for (var layer = 0; layer < 6; layer++) {
      var tr = (20 + layer * 8) * sc;
      var layerY = tcy - layer * 10 * sc;
      ctx.globalAlpha = 0.25 - layer * 0.03;
      ctx.strokeStyle = layer < 2 ? '#aaf' : (layer < 4 ? '#88f' : '#66d');
      ctx.lineWidth = (3 - layer * 0.3) * sc;
      ctx.beginPath();
      for (var a = 0; a < Math.PI * 2; a += 0.08) {
        var wobble2 = Math.sin(a * 3 + t * 4 + layer) * 5 * sc;
        var rx2 = tcx + Math.cos(a + t * 2.5 + layer * 0.4) * (tr + wobble2);
        var ry2 = layerY + Math.sin(a + t * 2.5 + layer * 0.4) * (tr * 0.45 + wobble2 * 0.3);
        if (a < 0.01) ctx.moveTo(rx2, ry2); else ctx.lineTo(rx2, ry2);
      }
      ctx.closePath(); ctx.stroke();
    }
    for (var di = 0; di < 8; di++) {
      var da = t * 3 + di * 0.8;
      var dR = (15 + di * 5) * sc;
      var ddx = tcx + Math.cos(da) * dR;
      var ddy = tcy + Math.sin(da) * dR * 0.4 - di * 3 * sc;
      ctx.globalAlpha = 0.3; ctx.fillStyle = '#889';
      ctx.beginPath(); ctx.arc(ddx, ddy, 2 * sc, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 0.08; ctx.fillStyle = '#88f';
    ctx.beginPath(); ctx.arc(tcx, tcy, 50 * sc, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1; ctx.fillStyle = '#4af';
    ctx.beginPath(); ctx.arc(w * 0.3, h * 0.5, 5 * sc, 0, Math.PI * 2); ctx.fill();
  } else if (visual === 'power_aura') {
    // 力量光环 — 参考王者荣耀红buff增益效果
    var sc = Math.min(w, h) / 260;
    var cx9 = w / 2, cy9 = h / 2;
    var pulse2 = 1 + Math.sin(t * 4) * 0.15;
    ctx.globalAlpha = 0.08; ctx.fillStyle = color || '#f44';
    ctx.beginPath(); ctx.arc(cx9, cy9, 30 * sc * pulse2, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 0.2; ctx.strokeStyle = color || '#f44'; ctx.lineWidth = 2 * sc;
    ctx.beginPath(); ctx.arc(cx9, cy9, 22 * sc * pulse2, 0, Math.PI * 2); ctx.stroke();
    for (var pi3 = 0; pi3 < 6; pi3++) {
      var pa3 = t * 2 + pi3 * Math.PI / 3;
      var pR2 = 18 * sc + Math.sin(t * 3 + pi3) * 5 * sc;
      ctx.globalAlpha = 0.5 + Math.sin(t * 4 + pi3) * 0.2;
      ctx.fillStyle = color || '#f44';
      ctx.beginPath();
      ctx.moveTo(cx9 + Math.cos(pa3) * pR2, cy9 + Math.sin(pa3) * pR2);
      ctx.lineTo(cx9 + Math.cos(pa3 + 0.15) * (pR2 + 8 * sc), cy9 + Math.sin(pa3 + 0.15) * (pR2 + 8 * sc));
      ctx.lineTo(cx9 + Math.cos(pa3 - 0.15) * (pR2 + 8 * sc), cy9 + Math.sin(pa3 - 0.15) * (pR2 + 8 * sc));
      ctx.fill();
    }
    // Rising power particles
    for (var rp = 0; rp < 4; rp++) {
      var rpY = cy9 - ((t * 25 + rp * 15) % 35) * sc;
      var rpX = cx9 + Math.sin(t * 2 + rp * 1.5) * 10 * sc;
      ctx.globalAlpha = 0.6 - ((t * 25 + rp * 15) % 35) / 50;
      ctx.fillStyle = '#ff8'; ctx.font = (8 * sc) + 'px Arial'; ctx.textAlign = 'center';
      ctx.fillText('⚔', rpX, rpY);
    }
    ctx.globalAlpha = 1; ctx.fillStyle = '#4af';
    ctx.beginPath(); ctx.arc(cx9, cy9, 5 * sc, 0, Math.PI * 2); ctx.fill();
  } else if (visual === 'lifesteal') {
    // 吸血 — 参考魔兽世界死亡骑士血之瘟疫
    var sc = Math.min(w, h) / 260;
    var cx10 = w * 0.35, cy10 = h / 2;
    var tgt2 = {x: w * 0.65, y: h * 0.45};
    ctx.globalAlpha = 0.4; ctx.fillStyle = '#f44';
    ctx.beginPath(); ctx.arc(tgt2.x, tgt2.y, 8 * sc, 0, Math.PI * 2); ctx.fill();
    // Drain beam from enemy to player
    var drainPhase = (t * 2) % 1.5;
    if (drainPhase < 1) {
      var dP = drainPhase;
      for (var di2 = 0; di2 < 5; di2++) {
        var dOff = (dP + di2 * 0.2) % 1;
        var dx2 = tgt2.x + (cx10 - tgt2.x) * dOff;
        var dy2 = tgt2.y + (cy10 - tgt2.y) * dOff + Math.sin(dOff * Math.PI * 3) * 8 * sc;
        ctx.globalAlpha = (1 - dOff) * 0.6;
        ctx.fillStyle = color || '#d4f';
        ctx.beginPath(); ctx.arc(dx2, dy2, (4 - dOff * 2) * sc, 0, Math.PI * 2); ctx.fill();
      }
    }
    // Player heal glow
    var hpulse2 = Math.sin(t * 5) * 0.3;
    ctx.globalAlpha = 0.15 + hpulse2 * 0.1; ctx.fillStyle = '#f4a';
    ctx.beginPath(); ctx.arc(cx10, cy10, 18 * sc, 0, Math.PI * 2); ctx.fill();
    // HP text
    ctx.globalAlpha = 0.7; ctx.fillStyle = '#4f4'; ctx.font = 'bold ' + (10 * sc) + 'px Arial'; ctx.textAlign = 'center';
    ctx.fillText('+HP', cx10, cy10 - 20 * sc);
    ctx.globalAlpha = 1; ctx.fillStyle = '#4af';
    ctx.beginPath(); ctx.arc(cx10, cy10, 5 * sc, 0, Math.PI * 2); ctx.fill();
  } else if (visual === 'magnet') {
    // 磁铁吸附 — 参考弹幕幸存者经验吸取效果
    var sc = Math.min(w, h) / 260;
    var cx11 = w / 2, cy11 = h / 2, mR = 50 * sc;
    ctx.globalAlpha = 0.06; ctx.fillStyle = color || '#af0';
    ctx.beginPath(); ctx.arc(cx11, cy11, mR * 1.5, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 0.2; ctx.setLineDash([4, 4]); ctx.strokeStyle = color || '#af0'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(cx11, cy11, mR, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx11, cy11, mR * 1.3, 0, Math.PI * 2); ctx.stroke();
    ctx.setLineDash([]);
    // XP orbs being attracted
    for (var xi = 0; xi < 8; xi++) {
      var xa = t * 0.8 + xi * Math.PI / 4;
      var xr = mR * 1.4 - ((t * 30 + xi * 15) % (mR * 1.2));
      if (xr < 0) xr += mR * 1.2;
      var xx = cx11 + Math.cos(xa) * xr;
      var xy = cy11 + Math.sin(xa) * xr;
      var xAlpha = Math.max(0.1, 1 - xr / (mR * 1.4));
      ctx.globalAlpha = xAlpha * 0.8;
      ctx.fillStyle = '#0f0'; ctx.beginPath(); ctx.arc(xx, xy, (3 + xAlpha * 3) * sc, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#ff0'; ctx.beginPath(); ctx.arc(xx, xy, (1 + xAlpha * 2) * sc, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1; ctx.fillStyle = '#4af';
    ctx.beginPath(); ctx.arc(cx11, cy11, 5 * sc, 0, Math.PI * 2); ctx.fill();
  }
}

// ====== HELPERS ======
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;'); }

function selOpts(options, selected, onchange) {
  var h = '<select onchange="' + onchange + '">';
  for (var i = 0; i < options.length; i++) {
    h += '<option' + (options[i] === selected ? ' selected' : '') + '>' + options[i] + '</option>';
  }
  return h + '</select>';
}

// ====== INIT ======
loadSkills();
loadMonsters();
// Characters loaded on-demand when switching to classes tab
fetch('/api/editor/characters')
  .then(function(r) { return r.json(); })
  .then(function(data) { charactersData = data || {}; })
  .catch(function() {});
</script>
