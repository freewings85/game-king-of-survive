<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360">
  <!-- Tutorial 1/3 — Joystick movement. 640×360 full-screen overlay.
       Dimmed background + highlight bottom-left joystick + instructional text.
       Developer: drawImage stretched to canvas size, 3s auto-dismiss or tap. -->
  <defs>
    <radialGradient id="t1Spot" cx="22%" cy="78%" r="22%">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="60%" stop-color="#000" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.7"/>
    </radialGradient>
    <radialGradient id="t1Ring" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0"/>
      <stop offset="75%" stop-color="#ffd700" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="t1Card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2814"/>
      <stop offset="100%" stop-color="#1a0e02"/>
    </linearGradient>
  </defs>

  <!-- dim background -->
  <rect width="640" height="360" fill="#000" opacity="0.58"/>
  <!-- spotlight window around joystick -->
  <rect width="640" height="360" fill="url(#t1Spot)"/>

  <!-- joystick highlight (bottom-left) -->
  <g transform="translate(140,280)">
    <!-- pulsing ring -->
    <circle r="78" fill="url(#t1Ring)"/>
    <!-- base -->
    <circle r="56" fill="#1a0e02" stroke="#ffd700" stroke-width="3" opacity="0.9"/>
    <circle r="56" fill="none" stroke="#ffd700" stroke-width="3" stroke-dasharray="6 4" opacity="0.95"/>
    <!-- stick -->
    <circle r="26" fill="#6a4a1a" stroke="#ffd700" stroke-width="2"/>
    <circle r="20" fill="#ffd700" opacity="0.45"/>
    <!-- direction arrows hint -->
    <g fill="#ffd700" opacity="0.9" stroke="#3a2208" stroke-width="1.2">
      <polygon points="0,-68 -8,-54 8,-54"/>
      <polygon points="0,68 -8,54 8,54"/>
      <polygon points="-68,0 -54,-8 -54,8"/>
      <polygon points="68,0 54,-8 54,8"/>
    </g>
    <!-- animated drag indicator (arrow curve to upper-right) -->
    <path d="M18 -8 Q40 -32 56 -42" fill="none" stroke="#fff6a8" stroke-width="3" stroke-linecap="round" stroke-dasharray="4 3"/>
    <polygon points="56,-42 46,-36 50,-50" fill="#fff6a8" stroke="#3a2208" stroke-width="1"/>
  </g>

  <!-- instructional card (top-right) -->
  <g transform="translate(320,60)">
    <rect width="300" height="180" rx="8" fill="url(#t1Card)" stroke="#ffd700" stroke-width="3"/>
    <rect x="6" y="6" width="288" height="168" rx="5" fill="none" stroke="#8a5e18" stroke-width="1"/>
    <!-- step indicator -->
    <rect x="14" y="14" width="60" height="22" rx="3" fill="#ffd700"/>
    <text x="44" y="30" font-family='"PingFang SC","Noto Sans CJK SC",Arial,system-ui,sans-serif' font-size="12" font-weight="bold" fill="#1a0e02" text-anchor="middle">STEP 1/3</text>
    <!-- main heading (ASCII) -->
    <text x="150" y="68" font-family='"PingFang SC","Noto Sans CJK SC",Arial,system-ui,sans-serif' font-size="22" font-weight="900" fill="#ffd700" text-anchor="middle" style="paint-order:stroke;stroke:#1a0e02;stroke-width:4px;">MOVE WITH JOYSTICK</text>
    <!-- CJK sub -->
    <text x="150" y="96" font-family='"PingFang SC","Noto Sans CJK SC",Arial,system-ui,sans-serif' font-size="18" font-weight="bold" fill="#fff6a8" text-anchor="middle" style="paint-order:stroke;stroke:#1a0e02;stroke-width:3px;">拖动左下摇杆移动</text>
    <!-- body lines -->
    <text x="150" y="128" font-family='"PingFang SC","Noto Sans CJK SC",Arial,system-ui,sans-serif' font-size="13" fill="#e8dcbc" text-anchor="middle">Drag the glowing circle on the left</text>
    <text x="150" y="146" font-family='"PingFang SC","Noto Sans CJK SC",Arial,system-ui,sans-serif' font-size="13" fill="#e8dcbc" text-anchor="middle">to walk in any direction.</text>
    <!-- footer hint -->
    <text x="150" y="168" font-family='"PingFang SC","Noto Sans CJK SC",Arial,system-ui,sans-serif' font-size="11" fill="#a89878" text-anchor="middle">Tap anywhere to continue · 点击继续</text>
  </g>

  <!-- bottom progress dots -->
  <g transform="translate(320,338)">
    <circle cx="-14" cy="0" r="5" fill="#ffd700"/>
    <circle cx="0"   cy="0" r="5" fill="#6a4a1a" stroke="#ffd700" stroke-width="1.5"/>
    <circle cx="14"  cy="0" r="5" fill="#6a4a1a" stroke="#ffd700" stroke-width="1.5"/>
  </g>
</svg>
