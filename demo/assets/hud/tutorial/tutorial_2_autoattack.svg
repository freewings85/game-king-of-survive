<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360">
  <!-- Tutorial 2/3 — Auto-attack proximity. 640×360 full-screen overlay.
       Center shows player + enemy silhouettes + attack ray. Text card on right. -->
  <defs>
    <radialGradient id="t2Spot" cx="30%" cy="55%" r="28%">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="60%" stop-color="#000" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.7"/>
    </radialGradient>
    <linearGradient id="t2Card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2814"/>
      <stop offset="100%" stop-color="#1a0e02"/>
    </linearGradient>
    <linearGradient id="t2Ray" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffea80"/>
      <stop offset="100%" stop-color="#ff4a28"/>
    </linearGradient>
    <radialGradient id="t2AttackRange" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0"/>
      <stop offset="75%" stop-color="#ffd700" stop-opacity="0"/>
      <stop offset="80%" stop-color="#ffd700" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- dim background -->
  <rect width="640" height="360" fill="#000" opacity="0.58"/>
  <rect width="640" height="360" fill="url(#t2Spot)"/>

  <!-- combat demo (left-center) -->
  <g transform="translate(180,200)">
    <!-- attack range circle around player -->
    <circle r="80" fill="url(#t2AttackRange)"/>
    <circle r="78" fill="none" stroke="#ffd700" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.8"/>

    <!-- attack ray (player → enemy) -->
    <line x1="20" y1="0" x2="96" y2="0" stroke="url(#t2Ray)" stroke-width="5" opacity="0.9" stroke-linecap="round"/>
    <line x1="20" y1="0" x2="96" y2="0" stroke="#fff6a8" stroke-width="2" opacity="0.95" stroke-linecap="round"/>

    <!-- player silhouette (hero) -->
    <g>
      <ellipse cx="0" cy="18" rx="14" ry="4" fill="#000" opacity="0.4"/>
      <!-- body -->
      <circle cx="0" cy="-10" r="10" fill="#5aa5d8" stroke="#1a4a7a" stroke-width="2"/>
      <rect x="-8" y="-2" width="16" height="18" fill="#5aa5d8" stroke="#1a4a7a" stroke-width="2" rx="2"/>
      <!-- sword pointing right -->
      <rect x="10" y="-1" width="18" height="3" fill="#e8dcbc" stroke="#3a2208" stroke-width="1"/>
      <rect x="28" y="-3" width="2" height="7" fill="#ffd700"/>
      <!-- hair/helm -->
      <rect x="-6" y="-20" width="12" height="4" fill="#ffd700" stroke="#3a2208" stroke-width="1"/>
    </g>

    <!-- enemy silhouette -->
    <g transform="translate(106,0)">
      <ellipse cx="0" cy="18" rx="14" ry="4" fill="#000" opacity="0.4"/>
      <circle cx="0" cy="-10" r="10" fill="#c84a3a" stroke="#3a0a02" stroke-width="2"/>
      <rect x="-8" y="-2" width="16" height="18" fill="#a82a18" stroke="#3a0a02" stroke-width="2" rx="2"/>
      <!-- evil eyes -->
      <circle cx="-3" cy="-11" r="1.5" fill="#ffea80"/>
      <circle cx="3"  cy="-11" r="1.5" fill="#ffea80"/>
      <!-- damage impact -->
      <polygon points="-12,-8 -4,-12 -8,-4 -2,-6 -6,2" fill="#ffea80" stroke="#3a2208" stroke-width="1"/>
    </g>

    <!-- damage number -->
    <text x="106" y="-28" font-family='Arial,system-ui,sans-serif' font-size="22" font-weight="900" fill="#ff7a5a" text-anchor="middle" style="paint-order:stroke;stroke:#1a0e02;stroke-width:3px;">-15</text>
  </g>

  <!-- instructional card (right) -->
  <g transform="translate(320,60)">
    <rect width="300" height="180" rx="8" fill="url(#t2Card)" stroke="#ffd700" stroke-width="3"/>
    <rect x="6" y="6" width="288" height="168" rx="5" fill="none" stroke="#8a5e18" stroke-width="1"/>
    <rect x="14" y="14" width="60" height="22" rx="3" fill="#ffd700"/>
    <text x="44" y="30" font-family='"PingFang SC","Noto Sans CJK SC",Arial,system-ui,sans-serif' font-size="12" font-weight="bold" fill="#1a0e02" text-anchor="middle">STEP 2/3</text>
    <text x="150" y="68" font-family='"PingFang SC","Noto Sans CJK SC",Arial,system-ui,sans-serif' font-size="22" font-weight="900" fill="#ffd700" text-anchor="middle" style="paint-order:stroke;stroke:#1a0e02;stroke-width:4px;">AUTO-ATTACK</text>
    <text x="150" y="96" font-family='"PingFang SC","Noto Sans CJK SC",Arial,system-ui,sans-serif' font-size="18" font-weight="bold" fill="#fff6a8" text-anchor="middle" style="paint-order:stroke;stroke:#1a0e02;stroke-width:3px;">靠近敌人自动攻击</text>
    <text x="150" y="128" font-family='"PingFang SC","Noto Sans CJK SC",Arial,system-ui,sans-serif' font-size="13" fill="#e8dcbc" text-anchor="middle">Your hero auto-fires at the nearest</text>
    <text x="150" y="146" font-family='"PingFang SC","Noto Sans CJK SC",Arial,system-ui,sans-serif' font-size="13" fill="#e8dcbc" text-anchor="middle">enemy inside the gold ring.</text>
    <text x="150" y="168" font-family='"PingFang SC","Noto Sans CJK SC",Arial,system-ui,sans-serif' font-size="11" fill="#a89878" text-anchor="middle">Tap anywhere to continue · 点击继续</text>
  </g>

  <!-- progress dots -->
  <g transform="translate(320,338)">
    <circle cx="-14" cy="0" r="5" fill="#8a5e18" stroke="#ffd700" stroke-width="1.5"/>
    <circle cx="0"   cy="0" r="5" fill="#ffd700"/>
    <circle cx="14"  cy="0" r="5" fill="#6a4a1a" stroke="#ffd700" stroke-width="1.5"/>
  </g>
</svg>
