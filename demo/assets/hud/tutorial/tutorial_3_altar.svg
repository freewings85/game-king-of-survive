<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360">
  <!-- Tutorial 3/3 — Find the altar. 640×360 full-screen overlay.
       Center shows a mini altar + beam of light + 3 pickup icons around. Card on right. -->
  <defs>
    <radialGradient id="t3Spot" cx="28%" cy="50%" r="26%">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="60%" stop-color="#000" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.7"/>
    </radialGradient>
    <linearGradient id="t3Card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2814"/>
      <stop offset="100%" stop-color="#1a0e02"/>
    </linearGradient>
    <linearGradient id="t3Pillar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#fff4c8" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="t3Halo" cx="50%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- dim background -->
  <rect width="640" height="360" fill="#000" opacity="0.58"/>
  <rect width="640" height="360" fill="url(#t3Spot)"/>

  <!-- altar demo (left-center) -->
  <g transform="translate(180,210)">
    <!-- halo -->
    <circle cx="0" cy="-20" r="80" fill="url(#t3Halo)"/>
    <!-- light beam -->
    <rect x="-10" y="-110" width="20" height="90" fill="url(#t3Pillar)" opacity="0.75"/>
    <!-- stone base rings -->
    <ellipse cx="0" cy="30" rx="56" ry="12" fill="#8a7e60" stroke="#2a1a08" stroke-width="2"/>
    <ellipse cx="0" cy="22" rx="44" ry="10" fill="#b8a890" stroke="#2a1a08" stroke-width="2"/>
    <ellipse cx="0" cy="14" rx="32" ry="8" fill="#e8dcbc" stroke="#2a1a08" stroke-width="2"/>
    <!-- gold pillar -->
    <rect x="-12" y="-30" width="24" height="46" fill="#ffd700" stroke="#3a2208" stroke-width="2"/>
    <rect x="-16" y="-34" width="32" height="6" fill="#fff6a8" stroke="#3a2208" stroke-width="2"/>
    <!-- top star -->
    <polygon points="0,-60 4,-48 16,-46 6,-40 8,-28 0,-36 -8,-28 -6,-40 -16,-46 -4,-48" fill="#fffbd0" stroke="#ffd700" stroke-width="1.5"/>

    <!-- 3 legendary skill pickup hints floating around -->
    <g transform="translate(-80,10)">
      <rect x="-12" y="-12" width="24" height="24" rx="3" fill="#1a0e02" stroke="#ffd700" stroke-width="2"/>
      <polygon points="0,-7 2,-2 7,-2 3,1 4,6 0,3 -4,6 -3,1 -7,-2 -2,-2" fill="#ffd700"/>
    </g>
    <g transform="translate(80,10)">
      <rect x="-12" y="-12" width="24" height="24" rx="3" fill="#1a0e02" stroke="#ffd700" stroke-width="2"/>
      <polygon points="0,-7 2,-2 7,-2 3,1 4,6 0,3 -4,6 -3,1 -7,-2 -2,-2" fill="#ffd700"/>
    </g>
    <g transform="translate(0,-70)">
      <rect x="-12" y="-12" width="24" height="24" rx="3" fill="#1a0e02" stroke="#ffd700" stroke-width="2"/>
      <polygon points="0,-7 2,-2 7,-2 3,1 4,6 0,3 -4,6 -3,1 -7,-2 -2,-2" fill="#ffd700"/>
    </g>

    <!-- "3 LEGENDARY" label -->
    <text x="0" y="62" font-family='"PingFang SC","Noto Sans CJK SC",Arial,system-ui,sans-serif' font-size="13" font-weight="900" fill="#ffd700" text-anchor="middle" style="paint-order:stroke;stroke:#1a0e02;stroke-width:3px;">× 3 LEGENDARY</text>
  </g>

  <!-- big arrow pointing TO altar (from right, down to left) -->
  <g transform="translate(292,180)">
    <path d="M0 0 L-24 0 M-18 -6 L-24 0 L-18 6" stroke="#ffd700" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- instructional card (right) -->
  <g transform="translate(320,40)">
    <rect width="300" height="210" rx="8" fill="url(#t3Card)" stroke="#ffd700" stroke-width="3"/>
    <rect x="6" y="6" width="288" height="198" rx="5" fill="none" stroke="#8a5e18" stroke-width="1"/>
    <rect x="14" y="14" width="60" height="22" rx="3" fill="#ffd700"/>
    <text x="44" y="30" font-family='"PingFang SC","Noto Sans CJK SC",Arial,system-ui,sans-serif' font-size="12" font-weight="bold" fill="#1a0e02" text-anchor="middle">STEP 3/3</text>
    <text x="150" y="68" font-family='"PingFang SC","Noto Sans CJK SC",Arial,system-ui,sans-serif' font-size="22" font-weight="900" fill="#ffd700" text-anchor="middle" style="paint-order:stroke;stroke:#1a0e02;stroke-width:4px;">BREAK THE ALTAR</text>
    <text x="150" y="96" font-family='"PingFang SC","Noto Sans CJK SC",Arial,system-ui,sans-serif' font-size="18" font-weight="bold" fill="#fff6a8" text-anchor="middle" style="paint-order:stroke;stroke:#1a0e02;stroke-width:3px;">击破中央祭坛</text>
    <!-- reward list -->
    <g transform="translate(30,118)">
      <circle cx="0" cy="0" r="3" fill="#ffd700"/>
      <text x="10" y="4" font-family='"PingFang SC","Noto Sans CJK SC",Arial,system-ui,sans-serif' font-size="12" fill="#e8dcbc">3× Legendary skills · 3 张传说技能</text>
    </g>
    <g transform="translate(30,140)">
      <circle cx="0" cy="0" r="3" fill="#ffd700"/>
      <text x="10" y="4" font-family='"PingFang SC","Noto Sans CJK SC",Arial,system-ui,sans-serif' font-size="12" fill="#e8dcbc">Crown · 圣堂之主光环 5 min</text>
    </g>
    <g transform="translate(30,162)">
      <circle cx="0" cy="0" r="3" fill="#ffd700"/>
      <text x="10" y="4" font-family='"PingFang SC","Noto Sans CJK SC",Arial,system-ui,sans-serif' font-size="12" fill="#e8dcbc">Enemies slowed 30% · 全场减速 3 min</text>
    </g>
    <text x="150" y="196" font-family='"PingFang SC","Noto Sans CJK SC",Arial,system-ui,sans-serif' font-size="11" fill="#a89878" text-anchor="middle">Tap to start · 点击开始</text>
  </g>

  <!-- progress dots -->
  <g transform="translate(320,338)">
    <circle cx="-14" cy="0" r="5" fill="#8a5e18" stroke="#ffd700" stroke-width="1.5"/>
    <circle cx="0"   cy="0" r="5" fill="#8a5e18" stroke="#ffd700" stroke-width="1.5"/>
    <circle cx="14"  cy="0" r="5" fill="#ffd700"/>
  </g>
</svg>
