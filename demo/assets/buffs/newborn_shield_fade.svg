<svg xmlns="http://www.w3.org/2000/svg" width="400" height="80" viewBox="0 0 400 80">
  <!-- Newborn shield fade atlas. 5 frames × 80×80. Static (no animate) — perf friendly.
       Developer rasterises once at load, then draws frame by player.newbornShieldT:
         t > 15  → frame 0  (100% visual — full halo + double ring + 6 badges + particles)
         t 15-20 → frame 1  (80%  — full halo + double ring + 6 badges, no particles)
         t 20-25 → frame 2  (50%  — smaller halo + single ring + 4 badges)
         t 25-28 → frame 3  (30%  — faint halo + 2 badges)
         t 28-30 → frame 4  (flicker — only lone badge blink)
       No SVG animate = one-time drawImage on offscreen canvas, zero per-frame cost after. -->
  <defs>
    <radialGradient id="fHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#fff4a0" stop-opacity="0.85"/>
      <stop offset="50%" stop-color="#ffd966" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#c89028" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fShield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#fff6c8"/>
      <stop offset="50%" stop-color="#ffd966"/>
      <stop offset="100%" stop-color="#8a5e18"/>
    </linearGradient>
  </defs>

  <!-- ============ Frame 0 — 100% (0-15s) ============ -->
  <g transform="translate(0,0)">
    <circle cx="40" cy="40" r="36" fill="url(#fHalo)"/>
    <circle cx="40" cy="40" r="34" fill="none" stroke="#ffd700" stroke-width="1.5" stroke-dasharray="8 4" opacity="0.85"/>
    <circle cx="40" cy="40" r="26" fill="none" stroke="#fff4c8" stroke-width="1" stroke-dasharray="4 3" opacity="0.75"/>
    <!-- 6 shield badges -->
    <g transform="rotate(0 40 40)"><g transform="translate(40,10)"><path d="M0 -4 L6 -2 L6 4 Q6 10 0 12 Q-6 10 -6 4 L-6 -2 Z" fill="url(#fShield)" stroke="#3a2208" stroke-width="1" stroke-linejoin="round"/><path d="M-3 2 L-1 5 L3 -1" stroke="#fff" stroke-width="1.2" fill="none"/></g></g>
    <g transform="rotate(60 40 40)"><g transform="translate(40,10)"><path d="M0 -4 L6 -2 L6 4 Q6 10 0 12 Q-6 10 -6 4 L-6 -2 Z" fill="url(#fShield)" stroke="#3a2208" stroke-width="1" stroke-linejoin="round"/><path d="M-3 2 L-1 5 L3 -1" stroke="#fff" stroke-width="1.2" fill="none"/></g></g>
    <g transform="rotate(120 40 40)"><g transform="translate(40,10)"><path d="M0 -4 L6 -2 L6 4 Q6 10 0 12 Q-6 10 -6 4 L-6 -2 Z" fill="url(#fShield)" stroke="#3a2208" stroke-width="1" stroke-linejoin="round"/><path d="M-3 2 L-1 5 L3 -1" stroke="#fff" stroke-width="1.2" fill="none"/></g></g>
    <g transform="rotate(180 40 40)"><g transform="translate(40,10)"><path d="M0 -4 L6 -2 L6 4 Q6 10 0 12 Q-6 10 -6 4 L-6 -2 Z" fill="url(#fShield)" stroke="#3a2208" stroke-width="1" stroke-linejoin="round"/><path d="M-3 2 L-1 5 L3 -1" stroke="#fff" stroke-width="1.2" fill="none"/></g></g>
    <g transform="rotate(240 40 40)"><g transform="translate(40,10)"><path d="M0 -4 L6 -2 L6 4 Q6 10 0 12 Q-6 10 -6 4 L-6 -2 Z" fill="url(#fShield)" stroke="#3a2208" stroke-width="1" stroke-linejoin="round"/><path d="M-3 2 L-1 5 L3 -1" stroke="#fff" stroke-width="1.2" fill="none"/></g></g>
    <g transform="rotate(300 40 40)"><g transform="translate(40,10)"><path d="M0 -4 L6 -2 L6 4 Q6 10 0 12 Q-6 10 -6 4 L-6 -2 Z" fill="url(#fShield)" stroke="#3a2208" stroke-width="1" stroke-linejoin="round"/><path d="M-3 2 L-1 5 L3 -1" stroke="#fff" stroke-width="1.2" fill="none"/></g></g>
    <!-- sparkles -->
    <g fill="#fffbd0">
      <circle cx="20" cy="40" r="1.8"/><circle cx="60" cy="44" r="1.8"/>
      <circle cx="40" cy="22" r="1.5"/><circle cx="40" cy="58" r="1.5"/>
    </g>
  </g>

  <!-- ============ Frame 1 — 80% (15-20s) ============ -->
  <g transform="translate(80,0)">
    <circle cx="40" cy="40" r="34" fill="url(#fHalo)" opacity="0.8"/>
    <circle cx="40" cy="40" r="32" fill="none" stroke="#ffd700" stroke-width="1.4" stroke-dasharray="8 4" opacity="0.7"/>
    <circle cx="40" cy="40" r="24" fill="none" stroke="#fff4c8" stroke-width="1" stroke-dasharray="4 3" opacity="0.6"/>
    <g transform="rotate(0 40 40)"><g transform="translate(40,12)"><path d="M0 -4 L6 -2 L6 4 Q6 10 0 12 Q-6 10 -6 4 L-6 -2 Z" fill="url(#fShield)" stroke="#3a2208" stroke-width="1" stroke-linejoin="round"/><path d="M-3 2 L-1 5 L3 -1" stroke="#fff" stroke-width="1.2" fill="none"/></g></g>
    <g transform="rotate(60 40 40)"><g transform="translate(40,12)"><path d="M0 -4 L6 -2 L6 4 Q6 10 0 12 Q-6 10 -6 4 L-6 -2 Z" fill="url(#fShield)" stroke="#3a2208" stroke-width="1" stroke-linejoin="round"/><path d="M-3 2 L-1 5 L3 -1" stroke="#fff" stroke-width="1.2" fill="none"/></g></g>
    <g transform="rotate(120 40 40)"><g transform="translate(40,12)"><path d="M0 -4 L6 -2 L6 4 Q6 10 0 12 Q-6 10 -6 4 L-6 -2 Z" fill="url(#fShield)" stroke="#3a2208" stroke-width="1" stroke-linejoin="round"/><path d="M-3 2 L-1 5 L3 -1" stroke="#fff" stroke-width="1.2" fill="none"/></g></g>
    <g transform="rotate(180 40 40)"><g transform="translate(40,12)"><path d="M0 -4 L6 -2 L6 4 Q6 10 0 12 Q-6 10 -6 4 L-6 -2 Z" fill="url(#fShield)" stroke="#3a2208" stroke-width="1" stroke-linejoin="round"/><path d="M-3 2 L-1 5 L3 -1" stroke="#fff" stroke-width="1.2" fill="none"/></g></g>
    <g transform="rotate(240 40 40)"><g transform="translate(40,12)"><path d="M0 -4 L6 -2 L6 4 Q6 10 0 12 Q-6 10 -6 4 L-6 -2 Z" fill="url(#fShield)" stroke="#3a2208" stroke-width="1" stroke-linejoin="round"/><path d="M-3 2 L-1 5 L3 -1" stroke="#fff" stroke-width="1.2" fill="none"/></g></g>
    <g transform="rotate(300 40 40)"><g transform="translate(40,12)"><path d="M0 -4 L6 -2 L6 4 Q6 10 0 12 Q-6 10 -6 4 L-6 -2 Z" fill="url(#fShield)" stroke="#3a2208" stroke-width="1" stroke-linejoin="round"/><path d="M-3 2 L-1 5 L3 -1" stroke="#fff" stroke-width="1.2" fill="none"/></g></g>
  </g>

  <!-- ============ Frame 2 — 50% (20-25s) ============ -->
  <g transform="translate(160,0)">
    <circle cx="40" cy="40" r="30" fill="url(#fHalo)" opacity="0.6"/>
    <circle cx="40" cy="40" r="28" fill="none" stroke="#ffd700" stroke-width="1.2" stroke-dasharray="6 5" opacity="0.55"/>
    <g transform="rotate(0 40 40)"><g transform="translate(40,15)"><path d="M0 -4 L6 -2 L6 4 Q6 10 0 12 Q-6 10 -6 4 L-6 -2 Z" fill="url(#fShield)" stroke="#3a2208" stroke-width="1" stroke-linejoin="round" opacity="0.8"/></g></g>
    <g transform="rotate(90 40 40)"><g transform="translate(40,15)"><path d="M0 -4 L6 -2 L6 4 Q6 10 0 12 Q-6 10 -6 4 L-6 -2 Z" fill="url(#fShield)" stroke="#3a2208" stroke-width="1" stroke-linejoin="round" opacity="0.8"/></g></g>
    <g transform="rotate(180 40 40)"><g transform="translate(40,15)"><path d="M0 -4 L6 -2 L6 4 Q6 10 0 12 Q-6 10 -6 4 L-6 -2 Z" fill="url(#fShield)" stroke="#3a2208" stroke-width="1" stroke-linejoin="round" opacity="0.8"/></g></g>
    <g transform="rotate(270 40 40)"><g transform="translate(40,15)"><path d="M0 -4 L6 -2 L6 4 Q6 10 0 12 Q-6 10 -6 4 L-6 -2 Z" fill="url(#fShield)" stroke="#3a2208" stroke-width="1" stroke-linejoin="round" opacity="0.8"/></g></g>
  </g>

  <!-- ============ Frame 3 — 30% (25-28s) ============ -->
  <g transform="translate(240,0)">
    <circle cx="40" cy="40" r="26" fill="url(#fHalo)" opacity="0.4"/>
    <circle cx="40" cy="40" r="24" fill="none" stroke="#ffd700" stroke-width="1" stroke-dasharray="4 6" opacity="0.4"/>
    <g transform="rotate(0 40 40)"><g transform="translate(40,18)"><path d="M0 -4 L6 -2 L6 4 Q6 10 0 12 Q-6 10 -6 4 L-6 -2 Z" fill="url(#fShield)" stroke="#3a2208" stroke-width="1" stroke-linejoin="round" opacity="0.65"/></g></g>
    <g transform="rotate(180 40 40)"><g transform="translate(40,18)"><path d="M0 -4 L6 -2 L6 4 Q6 10 0 12 Q-6 10 -6 4 L-6 -2 Z" fill="url(#fShield)" stroke="#3a2208" stroke-width="1" stroke-linejoin="round" opacity="0.65"/></g></g>
  </g>

  <!-- ============ Frame 4 — Flicker (28-30s) ============ -->
  <g transform="translate(320,0)">
    <circle cx="40" cy="40" r="20" fill="url(#fHalo)" opacity="0.25"/>
    <g transform="translate(40,22)"><path d="M0 -4 L6 -2 L6 4 Q6 10 0 12 Q-6 10 -6 4 L-6 -2 Z" fill="url(#fShield)" stroke="#3a2208" stroke-width="1" stroke-linejoin="round" opacity="0.5"/></g>
  </g>
</svg>
