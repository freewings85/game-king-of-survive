<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80">
  <!-- Altar Master Aura — 击破祭坛的玩家获得，5min 持续。
       80×80, anchor (40, 40). Same format as other 80px auras (r3/synergy / buffs/newborn).
       Gold + purple royal crown iconography. Static — no animate, perf-friendly.
       Developer may add: slow alpha pulse via ctx.globalAlpha = 0.85 + 0.15*Math.sin(t*2). -->
  <defs>
    <radialGradient id="amCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#ffd9ff" stop-opacity="0.3"/>
      <stop offset="40%" stop-color="#ffea80" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#7a2a8a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="amGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#fff6c8"/>
      <stop offset="50%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#8a5e18"/>
    </linearGradient>
    <linearGradient id="amPurple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#e0b0ff"/>
      <stop offset="100%" stop-color="#4a1a7a"/>
    </linearGradient>
  </defs>

  <!-- outer purple glow (royal) -->
  <circle cx="40" cy="40" r="38" fill="#b078e8" opacity="0.25"/>
  <!-- main gold + purple halo -->
  <circle cx="40" cy="40" r="36" fill="url(#amCore)"/>

  <!-- 12 radial rays (long) -->
  <g stroke="#ffd700" stroke-width="1.2" opacity="0.75" stroke-linecap="round">
    <line x1="40" y1="6"  x2="40" y2="14"/>
    <line x1="40" y1="66" x2="40" y2="74"/>
    <line x1="6"  y1="40" x2="14" y2="40"/>
    <line x1="66" y1="40" x2="74" y2="40"/>
    <line x1="16" y1="16" x2="22" y2="22"/>
    <line x1="58" y1="58" x2="64" y2="64"/>
    <line x1="64" y1="16" x2="58" y2="22"/>
    <line x1="16" y1="64" x2="22" y2="58"/>
    <line x1="40" y1="10" x2="34" y2="18"/>
    <line x1="40" y1="10" x2="46" y2="18"/>
    <line x1="40" y1="70" x2="34" y2="62"/>
    <line x1="40" y1="70" x2="46" y2="62"/>
  </g>

  <!-- outer ornate ring -->
  <circle cx="40" cy="40" r="32" fill="none" stroke="#ffd700" stroke-width="2" opacity="0.85"/>
  <circle cx="40" cy="40" r="32" fill="none" stroke="#4a1a7a" stroke-width="1" stroke-dasharray="2 4" opacity="0.7"/>
  <!-- inner ring -->
  <circle cx="40" cy="40" r="22" fill="none" stroke="#ffea80" stroke-width="1.2" stroke-dasharray="6 3" opacity="0.75"/>

  <!-- 4 corner purple gems (diamond shapes) -->
  <g stroke="#2a0a3a" stroke-width="1" stroke-linejoin="round">
    <polygon points="40,8 44,12 40,16 36,12" fill="url(#amPurple)"/>
    <polygon points="40,72 44,68 40,64 36,68" fill="url(#amPurple)"/>
    <polygon points="8,40 12,44 16,40 12,36" fill="url(#amPurple)"/>
    <polygon points="72,40 68,44 64,40 68,36" fill="url(#amPurple)"/>
  </g>

  <!-- central CROWN (gold, king of altar) -->
  <g stroke="#3a2208" stroke-width="1.5" stroke-linejoin="round">
    <!-- band -->
    <rect x="28" y="44" width="24" height="8" fill="url(#amGold)"/>
    <!-- spikes -->
    <polygon points="28,44 30,32 34,40 38,30 42,40 46,30 50,40 54,32 52,44" fill="url(#amGold)"/>
    <!-- gems on spikes -->
    <circle cx="34" cy="38" r="1.8" fill="#b078e8"/>
    <circle cx="40" cy="34" r="2.2" fill="#c84a3a"/>
    <circle cx="46" cy="38" r="1.8" fill="#b078e8"/>
    <!-- band details -->
    <line x1="30" y1="48" x2="50" y2="48" stroke="#8a5e18" stroke-width="0.8"/>
    <circle cx="40" cy="48" r="1.2" fill="#ffffff" stroke="#8a5e18" stroke-width="0.6"/>
  </g>

  <!-- floating purple sparkles (royal) -->
  <g fill="#e0b0ff">
    <circle cx="18" cy="26" r="1.2"/>
    <circle cx="62" cy="28" r="1.2"/>
    <circle cx="20" cy="56" r="1"/>
    <circle cx="60" cy="54" r="1"/>
  </g>
  <g fill="#fff">
    <circle cx="28" cy="22" r="0.8"/>
    <circle cx="52" cy="20" r="0.8"/>
    <circle cx="26" cy="60" r="0.8"/>
    <circle cx="54" cy="62" r="0.8"/>
  </g>
</svg>
