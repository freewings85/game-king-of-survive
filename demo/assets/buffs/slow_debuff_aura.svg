<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80">
  <!-- Slow debuff aura — 圣堂之主激活 3 分钟全场敌人减速视觉。
       80×80 anchor (40,40), same format as buffs/newborn/altar_master.
       Purple fog + slow clock icon + sinking particles + chains motif.
       Static SVG — Developer rasterises once; per-frame alpha pulse ok in code. -->
  <defs>
    <radialGradient id="slowHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#b78ed8" stop-opacity="0.55"/>
      <stop offset="55%"  stop-color="#7a4aa8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#3a1a5a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="slowCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#e4c8f8" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#7a4aa8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="clockFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c0a0e0"/>
      <stop offset="100%" stop-color="#5a2a7a"/>
    </linearGradient>
  </defs>

  <!-- outer fog halo (wide, hazy) -->
  <circle cx="40" cy="40" r="38" fill="url(#slowHalo)"/>
  <!-- inner core glow -->
  <circle cx="40" cy="40" r="24" fill="url(#slowCore)"/>

  <!-- chain ring (slow = chains) — 8 segments -->
  <g stroke="#3a1a5a" stroke-width="1.4" fill="#8a5ab0">
    <ellipse cx="40" cy="12" rx="4" ry="2.5"/>
    <ellipse cx="60" cy="20" rx="4" ry="2.5" transform="rotate(45 60 20)"/>
    <ellipse cx="68" cy="40" rx="4" ry="2.5" transform="rotate(90 68 40)"/>
    <ellipse cx="60" cy="60" rx="4" ry="2.5" transform="rotate(135 60 60)"/>
    <ellipse cx="40" cy="68" rx="4" ry="2.5"/>
    <ellipse cx="20" cy="60" rx="4" ry="2.5" transform="rotate(45 20 60)"/>
    <ellipse cx="12" cy="40" rx="4" ry="2.5" transform="rotate(90 12 40)"/>
    <ellipse cx="20" cy="20" rx="4" ry="2.5" transform="rotate(135 20 20)"/>
  </g>

  <!-- central slow-clock icon -->
  <g stroke="#2a0a3a" stroke-width="1.5" stroke-linejoin="round">
    <!-- clock body -->
    <circle cx="40" cy="42" r="12" fill="url(#clockFace)"/>
    <circle cx="40" cy="42" r="12" fill="none" stroke="#ffd966" stroke-width="1.5"/>
    <!-- hour ticks -->
    <g stroke="#2a0a3a" stroke-width="1.2">
      <line x1="40" y1="32" x2="40" y2="34"/>
      <line x1="50" y1="42" x2="48" y2="42"/>
      <line x1="40" y1="52" x2="40" y2="50"/>
      <line x1="30" y1="42" x2="32" y2="42"/>
    </g>
    <!-- slow hands (near-stopped, pointing to "7") -->
    <line x1="40" y1="42" x2="40" y2="34" stroke="#fffbd0" stroke-width="2" stroke-linecap="round"/>
    <line x1="40" y1="42" x2="33" y2="48" stroke="#ff6a6a" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="40" cy="42" r="1.5" fill="#fffbd0"/>
    <!-- clock top button -->
    <rect x="38" y="26" width="4" height="4" fill="#7a4aa8" stroke="#2a0a3a" stroke-width="1"/>
    <!-- little "z z" sleep marks (indicating slow) -->
    <text x="54" y="26"
          font-family='"PingFang SC","Noto Sans CJK SC",Arial,system-ui,sans-serif'
          font-size="9" font-weight="bold"
          fill="#e4c8f8"
          style="paint-order:stroke;stroke:#2a0a3a;stroke-width:1.8px;">z</text>
    <text x="60" y="20"
          font-family='"PingFang SC","Noto Sans CJK SC",Arial,system-ui,sans-serif'
          font-size="7" font-weight="bold"
          fill="#e4c8f8"
          style="paint-order:stroke;stroke:#2a0a3a;stroke-width:1.6px;">z</text>
  </g>

  <!-- sinking particles (motion-feel: downward drift) -->
  <g fill="#b78ed8" opacity="0.85">
    <circle cx="18" cy="32" r="1.4"/>
    <circle cx="62" cy="36" r="1.4"/>
    <circle cx="24" cy="56" r="1.2"/>
    <circle cx="56" cy="58" r="1.2"/>
    <circle cx="40" cy="18" r="1"/>
    <circle cx="40" cy="66" r="1"/>
  </g>
  <!-- slow streaks (downward motion hint) -->
  <g stroke="#7a4aa8" stroke-width="1" stroke-linecap="round" opacity="0.65">
    <line x1="14" y1="30" x2="14" y2="38"/>
    <line x1="66" y1="30" x2="66" y2="38"/>
    <line x1="14" y1="50" x2="14" y2="58"/>
    <line x1="66" y1="50" x2="66" y2="58"/>
  </g>
</svg>
