<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80">
  <!-- Newborn Shield — 50% damage reduction for first 20s in arena_a.
       80×80, anchor (40, 40), drawn centered under player sprite.
       Matches r3/synergy_aura_*.png format (same size/anchor) for swap-compat.
       Gold halo + rotating shield runes + divine feather sparkles — HoMM3 warm cartoon. -->
  <defs>
    <radialGradient id="nbHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#fff4a0" stop-opacity="0.85"/>
      <stop offset="50%" stop-color="#ffd966" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#c89028" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="nbShield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#fff6c8"/>
      <stop offset="50%" stop-color="#ffd966"/>
      <stop offset="100%" stop-color="#8a5e18"/>
    </linearGradient>
  </defs>

  <!-- pulsing halo -->
  <circle cx="40" cy="40" r="36" fill="url(#nbHalo)">
    <animate attributeName="r" values="32;38;32" dur="1.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="1.6s" repeatCount="indefinite"/>
  </circle>

  <!-- outer rotating rune ring (slow) -->
  <g>
    <circle cx="40" cy="40" r="34" fill="none" stroke="#ffd700" stroke-width="1.5" stroke-dasharray="8 4" opacity="0.8">
      <animateTransform attributeName="transform" type="rotate" from="0 40 40" to="360 40 40" dur="6s" repeatCount="indefinite"/>
    </circle>
  </g>
  <!-- inner rotating ring (faster, opposite direction) -->
  <g>
    <circle cx="40" cy="40" r="26" fill="none" stroke="#fff4c8" stroke-width="1" stroke-dasharray="4 3" opacity="0.7">
      <animateTransform attributeName="transform" type="rotate" from="360 40 40" to="0 40 40" dur="3.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- 6 shield badges around perimeter (rotate together slow) -->
  <g>
    <g transform="rotate(0 40 40)">
      <g transform="translate(40,10)">
        <path d="M0 -4 L6 -2 L6 4 Q6 10 0 12 Q-6 10 -6 4 L-6 -2 Z"
              fill="url(#nbShield)" stroke="#3a2208" stroke-width="1" stroke-linejoin="round"/>
        <path d="M-3 2 L-1 5 L3 -1" stroke="#fff" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      </g>
    </g>
    <g transform="rotate(60 40 40)">
      <g transform="translate(40,10)">
        <path d="M0 -4 L6 -2 L6 4 Q6 10 0 12 Q-6 10 -6 4 L-6 -2 Z"
              fill="url(#nbShield)" stroke="#3a2208" stroke-width="1" stroke-linejoin="round"/>
        <path d="M-3 2 L-1 5 L3 -1" stroke="#fff" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      </g>
    </g>
    <g transform="rotate(120 40 40)">
      <g transform="translate(40,10)">
        <path d="M0 -4 L6 -2 L6 4 Q6 10 0 12 Q-6 10 -6 4 L-6 -2 Z"
              fill="url(#nbShield)" stroke="#3a2208" stroke-width="1" stroke-linejoin="round"/>
        <path d="M-3 2 L-1 5 L3 -1" stroke="#fff" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      </g>
    </g>
    <g transform="rotate(180 40 40)">
      <g transform="translate(40,10)">
        <path d="M0 -4 L6 -2 L6 4 Q6 10 0 12 Q-6 10 -6 4 L-6 -2 Z"
              fill="url(#nbShield)" stroke="#3a2208" stroke-width="1" stroke-linejoin="round"/>
        <path d="M-3 2 L-1 5 L3 -1" stroke="#fff" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      </g>
    </g>
    <g transform="rotate(240 40 40)">
      <g transform="translate(40,10)">
        <path d="M0 -4 L6 -2 L6 4 Q6 10 0 12 Q-6 10 -6 4 L-6 -2 Z"
              fill="url(#nbShield)" stroke="#3a2208" stroke-width="1" stroke-linejoin="round"/>
        <path d="M-3 2 L-1 5 L3 -1" stroke="#fff" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      </g>
    </g>
    <g transform="rotate(300 40 40)">
      <g transform="translate(40,10)">
        <path d="M0 -4 L6 -2 L6 4 Q6 10 0 12 Q-6 10 -6 4 L-6 -2 Z"
              fill="url(#nbShield)" stroke="#3a2208" stroke-width="1" stroke-linejoin="round"/>
        <path d="M-3 2 L-1 5 L3 -1" stroke="#fff" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      </g>
    </g>
    <!-- whole ring slowly rotates -->
    <animateTransform attributeName="transform" type="rotate" from="0 40 40" to="360 40 40" dur="8s" repeatCount="indefinite"/>
  </g>

  <!-- divine sparkles (floating feathers/orbs) -->
  <g fill="#fffbd0">
    <circle cx="20" cy="40" r="1.6">
      <animate attributeName="cy" values="48;32;48" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="60" cy="44" r="1.6">
      <animate attributeName="cy" values="52;36;52" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="40" cy="22" r="1.4">
      <animate attributeName="cy" values="28;14;28" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="40" cy="58" r="1.4">
      <animate attributeName="cy" values="62;50;62" dur="2.3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.3s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
