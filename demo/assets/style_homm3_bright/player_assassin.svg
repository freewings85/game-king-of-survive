<svg xmlns="http://www.w3.org/2000/svg" width="256" height="384" viewBox="0 0 256 384" shape-rendering="geometricPrecision">
  <!-- player_assassin — HoMM3 4x6 sprite sheet. 64px frame, 256×384.
       row 0 walk up / 1 walk left / 2 walk down / 3 walk right / 4 attack / 5 death
       Palette: 黑斗篷 #1a0a22 / 暗紫内衬 #4a1a4a / 银刀 #c8ccd8 + 金柄 #ffd700 /
                 皮肤 #e8cba0 / 眼 #ff3a1a 红 / 紫线 #7a2aa8
       SVG drawn directly; Developer drawImage(svgImg, col*64, row*64, 64, 64, ...) works
       as long as browser has rasterised the SVG once (same as r3/buffs sprites). -->
  <defs>
    <linearGradient id="aCloak" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1434"/>
      <stop offset="100%" stop-color="#0a0212"/>
    </linearGradient>
    <linearGradient id="aBlade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f2f8"/>
      <stop offset="100%" stop-color="#6a6e7e"/>
    </linearGradient>
    <linearGradient id="aHilt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd966"/>
      <stop offset="100%" stop-color="#8a5e18"/>
    </linearGradient>
  </defs>

  <style>
    .shadow { fill: #000; opacity: 0.45; }
    .cloak  { fill: url(#aCloak); stroke: #000; stroke-width: 1.2; stroke-linejoin: round; }
    .inner  { fill: #4a1a4a; stroke: #000; stroke-width: 1; }
    .skin   { fill: #e8cba0; stroke: #3a1a08; stroke-width: 1; }
    .boot   { fill: #1a0a12; stroke: #000; stroke-width: 1; }
    .blade  { fill: url(#aBlade); stroke: #2a2a34; stroke-width: 1; stroke-linejoin: round; }
    .hilt   { fill: url(#aHilt); stroke: #3a2208; stroke-width: 1; }
    .eye    { fill: #ff3a1a; }
    .purple { stroke: #7a2aa8; stroke-width: 1.4; fill: none; stroke-linecap: round; }
    .smoke  { fill: #7a2aa8; opacity: 0.3; }
  </style>

  <!-- ============ ROW 0 : WALK UP (背朝镜头，看到兜帽+斗篷背) ============ -->
  <!-- frame 0 -->
  <g transform="translate(0,0)">
    <ellipse cx="32" cy="58" rx="14" ry="3" class="shadow"/>
    <rect x="22" y="44" width="8" height="14" class="boot"/>
    <rect x="34" y="44" width="8" height="14" class="boot"/>
    <path d="M14 22 Q14 48 20 56 L44 56 Q50 48 50 22 L42 18 L22 18 Z" class="cloak"/>
    <circle cx="32" cy="16" r="10" class="cloak"/>
    <path d="M24 10 Q32 4 40 10 L40 20 L24 20 Z" class="cloak"/>
  </g>
  <!-- frame 1 (right foot forward) -->
  <g transform="translate(64,0)">
    <ellipse cx="32" cy="58" rx="14" ry="3" class="shadow"/>
    <rect x="22" y="46" width="8" height="14" class="boot"/>
    <rect x="34" y="42" width="8" height="14" class="boot"/>
    <path d="M14 22 Q14 48 20 56 L44 56 Q50 48 50 22 L42 18 L22 18 Z" class="cloak"/>
    <circle cx="32" cy="16" r="10" class="cloak"/>
    <path d="M24 10 Q32 4 40 10 L40 20 L24 20 Z" class="cloak"/>
