    <g transform="translate(50,30) rotate(25)"><rect x="0" y="0" width="10" height="3" class="blade"/><rect x="10" y="-1" width="3" height="5" class="hilt"/></g>
    <path d="M20 22 L44 22" class="purple"/>
  </g>

