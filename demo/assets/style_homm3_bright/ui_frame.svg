<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 256" width="512" height="256">
  <defs>
    <linearGradient id="h3Parch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0dca0"/>
      <stop offset="60%" stop-color="#d4b46a"/>
      <stop offset="100%" stop-color="#a88438"/>
    </linearGradient>
    <linearGradient id="h3Gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff6a8"/>
      <stop offset="40%" stop-color="#f4d42a"/>
      <stop offset="100%" stop-color="#8a5a0a"/>
    </linearGradient>
    <radialGradient id="h3Gem" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="30%" stop-color="#ff9a9a"/>
      <stop offset="100%" stop-color="#8a0a0a"/>
    </radialGradient>
  </defs>
  <rect width="512" height="256" fill="#1c4a72"/>
  <!-- scroll ends (left+right ornate curls) -->
  <g>
    <ellipse cx="32" cy="128" rx="18" ry="100" fill="url(#h3Gold)" stroke="#5a3a08" stroke-width="2"/>
    <ellipse cx="32" cy="30" rx="18" ry="10" fill="url(#h3Gold)" stroke="#5a3a08" stroke-width="2"/>
    <ellipse cx="32" cy="226" rx="18" ry="10" fill="url(#h3Gold)" stroke="#5a3a08" stroke-width="2"/>
    <ellipse cx="480" cy="128" rx="18" ry="100" fill="url(#h3Gold)" stroke="#5a3a08" stroke-width="2"/>
    <ellipse cx="480" cy="30" rx="18" ry="10" fill="url(#h3Gold)" stroke="#5a3a08" stroke-width="2"/>
    <ellipse cx="480" cy="226" rx="18" ry="10" fill="url(#h3Gold)" stroke="#5a3a08" stroke-width="2"/>
  </g>
  <!-- parchment -->
  <path d="M50 28 L462 28 L462 228 L50 228 Z" fill="url(#h3Parch)" stroke="#5a3a08" stroke-width="2"/>
  <!-- parchment stains -->
  <ellipse cx="120" cy="60" rx="28" ry="8" fill="#8a6230" opacity="0.2"/>
  <ellipse cx="380" cy="190" rx="32" ry="10" fill="#8a6230" opacity="0.2"/>
  <!-- gold inner border -->
  <rect x="60" y="38" width="392" height="180" fill="none" stroke="url(#h3Gold)" stroke-width="3"/>
  <rect x="66" y="44" width="380" height="168" fill="none" stroke="#8a5a0a" stroke-width="1"/>
  <!-- corner flourishes (gold curls) -->
  <g fill="url(#h3Gold)" stroke="#5a3a08" stroke-width="1.5">
    <path d="M60 38 Q60 28 70 28 Q80 28 82 38 Q74 34 68 40 Q62 46 60 38 Z"/>
    <path d="M452 38 Q452 28 442 28 Q432 28 430 38 Q438 34 444 40 Q450 46 452 38 Z"/>
    <path d="M60 218 Q60 228 70 228 Q80 228 82 218 Q74 222 68 216 Q62 210 60 218 Z"/>
    <path d="M452 218 Q452 228 442 228 Q432 228 430 218 Q438 222 444 216 Q450 210 452 218 Z"/>
  </g>
  <!-- top banner gem -->
  <g transform="translate(256,36)">
    <polygon points="-18,0 -10,-12 10,-12 18,0 10,12 -10,12" fill="url(#h3Gem)" stroke="#5a0a0a" stroke-width="2"/>
    <polygon points="-10,-12 10,-12 6,-6 -6,-6" fill="#ffbaba" opacity="0.8"/>
  </g>
  <!-- title -->
  <text x="256" y="140" text-anchor="middle" font-family="Georgia, serif" font-size="26" fill="#5a3a08" font-weight="bold">Kingdom Inventory</text>
  <text x="256" y="170" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#8a5a0a" font-style="italic">— by decree of the King —</text>
  <text x="256" y="248" text-anchor="middle" font-family="serif" font-size="10" fill="#f0dca0">homm3_bright · ui_frame</text>
</svg>
