  <circle cx="134" cy="98" r="1.6" fill="#000"/>
  <!-- magic staff with glowing orb -->
  <line x1="200" y1="60" x2="170" y2="170" stroke="#6a3a14" stroke-width="5" stroke-linecap="round"/>
  <circle cx="204" cy="54" r="16" fill="url(#h3Orb)" stroke="#0a1a4a" stroke-width="2"/>
  <circle cx="198" cy="48" r="4" fill="#fff" opacity="0.8"/>
