<svg xmlns="http://www.w3.org/2000/svg" width="384" height="64" viewBox="0 0 384 64">
  <!-- Editor tool icons. 12 × 32px, single row atlas 384×64 (row 0, but 64h for safe padding).
       Each icon is 32×32 centered in its cell. HoMM3 warm cartoon palette. -->
  <defs>
    <linearGradient id="iBG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2a14"/><stop offset="100%" stop-color="#1e1208"/>
    </linearGradient>
    <linearGradient id="iGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe088"/><stop offset="100%" stop-color="#c89028"/>
    </linearGradient>
  </defs>

  <!-- index labels in JSON: 0..11 -->

  <!-- 0 Brush -->
  <g transform="translate(0,16)">
    <rect width="32" height="32" fill="none"/>
    <g stroke="#1e1208" stroke-width="1.5" stroke-linejoin="round">
      <rect x="6" y="22" width="14" height="6" rx="1" fill="#8a5e22"/>
      <rect x="4" y="20" width="18" height="5" rx="1" fill="url(#iGold)"/>
      <path d="M22 8 L28 14 L16 26 L10 20 Z" fill="#c84a3a"/>
      <line x1="22" y1="8" x2="10" y2="20" stroke="#1e1208"/>
    </g>
  </g>

  <!-- 1 Eraser -->
  <g transform="translate(32,16)">
    <g stroke="#1e1208" stroke-width="1.5" stroke-linejoin="round">
      <rect x="6" y="12" width="20" height="12" rx="2" fill="#f0c4a0"/>
      <rect x="6" y="12" width="20" height="4" fill="#c86a3a"/>
      <line x1="10" y1="20" x2="22" y2="20" stroke="#a04828"/>
    </g>
  </g>

  <!-- 2 Bucket fill -->
  <g transform="translate(64,16)">
    <g stroke="#1e1208" stroke-width="1.5" stroke-linejoin="round">
      <path d="M8 10 L24 10 L22 26 L10 26 Z" fill="#8a8272"/>
      <ellipse cx="16" cy="10" rx="8" ry="2" fill="#bab0a0"/>
      <path d="M12 14 L20 14 L19 22 L13 22 Z" fill="#5aa5d8"/>
      <path d="M22 10 Q30 6 30 14" fill="none" stroke="#1e1208"/>
    </g>
  </g>

  <!-- 3 Select (marquee) -->
  <g transform="translate(96,16)">
    <g stroke="#ffd700" stroke-width="1.8" stroke-dasharray="3 2" fill="none">
      <rect x="6" y="8" width="20" height="18"/>
    </g>
    <rect x="6" y="8" width="3" height="3" fill="#ffd700"/>
    <rect x="23" y="8" width="3" height="3" fill="#ffd700"/>
    <rect x="6" y="23" width="3" height="3" fill="#ffd700"/>
    <rect x="23" y="23" width="3" height="3" fill="#ffd700"/>
  </g>

  <!-- 4 Pan (hand) -->
  <g transform="translate(128,16)">
    <g stroke="#1e1208" stroke-width="1.5" stroke-linejoin="round" fill="#f0c4a0">
      <path d="M10 24 L10 14 Q10 12 12 12 Q14 12 14 14 L14 20 L14 8 Q14 6 16 6 Q18 6 18 8 L18 20 L18 10 Q18 8 20 8 Q22 8 22 10 L22 20 L22 12 Q22 10 24 10 Q26 10 26 12 L26 24 Q26 28 22 28 L14 28 Q10 28 10 24 Z"/>
    </g>
  </g>

  <!-- 5 Pin (place marker) -->
  <g transform="translate(160,16)">
    <g stroke="#1e1208" stroke-width="1.5" stroke-linejoin="round">
      <path d="M16 4 Q24 4 24 12 Q24 20 16 28 Q8 20 8 12 Q8 4 16 4 Z" fill="#c84a3a"/>
      <circle cx="16" cy="12" r="3.5" fill="#f0e8c8"/>
    </g>
  </g>

  <!-- 6 Grid toggle -->
  <g transform="translate(192,16)">
    <g stroke="#ffd700" stroke-width="1.2" fill="none">
      <rect x="6" y="6" width="20" height="20"/>
      <line x1="12" y1="6" x2="12" y2="26"/>
      <line x1="20" y1="6" x2="20" y2="26"/>
      <line x1="6" y1="12" x2="26" y2="12"/>
      <line x1="6" y1="20" x2="26" y2="20"/>
    </g>
  </g>

  <!-- 7 Undo -->
  <g transform="translate(224,16)">
    <g stroke="#1e1208" stroke-width="1.8" stroke-linejoin="round" fill="none">
      <path d="M8 16 Q8 8 18 8 Q28 8 28 18 Q28 26 20 26" fill="none"/>
      <polygon points="8,16 4,12 4,20" fill="#c84a3a" stroke="#1e1208"/>
    </g>
  </g>

  <!-- 8 Redo -->
  <g transform="translate(256,16)">
    <g stroke="#1e1208" stroke-width="1.8" stroke-linejoin="round" fill="none">
      <path d="M24 16 Q24 8 14 8 Q4 8 4 18 Q4 26 12 26" fill="none"/>
      <polygon points="24,16 28,12 28,20" fill="#5aa5d8" stroke="#1e1208"/>
    </g>
  </g>

  <!-- 9 Save (floppy / ye olde scroll) -->
  <g transform="translate(288,16)">
    <g stroke="#1e1208" stroke-width="1.5" stroke-linejoin="round">
      <rect x="6" y="6" width="20" height="20" rx="2" fill="#8a5e22"/>
      <rect x="10" y="8" width="12" height="8" fill="#f0e8c8" stroke="#1e1208"/>
      <rect x="10" y="18" width="12" height="6" fill="#c89028"/>
      <rect x="14" y="20" width="4" height="3" fill="#5a3a0a"/>
    </g>
  </g>

  <!-- 10 Load (open folder) -->
  <g transform="translate(320,16)">
    <g stroke="#1e1208" stroke-width="1.5" stroke-linejoin="round">
      <path d="M4 12 L10 12 L14 8 L28 8 L28 24 L4 24 Z" fill="#c89028"/>
      <path d="M4 24 L8 14 L30 14 L26 24 Z" fill="url(#iGold)"/>
    </g>
  </g>

  <!-- 11 Export (cloud/arrow out) -->
  <g transform="translate(352,16)">
    <g stroke="#1e1208" stroke-width="1.5" stroke-linejoin="round">
      <rect x="4" y="18" width="24" height="8" rx="1" fill="#8a8272"/>
      <rect x="4" y="18" width="24" height="3" fill="#bab0a0"/>
      <polygon points="16,4 24,14 20,14 20,20 12,20 12,14 8,14" fill="#5aa5d8"/>
    </g>
  </g>
</svg>
