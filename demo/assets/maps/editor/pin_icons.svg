<svg xmlns="http://www.w3.org/2000/svg" width="240" height="48" viewBox="0 0 240 48">
  <!-- 5 special pin icons for map editor, 48×48 each.
       0=spawn (player), 1=storm_center, 2=strategic_point, 3=boss_spawn, 4=mob_spawn -->
  <defs>
    <radialGradient id="stormG" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b8a8ff"/><stop offset="100%" stop-color="#2a1a6a"/>
    </radialGradient>
    <radialGradient id="bossG" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6a6a"/><stop offset="100%" stop-color="#5a0a0a"/>
    </radialGradient>
  </defs>

  <!-- 0 Spawn point (green flag) -->
  <g transform="translate(0,0)">
    <rect width="48" height="48" fill="none"/>
    <g stroke="#1e1208" stroke-width="2" stroke-linejoin="round">
      <line x1="12" y1="6" x2="12" y2="44" stroke="#5a3a1a" stroke-width="3"/>
      <polygon points="12,6 34,10 34,22 12,18" fill="#4aa54a"/>
      <circle cx="22" cy="14" r="3" fill="#fff" stroke="#1e1208"/>
      <circle cx="12" cy="44" r="3" fill="#8a5e22"/>
    </g>
  </g>

  <!-- 1 Storm center (swirl) -->
  <g transform="translate(48,0)">
    <g stroke="#1e1208" stroke-width="2" stroke-linejoin="round">
      <circle cx="24" cy="24" r="20" fill="url(#stormG)"/>
      <path d="M24 24 Q14 14 24 6 Q36 10 38 24 Q34 38 20 38 Q8 30 14 20" fill="none" stroke="#ffd700" stroke-width="2"/>
      <circle cx="24" cy="24" r="3" fill="#ffd700"/>
    </g>
    <g fill="#ffffff" opacity="0.6"><circle cx="14" cy="14" r="1.5"/><circle cx="36" cy="32" r="1.5"/></g>
  </g>

  <!-- 2 Strategic point (flag + gear) -->
  <g transform="translate(96,0)">
    <g stroke="#1e1208" stroke-width="2" stroke-linejoin="round">
      <circle cx="24" cy="24" r="18" fill="#5aa5d8"/>
      <polygon points="24,8 30,18 42,18 32,26 36,40 24,32 12,40 16,26 6,18 18,18" fill="#ffd700" stroke="#3a2208" stroke-width="1.5"/>
    </g>
  </g>

  <!-- 3 Boss spawn (skull + crown) -->
  <g transform="translate(144,0)">
    <g stroke="#1e1208" stroke-width="2" stroke-linejoin="round">
      <circle cx="24" cy="26" r="18" fill="url(#bossG)"/>
      <!-- skull -->
      <ellipse cx="24" cy="28" rx="10" ry="8" fill="#f0e8c8"/>
      <circle cx="19" cy="28" r="2.5" fill="#1e1208"/>
      <circle cx="29" cy="28" r="2.5" fill="#1e1208"/>
      <rect x="21" y="34" width="2" height="3" fill="#1e1208"/>
      <rect x="25" y="34" width="2" height="3" fill="#1e1208"/>
      <!-- crown -->
      <polygon points="14,16 18,8 22,14 26,6 30,14 34,8 34,18 14,18" fill="#ffd700" stroke="#3a2208" stroke-width="1.5"/>
      <circle cx="24" cy="12" r="1.5" fill="#c84a3a"/>
    </g>
  </g>

  <!-- 4 Mob spawn (paw or eyes) -->
  <g transform="translate(192,0)">
    <g stroke="#1e1208" stroke-width="2" stroke-linejoin="round">
      <circle cx="24" cy="24" r="18" fill="#5a3a1a"/>
      <!-- paw -->
      <ellipse cx="24" cy="30" rx="8" ry="6" fill="#f0c4a0"/>
      <circle cx="16" cy="20" r="3" fill="#f0c4a0"/>
      <circle cx="22" cy="16" r="3" fill="#f0c4a0"/>
      <circle cx="28" cy="16" r="3" fill="#f0c4a0"/>
      <circle cx="34" cy="20" r="3" fill="#f0c4a0"/>
    </g>
  </g>
</svg>
