<svg xmlns="http://www.w3.org/2000/svg" width="192" height="32" viewBox="0 0 192 32">
  <!-- Altar hit debris particle atlas. 6 frames × 32×32 cells, sprite 24×24 centered.
       When altar takes damage, spawn 3-5 particles at impact point. Pick random frame 0..5.
       Mix of stone chips (gray) + gold sparks (warm).
       Developer: drawImage(debris, frame*32, 0, 32, 32, x-12, y-12, 24, 24).
  -->
  <defs>
    <radialGradient id="spark" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#fff6a8" stop-opacity="1"/>
      <stop offset="50%" stop-color="#ffb040" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#8a4a00" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="chip1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8dcbc"/><stop offset="100%" stop-color="#6a604a"/>
    </linearGradient>
    <linearGradient id="chip2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8b888"/><stop offset="100%" stop-color="#4a4230"/>
    </linearGradient>
  </defs>

  <!-- Frame 0: stone chip angular -->
  <g transform="translate(4,4)">
    <polygon points="2,12 10,2 20,8 16,22 6,20" fill="url(#chip1)" stroke="#2a1a08" stroke-width="1.2" stroke-linejoin="round"/>
    <polygon points="10,2 20,8 14,10" fill="#f0e4c0"/>
  </g>
  <!-- Frame 1: stone chip chunky -->
  <g transform="translate(36,4)">
    <polygon points="4,8 16,4 22,14 14,22 4,18" fill="url(#chip2)" stroke="#2a1a08" stroke-width="1.2" stroke-linejoin="round"/>
    <line x1="8" y1="10" x2="18" y2="14" stroke="#2a1a08" stroke-width="0.8"/>
  </g>
  <!-- Frame 2: gold spark burst -->
  <g transform="translate(68,4)">
    <circle cx="12" cy="12" r="10" fill="url(#spark)"/>
    <g stroke="#ffd966" stroke-width="1.4" stroke-linecap="round">
      <line x1="12" y1="2"  x2="12" y2="22"/>
      <line x1="2"  y1="12" x2="22" y2="12"/>
      <line x1="5"  y1="5"  x2="19" y2="19"/>
      <line x1="19" y1="5"  x2="5"  y2="19"/>
    </g>
    <circle cx="12" cy="12" r="3" fill="#fff6a8"/>
  </g>
  <!-- Frame 3: dust puff -->
  <g transform="translate(100,4)">
    <circle cx="8"  cy="14" r="5" fill="#c8bca0" opacity="0.8"/>
    <circle cx="14" cy="10" r="6" fill="#d8ccb0" opacity="0.85"/>
    <circle cx="18" cy="16" r="4" fill="#a89878" opacity="0.7"/>
    <circle cx="11" cy="7"  r="3" fill="#e8dcbc" opacity="0.7"/>
  </g>
  <!-- Frame 4: gold shard -->
  <g transform="translate(132,4)">
    <polygon points="6,20 12,4 18,20 12,16" fill="#ffd966" stroke="#3a2208" stroke-width="1.2" stroke-linejoin="round"/>
    <polygon points="12,4 14,10 12,14 10,10" fill="#fff4c8"/>
    <line x1="12" y1="4" x2="12" y2="20" stroke="#8a5e18" stroke-width="0.6"/>
  </g>
  <!-- Frame 5: cracked stone fragment -->
  <g transform="translate(164,4)">
    <polygon points="3,10 9,3 20,6 22,16 12,22" fill="url(#chip1)" stroke="#2a1a08" stroke-width="1.2" stroke-linejoin="round"/>
    <g stroke="#2a1a08" stroke-width="0.7" fill="none">
      <line x1="9" y1="3" x2="12" y2="14"/>
      <line x1="20" y1="6" x2="14" y2="10"/>
    </g>
    <polygon points="9,3 13,4 10,7" fill="#f0e4c0"/>
  </g>
</svg>
