<svg xmlns="http://www.w3.org/2000/svg" width="64" height="96" viewBox="0 0 64 96">
  <!-- Legendary skill pickup beacon. 64×96. Anchor = bottom center (32, 92).
       Developer draws the skill icon (32×32) centered at (32, 36) ON TOP of this sprite.
       Purpose: when altar breaks, 3 of these spawn at altar with random legendary skills.
       Step into radius ~40px to pick up.
  -->
  <defs>
    <radialGradient id="lpGround" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#fff6a8" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#ffd700" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#8a5e18" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lpBeam" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%"  stop-color="#ffd700" stop-opacity="0.85"/>
      <stop offset="50%" stop-color="#fff4c8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="lpSlot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1a08"/><stop offset="100%" stop-color="#6a4a1a"/>
    </linearGradient>
  </defs>

  <!-- ground circle (glowing pad) -->
  <ellipse cx="32" cy="86" rx="28" ry="7" fill="url(#lpGround)">
    <animate attributeName="rx" values="24;30;24" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="1.5s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="32" cy="86" rx="20" ry="5" fill="#fff4c8" opacity="0.7"/>

  <!-- rising beam -->
  <rect x="22" y="12" width="20" height="76" fill="url(#lpBeam)" opacity="0.8">
    <animate attributeName="opacity" values="0.55;0.95;0.55" dur="1.2s" repeatCount="indefinite"/>
  </rect>
  <rect x="28" y="6" width="8" height="82" fill="url(#lpBeam)" opacity="0.95"/>

  <!-- rotating outer ring on ground (golden runes) -->
  <g>
    <circle cx="32" cy="86" r="22" fill="none" stroke="#ffd700" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.85">
      <animateTransform attributeName="transform" type="rotate" from="0 32 86" to="360 32 86" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="32" cy="86" r="15" fill="none" stroke="#ffea80" stroke-width="1" stroke-dasharray="3 3" opacity="0.7">
      <animateTransform attributeName="transform" type="rotate" from="360 32 86" to="0 32 86" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- floating skill icon slot (Developer draws actual skill icon on top at (16, 20, 32, 32)) -->
  <g>
    <!-- glow halo behind slot -->
    <circle cx="32" cy="36" r="22" fill="#ffd700" opacity="0.35">
      <animate attributeName="r" values="18;24;18" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.25;0.45;0.25" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <!-- slot frame (ornate gold) -->
    <rect x="14" y="18" width="36" height="36" rx="4" fill="url(#lpSlot)" stroke="#ffd700" stroke-width="2.5"/>
    <rect x="16" y="20" width="32" height="32" rx="3" fill="#1a0e04" stroke="#8a5e18" stroke-width="1"/>
    <!-- corner gems -->
    <polygon points="14,18 18,14 22,18 18,22" fill="#ffd700" stroke="#3a2208" stroke-width="1"/>
    <polygon points="46,18 50,14 54,18 50,22" fill="#ffd700" stroke="#3a2208" stroke-width="1"/>
    <polygon points="14,54 18,50 22,54 18,58" fill="#ffd700" stroke="#3a2208" stroke-width="1"/>
    <polygon points="46,54 50,50 54,54 50,58" fill="#ffd700" stroke="#3a2208" stroke-width="1"/>
  </g>

  <!-- top star -->
  <g>
    <polygon fill="#fffbd0" stroke="#ffd700" stroke-width="1.2"
             points="32,2 34,8 40,10 34,12 32,18 30,12 24,10 30,8"/>
    <circle cx="32" cy="10" r="3" fill="#fff4a0" opacity="0.9">
      <animate attributeName="r" values="2;4;2" dur="1s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- floating sparkles -->
  <g fill="#fffbd0">
    <circle cx="12" cy="42" r="1.2">
      <animate attributeName="cy" values="50;20;50" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="52" cy="50" r="1.2">
      <animate attributeName="cy" values="60;30;60" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="32" cy="70" r="1">
      <animate attributeName="cy" values="80;40;80" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="2.2s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
