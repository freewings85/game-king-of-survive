<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <!-- BIG altar impact flash — 192×192. 累积爆版：每 3 击 / 或 HP 关键节点 (75% / 50% / 25%)
       触发，比 altar_impact_flash.svg 更大更炸。
       Developer: alpha 1→0 over 400-500ms, scale 0.5→1.5, composite "lighter".
       Static SVG — rasterise once. -->
  <defs>
    <radialGradient id="bigCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="20%" stop-color="#fff6a8" stop-opacity="0.98"/>
      <stop offset="50%" stop-color="#ffd700" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#c89028" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bigRay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#fff6a8"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bigPurple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#e0b0ff"/>
      <stop offset="100%" stop-color="#7a2a8a" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- outermost shockwave -->
  <circle cx="96" cy="96" r="90" fill="none" stroke="#ffea80" stroke-width="3" opacity="0.6"/>
  <!-- mid shockwave -->
  <circle cx="96" cy="96" r="70" fill="none" stroke="#fff4c8" stroke-width="4" opacity="0.8"/>
  <!-- inner bright ring -->
  <circle cx="96" cy="96" r="48" fill="none" stroke="#fff6a8" stroke-width="5" opacity="0.95"/>

  <!-- 16 primary radial rays -->
  <g fill="url(#bigRay)" stroke="#3a2208" stroke-width="1.2" stroke-linejoin="round" opacity="0.92">
    <g transform="rotate(0 96 96)">     <polygon points="96,4 92,72 100,72"/></g>
    <g transform="rotate(22.5 96 96)">  <polygon points="96,4 92,72 100,72"/></g>
    <g transform="rotate(45 96 96)">    <polygon points="96,4 92,72 100,72"/></g>
    <g transform="rotate(67.5 96 96)">  <polygon points="96,4 92,72 100,72"/></g>
    <g transform="rotate(90 96 96)">    <polygon points="96,4 92,72 100,72"/></g>
    <g transform="rotate(112.5 96 96)"> <polygon points="96,4 92,72 100,72"/></g>
    <g transform="rotate(135 96 96)">   <polygon points="96,4 92,72 100,72"/></g>
    <g transform="rotate(157.5 96 96)"> <polygon points="96,4 92,72 100,72"/></g>
    <g transform="rotate(180 96 96)">   <polygon points="96,4 92,72 100,72"/></g>
    <g transform="rotate(202.5 96 96)"> <polygon points="96,4 92,72 100,72"/></g>
    <g transform="rotate(225 96 96)">   <polygon points="96,4 92,72 100,72"/></g>
    <g transform="rotate(247.5 96 96)"> <polygon points="96,4 92,72 100,72"/></g>
    <g transform="rotate(270 96 96)">   <polygon points="96,4 92,72 100,72"/></g>
    <g transform="rotate(292.5 96 96)"> <polygon points="96,4 92,72 100,72"/></g>
    <g transform="rotate(315 96 96)">   <polygon points="96,4 92,72 100,72"/></g>
    <g transform="rotate(337.5 96 96)"> <polygon points="96,4 92,72 100,72"/></g>
  </g>

  <!-- 8 secondary purple rays (altar's purple essence leaking) -->
  <g fill="url(#bigPurple)" stroke="#2a0a3a" stroke-width="0.8" stroke-linejoin="round" opacity="0.7">
    <g transform="rotate(11.25 96 96)"> <polygon points="96,32 93,78 99,78"/></g>
    <g transform="rotate(56.25 96 96)"> <polygon points="96,32 93,78 99,78"/></g>
    <g transform="rotate(101.25 96 96)"><polygon points="96,32 93,78 99,78"/></g>
    <g transform="rotate(146.25 96 96)"><polygon points="96,32 93,78 99,78"/></g>
    <g transform="rotate(191.25 96 96)"><polygon points="96,32 93,78 99,78"/></g>
    <g transform="rotate(236.25 96 96)"><polygon points="96,32 93,78 99,78"/></g>
    <g transform="rotate(281.25 96 96)"><polygon points="96,32 93,78 99,78"/></g>
    <g transform="rotate(326.25 96 96)"><polygon points="96,32 93,78 99,78"/></g>
  </g>

  <!-- 12 flying crystal shards (purple chunks flying out) -->
  <g stroke="#1e0430" stroke-width="1.4" stroke-linejoin="round">
    <polygon points="38,60 48,52 56,62 46,72" fill="#b068e8"/>
    <polygon points="140,56 150,48 160,60 150,70" fill="#c084ff"/>
    <polygon points="44,128 54,122 62,134 50,142" fill="#b068e8"/>
    <polygon points="138,130 150,124 158,136 146,144" fill="#c084ff"/>
    <polygon points="86,28 96,22 104,32 94,40" fill="#b068e8"/>
    <polygon points="86,156 96,150 104,160 94,168" fill="#c084ff"/>
    <polygon points="24,92 34,86 42,98 32,104" fill="#b068e8"/>
    <polygon points="150,92 162,86 168,98 158,104" fill="#c084ff"/>
    <!-- smaller accent shards -->
    <polygon points="64,40 70,36 74,44 68,48" fill="#d48aff"/>
    <polygon points="122,40 128,36 132,44 126,48" fill="#d48aff"/>
    <polygon points="64,148 70,144 74,152 68,156" fill="#d48aff"/>
    <polygon points="122,148 128,144 132,152 126,156" fill="#d48aff"/>
  </g>

  <!-- central core flash (drawn last, on top) -->
  <circle cx="96" cy="96" r="52" fill="url(#bigCore)"/>
  <circle cx="96" cy="96" r="22" fill="#ffffff" opacity="0.98"/>
  <circle cx="96" cy="96" r="10" fill="#ffffff"/>
</svg>
