<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Frozen Altar — arena_c (Frozen Peaks) 中央地标。128×128 锚 (64, 124).
       同 altar_center.svg 规格，冷色温替代：冰石基座 + 银柱 + 冰蓝光柱 + 金顶（保留热点对比）。
       静态 SVG — 一次性光栅化，FPS 友好。 -->
  <defs>
    <radialGradient id="faGlow" cx="50%" cy="60%" r="55%">
      <stop offset="0%"  stop-color="#c0e4ff" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="#7ac2e8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#2a6a8a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="faIceBase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f0f8"/>
      <stop offset="100%" stop-color="#6a90b0"/>
    </linearGradient>
    <linearGradient id="faSilverPillar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#c0d8ea"/>
      <stop offset="100%" stop-color="#4a7090"/>
    </linearGradient>
    <linearGradient id="faIceBeam" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%"  stop-color="#7ac2e8" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#c0e4ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ground shadow (crisper on snow) -->
  <ellipse cx="64" cy="120" rx="48" ry="7" fill="#3a5a7a" opacity="0.55"/>

  <!-- outer frozen halo -->
  <circle cx="64" cy="86" r="56" fill="url(#faGlow)">
    <animate attributeName="r" values="52;62;52" dur="2.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2.8s" repeatCount="indefinite"/>
  </circle>

  <!-- ice beam rising -->
  <rect x="56" y="0" width="16" height="100" fill="url(#faIceBeam)" opacity="0.75">
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="2s" repeatCount="indefinite"/>
  </rect>

  <!-- snow drift at base -->
  <path d="M6 116 Q24 108 42 116 Q64 108 86 116 Q104 108 122 116 L122 126 L6 126 Z"
        fill="#ffffff" stroke="#8aa0b8" stroke-width="1"/>

  <!-- stone ring base (ice-cold) -->
  <g stroke="#2a3a5a" stroke-width="2" stroke-linejoin="round">
    <ellipse cx="64" cy="114" rx="52" ry="14" fill="url(#faIceBase)"/>
    <ellipse cx="64" cy="108" rx="44" ry="11" fill="url(#faIceBase)"/>
    <ellipse cx="64" cy="102" rx="36" ry="9" fill="#e4eef8"/>
  </g>

  <!-- ice crack veins on top step (decorative) -->
  <g stroke="#4a7090" stroke-width="0.8" fill="none" opacity="0.7">
    <path d="M42 102 L48 108 L52 106"/>
    <path d="M76 102 L80 108 L86 106"/>
    <path d="M58 100 L60 106"/>
  </g>

  <!-- 4 frozen runes (blue gems, cold alt to red) -->
  <g fill="#5aa5d8" stroke="#1a3a5a" stroke-width="1.2">
    <polygon points="30,110 34,108 34,114 30,116"/>
    <polygon points="94,110 98,108 98,114 94,116"/>
    <polygon points="64,94 68,96 64,100 60,96"/>
    <polygon points="64,118 68,116 68,120 64,122 60,120 60,116"/>
  </g>

  <!-- silver central pillar (was gold, now frozen-silver) -->
  <g stroke="#2a3a5a" stroke-width="2" stroke-linejoin="round">
    <rect x="52" y="52" width="24" height="50" fill="url(#faSilverPillar)"/>
    <rect x="48" y="48" width="32" height="8" fill="#e4eef8"/>
    <rect x="50" y="100" width="28" height="6" fill="#4a7090"/>
    <!-- center facet highlight -->
    <rect x="58" y="56" width="4" height="40" fill="#ffffff" opacity="0.85"/>
  </g>

  <!-- icicles hanging from pillar cap -->
  <g fill="#c0e4ff" stroke="#4a7090" stroke-width="0.8">
    <polygon points="52,56 54,66 56,56"/>
    <polygon points="58,56 60,68 62,56"/>
    <polygon points="66,56 68,66 70,56"/>
    <polygon points="72,56 74,64 76,56"/>
  </g>

  <!-- top star (kept GOLD for identity + warm/cold contrast) -->
  <polygon fill="#fffbd0" stroke="#ffd700" stroke-width="1.5"
           points="64,30 68,46 84,50 68,54 64,70 60,54 44,50 60,46"/>
  <circle cx="64" cy="50" r="6" fill="#fff4a0" opacity="0.85">
    <animate attributeName="r" values="4;9;4" dur="1.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="1.6s" repeatCount="indefinite"/>
  </circle>

  <!-- floating snow flakes / ice crystals -->
  <g fill="#ffffff">
    <circle cx="30" cy="60" r="1.5">
      <animate attributeName="cy" values="50;70;50" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;1;0.4" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="98" cy="72" r="1.5">
      <animate attributeName="cy" values="60;80;60" dur="3.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;1;0.4" dur="3.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="46" cy="38" r="1.2">
      <animate attributeName="cy" values="30;46;30" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="84" cy="34" r="1.2">
      <animate attributeName="cy" values="26;42;26" dur="3.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="3.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- frost outline around halo edge (subtle cold aura) -->
  <circle cx="64" cy="86" r="46" fill="none" stroke="#c0e4ff" stroke-width="1" stroke-dasharray="2 4" opacity="0.6"/>
</svg>
