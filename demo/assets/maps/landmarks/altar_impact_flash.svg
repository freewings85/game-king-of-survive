<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Altar hit impact flash. 128×128. Spawns at impact point on altar每次命中.
       Developer: draw with alpha 1→0 over 200ms, scale 0.7→1.3.
       Static (no animate) — high frequency effect, must be rasterise-once cheap. -->
  <defs>
    <radialGradient id="impactCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="25%" stop-color="#fff6a8" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#ffd700" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#c89028" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="impRay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#fff6a8"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- outer shockwave ring -->
  <circle cx="64" cy="64" r="58" fill="none" stroke="#ffea80" stroke-width="3" opacity="0.75"/>
  <!-- mid shockwave -->
  <circle cx="64" cy="64" r="42" fill="none" stroke="#fff4c8" stroke-width="4" opacity="0.85"/>

  <!-- 8 long radial rays (star burst) -->
  <g fill="url(#impRay)" stroke="#3a2208" stroke-width="1" stroke-linejoin="round" opacity="0.9">
    <g transform="rotate(0 64 64)">  <polygon points="64,6 60,50 68,50"/></g>
    <g transform="rotate(45 64 64)"> <polygon points="64,6 60,50 68,50"/></g>
    <g transform="rotate(90 64 64)"> <polygon points="64,6 60,50 68,50"/></g>
    <g transform="rotate(135 64 64)"><polygon points="64,6 60,50 68,50"/></g>
    <g transform="rotate(180 64 64)"><polygon points="64,6 60,50 68,50"/></g>
    <g transform="rotate(225 64 64)"><polygon points="64,6 60,50 68,50"/></g>
    <g transform="rotate(270 64 64)"><polygon points="64,6 60,50 68,50"/></g>
    <g transform="rotate(315 64 64)"><polygon points="64,6 60,50 68,50"/></g>
  </g>

  <!-- 8 shorter secondary rays (offset 22.5°) -->
  <g fill="#ffea80" stroke="#3a2208" stroke-width="0.8" stroke-linejoin="round" opacity="0.75">
    <g transform="rotate(22.5 64 64)"> <polygon points="64,24 61,54 67,54"/></g>
    <g transform="rotate(67.5 64 64)"> <polygon points="64,24 61,54 67,54"/></g>
    <g transform="rotate(112.5 64 64)"><polygon points="64,24 61,54 67,54"/></g>
    <g transform="rotate(157.5 64 64)"><polygon points="64,24 61,54 67,54"/></g>
    <g transform="rotate(202.5 64 64)"><polygon points="64,24 61,54 67,54"/></g>
    <g transform="rotate(247.5 64 64)"><polygon points="64,24 61,54 67,54"/></g>
    <g transform="rotate(292.5 64 64)"><polygon points="64,24 61,54 67,54"/></g>
    <g transform="rotate(337.5 64 64)"><polygon points="64,24 61,54 67,54"/></g>
  </g>

  <!-- bright central core (drawn last, on top) -->
  <circle cx="64" cy="64" r="34" fill="url(#impactCore)"/>
  <circle cx="64" cy="64" r="14" fill="#ffffff"/>
  <circle cx="64" cy="64" r="6"  fill="#ffffff"/>
</svg>
