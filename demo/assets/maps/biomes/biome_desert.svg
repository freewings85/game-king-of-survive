<svg xmlns="http://www.w3.org/2000/svg" width="256" height="128" viewBox="0 0 256 128" shape-rendering="crispEdges">
  <!-- Desert tileset 256×128 = 4×2 @ 64px. -->
  <defs>
    <linearGradient id="de_s" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e6c27a"/><stop offset="100%" stop-color="#b8893a"/>
    </linearGradient>
    <linearGradient id="de_s2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d8a85a"/><stop offset="100%" stop-color="#8a5e22"/>
    </linearGradient>
  </defs>

  <!-- Row 0 -->
  <!-- (0,0) flat sand -->
  <g>
    <rect width="64" height="64" fill="url(#de_s)"/>
    <g stroke="#a87a3a" stroke-width="1" fill="none" opacity="0.7">
      <path d="M4 14 Q20 10 40 14 T60 16"/>
      <path d="M4 36 Q20 32 40 36 T60 38"/>
      <path d="M4 52 Q20 48 40 52 T60 54"/>
    </g>
    <g fill="#6a3e12" opacity="0.5"><circle cx="14" cy="22" r="1"/><circle cx="44" cy="44" r="1"/><circle cx="30" cy="54" r="1"/></g>
  </g>
  <!-- (1,0) sand dune ripples -->
  <g transform="translate(64,0)">
    <rect width="64" height="64" fill="url(#de_s)"/>
    <g stroke="#8a5e22" stroke-width="1.4" fill="none">
      <path d="M2 22 Q16 14 30 22 T62 20"/>
      <path d="M2 42 Q16 34 30 42 T62 40"/>
    </g>
    <g stroke="#f0d8a0" stroke-width="1" fill="none" opacity="0.8">
      <path d="M2 20 Q16 12 30 20 T62 18"/>
      <path d="M2 40 Q16 32 30 40 T62 38"/>
    </g>
  </g>
  <!-- (2,0) cracked dry earth -->
  <g transform="translate(128,0)">
    <rect width="64" height="64" fill="url(#de_s2)"/>
    <g stroke="#4a2a0a" stroke-width="1.2" fill="none">
      <path d="M0 20 L18 24 L28 18 L46 26 L64 22"/>
      <path d="M0 44 L14 40 L30 46 L44 40 L64 46"/>
      <path d="M18 24 L22 44"/><path d="M46 26 L44 40"/>
    </g>
  </g>
  <!-- (3,0) rocky sand -->
  <g transform="translate(192,0)">
    <rect width="64" height="64" fill="url(#de_s)"/>
    <g stroke="#3a2208" stroke-width="1.2">
      <polygon points="14,36 22,30 28,38 22,44" fill="#9a7642"/>
      <polygon points="44,18 52,14 58,22 50,26" fill="#b08a52"/>
      <polygon points="38,48 46,44 52,52 44,56" fill="#9a7642"/>
      <circle cx="8" cy="18" r="2" fill="#6a4a1a"/>
      <circle cx="56" cy="40" r="2" fill="#6a4a1a"/>
    </g>
  </g>

  <!-- Row 1 -->
  <!-- (0,1) cactus patch -->
  <g transform="translate(0,64)">
    <rect width="64" height="64" fill="url(#de_s)"/>
    <g stroke="#1e3a14" stroke-width="1.5">
      <!-- big cactus -->
      <rect x="28" y="20" width="10" height="32" rx="4" fill="#4a7a3a"/>
      <rect x="20" y="30" width="6" height="14" rx="3" fill="#4a7a3a"/>
      <rect x="40" y="26" width="6" height="14" rx="3" fill="#4a7a3a"/>
    </g>
    <g stroke="#f0e0a0" stroke-width="1">
      <line x1="30" y1="26" x2="28" y2="26"/><line x1="30" y1="34" x2="28" y2="34"/><line x1="30" y1="42" x2="28" y2="42"/>
      <line x1="36" y1="26" x2="38" y2="26"/><line x1="36" y1="34" x2="38" y2="34"/>
    </g>
    <ellipse cx="33" cy="54" rx="10" ry="2" fill="#6a4a1a" opacity="0.5"/>
  </g>
  <!-- (1,1) bones / skull -->
  <g transform="translate(64,64)">
    <rect width="64" height="64" fill="url(#de_s)"/>
    <g stroke="#1e1208" stroke-width="1.2">
      <ellipse cx="32" cy="32" rx="16" ry="12" fill="#f0e8c8"/>
      <circle cx="26" cy="32" r="3" fill="#1e1208"/><circle cx="38" cy="32" r="3" fill="#1e1208"/>
      <rect x="26" y="40" width="3" height="4" fill="#f0e8c8"/>
      <rect x="31" y="40" width="3" height="4" fill="#f0e8c8"/>
      <rect x="36" y="40" width="3" height="4" fill="#f0e8c8"/>
    </g>
    <g stroke="#8a7a54" stroke-width="1.5">
      <line x1="10" y1="54" x2="22" y2="48"/><line x1="42" y1="48" x2="56" y2="54"/>
    </g>
  </g>
  <!-- (2,1) oasis small -->
  <g transform="translate(128,64)">
    <rect width="64" height="64" fill="url(#de_s)"/>
    <ellipse cx="32" cy="38" rx="18" ry="10" fill="#5aa5d8" stroke="#1e4a6a" stroke-width="1.5"/>
    <ellipse cx="28" cy="36" rx="8" ry="3" fill="#a8d8e8" opacity="0.7"/>
    <g stroke="#1e3a14" stroke-width="1.2">
      <line x1="14" y1="38" x2="14" y2="20"/>
      <path d="M14 20 Q8 14 4 18" fill="#4a7a3a" stroke="#1e3a14"/>
      <path d="M14 20 Q20 14 24 18" fill="#4a7a3a" stroke="#1e3a14"/>
      <path d="M14 22 Q10 26 6 22" fill="#4a7a3a" stroke="#1e3a14"/>
    </g>
  </g>
  <!-- (3,1) sand with snake trail -->
  <g transform="translate(192,64)">
    <rect width="64" height="64" fill="url(#de_s)"/>
    <path d="M4 12 Q20 20 30 14 Q42 6 52 16 Q58 24 54 40 Q48 52 34 50 Q20 46 14 54" stroke="#8a5e22" stroke-width="2" fill="none" opacity="0.85"/>
    <path d="M4 12 Q20 20 30 14 Q42 6 52 16 Q58 24 54 40 Q48 52 34 50 Q20 46 14 54" stroke="#f0d8a0" stroke-width="1" fill="none"/>
    <g fill="#6a3e12" opacity="0.6"><circle cx="40" cy="26" r="1"/><circle cx="20" cy="40" r="1"/></g>
  </g>
</svg>
