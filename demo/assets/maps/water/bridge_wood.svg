<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Wood bridge. 128×128 = 2 orientations @ 64×64 each.
       (0,0) = horizontal,  (64,0) = vertical -->
  <defs>
    <linearGradient id="woodH" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b8844a"/>
      <stop offset="100%" stop-color="#5a3a1a"/>
    </linearGradient>
    <linearGradient id="woodV" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5a3a1a"/>
      <stop offset="50%" stop-color="#b8844a"/>
      <stop offset="100%" stop-color="#5a3a1a"/>
    </linearGradient>
  </defs>

  <!-- === Horizontal === -->
  <g>
    <rect x="0" y="18" width="64" height="28" fill="#2a6a8a"/>
    <!-- planks -->
    <rect x="0" y="20" width="64" height="26" fill="url(#woodH)" stroke="#2a1a08" stroke-width="1.4"/>
    <g stroke="#3a2208" stroke-width="0.8">
      <line x1="8"  y1="20" x2="8"  y2="46"/>
      <line x1="16" y1="20" x2="16" y2="46"/>
      <line x1="24" y1="20" x2="24" y2="46"/>
      <line x1="32" y1="20" x2="32" y2="46"/>
      <line x1="40" y1="20" x2="40" y2="46"/>
      <line x1="48" y1="20" x2="48" y2="46"/>
      <line x1="56" y1="20" x2="56" y2="46"/>
    </g>
    <!-- nails -->
    <g fill="#2a1a08"><circle cx="8" cy="24" r="1"/><circle cx="24" cy="24" r="1"/><circle cx="40" cy="24" r="1"/><circle cx="56" cy="24" r="1"/>
      <circle cx="8" cy="42" r="1"/><circle cx="24" cy="42" r="1"/><circle cx="40" cy="42" r="1"/><circle cx="56" cy="42" r="1"/></g>
    <!-- rope rails -->
    <g stroke="#6a4a1a" stroke-width="1.4" fill="none">
      <line x1="0" y1="18" x2="64" y2="18"/>
    </g>
    <g stroke="#2a1a08" stroke-width="1" fill="#8a5e22">
      <circle cx="6"  cy="18" r="2"/>
      <circle cx="32" cy="18" r="2"/>
      <circle cx="58" cy="18" r="2"/>
    </g>
    <!-- highlight -->
    <line x1="2" y1="22" x2="62" y2="22" stroke="#f0d8a0" stroke-width="0.8" opacity="0.55"/>
  </g>

  <!-- === Vertical === -->
  <g transform="translate(64,0)">
    <rect x="18" y="0" width="28" height="64" fill="#2a6a8a"/>
    <rect x="20" y="0" width="26" height="64" fill="url(#woodV)" stroke="#2a1a08" stroke-width="1.4"/>
    <g stroke="#3a2208" stroke-width="0.8">
      <line x1="20" y1="8"  x2="46" y2="8"/>
      <line x1="20" y1="16" x2="46" y2="16"/>
      <line x1="20" y1="24" x2="46" y2="24"/>
      <line x1="20" y1="32" x2="46" y2="32"/>
      <line x1="20" y1="40" x2="46" y2="40"/>
      <line x1="20" y1="48" x2="46" y2="48"/>
      <line x1="20" y1="56" x2="46" y2="56"/>
    </g>
    <g fill="#2a1a08"><circle cx="24" cy="8" r="1"/><circle cx="24" cy="24" r="1"/><circle cx="24" cy="40" r="1"/><circle cx="24" cy="56" r="1"/>
      <circle cx="42" cy="8" r="1"/><circle cx="42" cy="24" r="1"/><circle cx="42" cy="40" r="1"/><circle cx="42" cy="56" r="1"/></g>
    <g stroke="#6a4a1a" stroke-width="1.4" fill="none"><line x1="18" y1="0" x2="18" y2="64"/></g>
    <g stroke="#2a1a08" stroke-width="1" fill="#8a5e22">
      <circle cx="18" cy="6" r="2"/>
      <circle cx="18" cy="32" r="2"/>
      <circle cx="18" cy="58" r="2"/>
    </g>
    <line x1="22" y1="2" x2="22" y2="62" stroke="#f0d8a0" stroke-width="0.8" opacity="0.55"/>
  </g>
</svg>
