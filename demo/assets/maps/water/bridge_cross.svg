<svg xmlns="http://www.w3.org/2000/svg" width="64" height="128" viewBox="0 0 64 128">
  <!-- Vertical bridge (N-S) spanning a horizontal 64px river.
       64×128. Anchor = top-center (32, 0) placed at the northern tile;
       bridge deck spans the middle 64px (y=32..96) sitting on the water band.
       Tile alignment: stack this sprite on 2 map tiles vertically (or on the river row).
  -->
  <defs>
    <linearGradient id="brDeck" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#6a504a"/>
      <stop offset="15%"  stop-color="#c8a478"/>
      <stop offset="50%"  stop-color="#e8ccaa"/>
      <stop offset="85%"  stop-color="#c8a478"/>
      <stop offset="100%" stop-color="#6a504a"/>
    </linearGradient>
    <linearGradient id="brStone" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#4a4236"/>
      <stop offset="50%" stop-color="#a09680"/>
      <stop offset="100%" stop-color="#4a4236"/>
    </linearGradient>
  </defs>

  <!-- north approach grass ramp -->
  <rect x="12" y="0" width="40" height="32" fill="#5e9a3a"/>
  <g stroke="#4a331a" stroke-width="1.4">
    <line x1="12" y1="0" x2="12" y2="32"/>
    <line x1="52" y1="0" x2="52" y2="32"/>
  </g>

  <!-- bridge deck (middle, crossing water) -->
  <g stroke="#2a1a08" stroke-width="1.5" stroke-linejoin="round">
    <!-- stone railings (left + right) -->
    <rect x="6"  y="28" width="8" height="72" fill="url(#brStone)"/>
    <rect x="50" y="28" width="8" height="72" fill="url(#brStone)"/>
    <!-- deck planks -->
    <rect x="14" y="32" width="36" height="64" fill="url(#brDeck)"/>
    <!-- plank seams -->
    <g stroke="#6a4a1e" stroke-width="0.9">
      <line x1="14" y1="40" x2="50" y2="40"/>
      <line x1="14" y1="48" x2="50" y2="48"/>
      <line x1="14" y1="56" x2="50" y2="56"/>
      <line x1="14" y1="64" x2="50" y2="64"/>
      <line x1="14" y1="72" x2="50" y2="72"/>
      <line x1="14" y1="80" x2="50" y2="80"/>
      <line x1="14" y1="88" x2="50" y2="88"/>
    </g>
    <!-- iron nails -->
    <g fill="#2a1a08">
      <circle cx="18" cy="36" r="1"/><circle cx="46" cy="36" r="1"/>
      <circle cx="18" cy="92" r="1"/><circle cx="46" cy="92" r="1"/>
    </g>
    <!-- railing posts (top + bottom) -->
    <rect x="4"  y="26" width="12" height="6" fill="#5a4e3a"/>
    <rect x="48" y="26" width="12" height="6" fill="#5a4e3a"/>
    <rect x="4"  y="96" width="12" height="6" fill="#5a4e3a"/>
    <rect x="48" y="96" width="12" height="6" fill="#5a4e3a"/>
    <!-- stone footings at river edge -->
    <rect x="2"  y="28" width="14" height="4" fill="#6a604a"/>
    <rect x="48" y="28" width="14" height="4" fill="#6a604a"/>
    <rect x="2"  y="94" width="14" height="4" fill="#6a604a"/>
    <rect x="48" y="94" width="14" height="4" fill="#6a604a"/>
  </g>

  <!-- south approach grass ramp -->
  <rect x="12" y="96" width="40" height="32" fill="#5e9a3a"/>
  <g stroke="#4a331a" stroke-width="1.4">
    <line x1="12" y1="96"  x2="12" y2="128"/>
    <line x1="52" y1="96"  x2="52" y2="128"/>
  </g>

  <!-- light highlight on deck center -->
  <line x1="32" y1="34" x2="32" y2="94" stroke="#fff4c8" stroke-width="1" opacity="0.55"/>
</svg>
