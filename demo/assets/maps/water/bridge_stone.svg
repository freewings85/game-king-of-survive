<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Stone bridge. 128×128 = 2 orientations @ 64×64 each.
       (0,0) = horizontal (east-west over water),  (64,0) = vertical (north-south) -->
  <defs>
    <linearGradient id="stoneBG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d0c8b0"/>
      <stop offset="100%" stop-color="#6a604a"/>
    </linearGradient>
    <linearGradient id="stoneBGv" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6a604a"/>
      <stop offset="50%" stop-color="#d0c8b0"/>
      <stop offset="100%" stop-color="#6a604a"/>
    </linearGradient>
  </defs>

  <!-- === Horizontal bridge (ew) : 64×64 at (0,0). water flows N-S underneath === -->
  <g>
    <!-- water gap -->
    <rect x="0" y="18" width="64" height="28" fill="#2a6a8a"/>
    <!-- arch -->
    <path d="M0 46 Q32 24 64 46 L64 56 Q32 34 0 56 Z" fill="url(#stoneBG)" stroke="#2a2418" stroke-width="1.5"/>
    <!-- deck top -->
    <rect x="0" y="8" width="64" height="12" fill="url(#stoneBG)" stroke="#2a2418" stroke-width="1.5"/>
    <!-- stone joints on deck -->
    <g stroke="#4a4230" stroke-width="0.8">
      <line x1="10" y1="8" x2="10" y2="20"/>
      <line x1="22" y1="8" x2="22" y2="20"/>
      <line x1="34" y1="8" x2="34" y2="20"/>
      <line x1="46" y1="8" x2="46" y2="20"/>
      <line x1="58" y1="8" x2="58" y2="20"/>
    </g>
    <!-- railings -->
    <rect x="0" y="4" width="64" height="4" fill="#8a7e60" stroke="#2a2418" stroke-width="1"/>
    <!-- light highlight -->
    <line x1="2" y1="10" x2="62" y2="10" stroke="#fff4c8" stroke-width="0.8" opacity="0.6"/>
  </g>

  <!-- === Vertical bridge (ns) : 64×64 at (64,0). water flows E-W underneath === -->
  <g transform="translate(64,0)">
    <rect x="18" y="0" width="28" height="64" fill="#2a6a8a"/>
    <!-- arch -->
    <path d="M46 0 Q24 32 46 64 L56 64 Q34 32 56 0 Z" fill="url(#stoneBGv)" stroke="#2a2418" stroke-width="1.5"/>
    <!-- deck left band -->
    <rect x="8" y="0" width="12" height="64" fill="url(#stoneBGv)" stroke="#2a2418" stroke-width="1.5"/>
    <g stroke="#4a4230" stroke-width="0.8">
      <line x1="8" y1="10" x2="20" y2="10"/>
      <line x1="8" y1="22" x2="20" y2="22"/>
      <line x1="8" y1="34" x2="20" y2="34"/>
      <line x1="8" y1="46" x2="20" y2="46"/>
      <line x1="8" y1="58" x2="20" y2="58"/>
    </g>
    <rect x="4" y="0" width="4" height="64" fill="#8a7e60" stroke="#2a2418" stroke-width="1"/>
    <line x1="10" y1="2" x2="10" y2="62" stroke="#fff4c8" stroke-width="0.8" opacity="0.6"/>
  </g>
</svg>
