<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 256" width="512" height="256" shape-rendering="crispEdges">
  <rect width="512" height="256" fill="#1a1a22"/>
  <!-- outer wood frame (each "pixel" = 8px) -->
  <!-- top + bottom thick wood bars -->
  <g fill="#6a3a14">
    <rect x="16" y="16" width="480" height="24"/>
    <rect x="16" y="216" width="480" height="24"/>
    <rect x="16" y="16" width="24" height="224"/>
    <rect x="472" y="16" width="24" height="224"/>
  </g>
  <!-- wood highlight (top) -->
  <g fill="#8a5a20">
    <rect x="16" y="16" width="480" height="8"/>
    <rect x="16" y="16" width="8" height="224"/>
  </g>
  <!-- wood shadow (bottom) -->
  <g fill="#4a2408">
    <rect x="16" y="232" width="480" height="8"/>
    <rect x="488" y="16" width="8" height="224"/>
  </g>
  <!-- wood grain lines -->
  <g fill="#4a2408">
    <rect x="48" y="24" width="32" height="2"/><rect x="120" y="24" width="48" height="2"/>
    <rect x="200" y="24" width="32" height="2"/><rect x="280" y="24" width="56" height="2"/>
    <rect x="380" y="24" width="40" height="2"/>
    <rect x="48" y="228" width="40" height="2"/><rect x="160" y="228" width="64" height="2"/>
    <rect x="300" y="228" width="48" height="2"/><rect x="400" y="228" width="40" height="2"/>
  </g>
  <!-- iron corner plates (pixelated) -->
  <g fill="#5a5a62">
    <rect x="16" y="16" width="32" height="32"/>
    <rect x="464" y="16" width="32" height="32"/>
    <rect x="16" y="208" width="32" height="32"/>
    <rect x="464" y="208" width="32" height="32"/>
  </g>
  <g fill="#8a8a92">
    <rect x="16" y="16" width="32" height="8"/>
    <rect x="464" y="16" width="32" height="8"/>
    <rect x="16" y="208" width="32" height="8"/>
    <rect x="464" y="208" width="32" height="8"/>
    <rect x="16" y="16" width="8" height="32"/>
    <rect x="464" y="16" width="8" height="32"/>
    <rect x="16" y="208" width="8" height="32"/>
    <rect x="464" y="208" width="8" height="32"/>
  </g>
  <!-- rivets -->
  <g fill="#2a2a32">
    <rect x="24" y="24" width="8" height="8"/>
    <rect x="480" y="24" width="8" height="8"/>
    <rect x="24" y="216" width="8" height="8"/>
    <rect x="480" y="216" width="8" height="8"/>
  </g>
  <g fill="#b8b8c2">
    <rect x="24" y="24" width="4" height="4"/>
    <rect x="480" y="24" width="4" height="4"/>
    <rect x="24" y="216" width="4" height="4"/>
    <rect x="480" y="216" width="4" height="4"/>
  </g>
  <!-- inner parchment/dark panel -->
  <rect x="48" y="48" width="416" height="160" fill="#2a2230"/>
  <!-- inner double line -->
  <rect x="56" y="56" width="400" height="144" fill="none" stroke="#f0ecdc" stroke-width="2"/>
  <rect x="62" y="62" width="388" height="132" fill="none" stroke="#8a8a92" stroke-width="1"/>
  <!-- HP/MP pixel bar sample -->
  <g>
    <rect x="80" y="80" width="160" height="16" fill="#2a1a08" stroke="#f0ecdc" stroke-width="1"/>
    <rect x="82" y="82" width="120" height="12" fill="#c42020"/>
    <rect x="82" y="82" width="120" height="4" fill="#ff6a6a"/>
    <rect x="80" y="104" width="160" height="16" fill="#2a1a08" stroke="#f0ecdc" stroke-width="1"/>
    <rect x="82" y="106" width="96" height="12" fill="#2a5ac8"/>
    <rect x="82" y="106" width="96" height="4" fill="#6aaaff"/>
  </g>
  <!-- gold coin icon pixel -->
  <g transform="translate(300,84)">
    <rect x="0" y="4" width="24" height="16" fill="#f4d42a"/>
    <rect x="4" y="0" width="16" height="24" fill="#f4d42a"/>
    <rect x="4" y="4" width="16" height="4" fill="#fff8a8"/>
    <rect x="8" y="8" width="8" height="8" fill="#c48a10"/>
  </g>
  <text x="340" y="102" font-family="monospace" font-size="16" fill="#f4d42a">x 128</text>
  <text x="256" y="160" text-anchor="middle" font-family="monospace" font-size="22" fill="#f0ecdc">INVENTORY</text>
  <text x="256" y="184" text-anchor="middle" font-family="monospace" font-size="12" fill="#8a8a92">press [I] to close</text>
  <text x="256" y="252" text-anchor="middle" font-family="monospace" font-size="10" fill="#f0ecdc">pixel_unified · ui_frame</text>
</svg>
