<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" shape-rendering="crispEdges">
  <!-- 16x16 grid, each "pixel" = 16x16 -->
  <!-- grass base -->
  <g>
    <!-- row by row approximation of a 16x16 tile expanded 16x -->
    <!-- For demo: draw clusters using rect tiles -->
  </g>
  <!-- simple 16 colors palette grass/dirt/stone -->
  <g>
    <!-- grass (rows 0..7) -->
    <rect x="0" y="0" width="256" height="128" fill="#5a9c3c"/>
    <!-- dirt patch (rows 6..11) -->
    <rect x="64" y="96" width="144" height="80" fill="#a87a4a"/>
    <!-- stone path (rows 10..15) -->
    <rect x="0" y="176" width="256" height="80" fill="#8a8a92"/>
    <!-- transitions: grass->dirt scatter -->
    <g fill="#5a9c3c">
      <rect x="48" y="96" width="16" height="16"/><rect x="80" y="96" width="16" height="16"/>
      <rect x="112" y="96" width="16" height="16"/><rect x="144" y="96" width="16" height="16"/>
      <rect x="192" y="96" width="16" height="16"/>
    </g>
    <g fill="#a87a4a">
      <rect x="32" y="112" width="16" height="16"/><rect x="208" y="112" width="16" height="16"/>
    </g>
    <!-- dirt->stone edge -->
    <g fill="#a87a4a">
      <rect x="16" y="176" width="16" height="16"/><rect x="64" y="176" width="16" height="16"/>
      <rect x="112" y="176" width="16" height="16"/><rect x="176" y="176" width="16" height="16"/>
      <rect x="224" y="176" width="16" height="16"/>
    </g>
    <!-- grass shading dots -->
    <g fill="#3a7424">
      <rect x="16" y="16" width="8" height="8"/><rect x="80" y="32" width="8" height="8"/>
      <rect x="160" y="16" width="8" height="8"/><rect x="200" y="56" width="8" height="8"/>
      <rect x="40" y="72" width="8" height="8"/><rect x="232" y="80" width="8" height="8"/>
    </g>
    <g fill="#7cc44c">
      <rect x="32" y="40" width="8" height="8"/><rect x="120" y="24" width="8" height="8"/>
      <rect x="184" y="72" width="8" height="8"/><rect x="48" y="56" width="8" height="8"/>
    </g>
    <!-- flowers -->
    <g>
      <rect x="96" y="48" width="8" height="8" fill="#e42e2e"/><rect x="96" y="40" width="8" height="8" fill="#fff060"/>
      <rect x="216" y="24" width="8" height="8" fill="#fff060"/>
    </g>
    <!-- dirt pebbles -->
    <g fill="#6a4a2a">
      <rect x="96" y="128" width="8" height="8"/><rect x="176" y="144" width="8" height="8"/>
      <rect x="128" y="152" width="8" height="8"/>
    </g>
    <g fill="#d4a878">
      <rect x="104" y="128" width="8" height="8"/><rect x="184" y="144" width="8" height="8"/>
    </g>
    <!-- stone cracks -->
    <g fill="#5a5a62">
      <rect x="32" y="208" width="24" height="8"/><rect x="96" y="216" width="16" height="8"/>
      <rect x="152" y="200" width="24" height="8"/><rect x="216" y="224" width="16" height="8"/>
    </g>
    <g fill="#b0b0b8">
      <rect x="24" y="200" width="8" height="8"/><rect x="120" y="208" width="8" height="8"/>
      <rect x="200" y="216" width="8" height="8"/>
    </g>
  </g>
  <text x="128" y="250" text-anchor="middle" font-family="monospace" font-size="10" fill="#1a1a1a">pixel_unified · terrain</text>
</svg>
