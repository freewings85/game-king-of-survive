<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" shape-rendering="crispEdges">
  <rect width="256" height="256" fill="#3a6a2a"/>
  <!-- grass specks (pixel) -->
  <g fill="#2a5020">
    <rect x="16" y="24" width="8" height="8"/><rect x="80" y="48" width="8" height="8"/>
    <rect x="200" y="40" width="8" height="8"/><rect x="224" y="200" width="8" height="8"/>
    <rect x="40" y="200" width="8" height="8"/><rect x="160" y="232" width="8" height="8"/>
  </g>

  <!-- shadow -->
  <g fill="#000" opacity="0.35">
    <rect x="96" y="216" width="64" height="8"/>
    <rect x="104" y="208" width="48" height="8"/>
  </g>

  <!-- ARCHER (16x16 expanded 8x → 128x128 centered) -->
  <!-- 16px grid, pixel = 8px; offset 64,64 -->
  <g transform="translate(64,64)">
    <!-- hooded green cloak silhouette -->
    <!-- row 0 (hood top) -->
    <g fill="#2a4a1a">
      <rect x="48" y="0" width="32" height="8"/>
      <rect x="40" y="8" width="48" height="8"/>
    </g>
    <!-- skin face -->
    <g fill="#e8c49a">
      <rect x="48" y="16" width="32" height="16"/>
    </g>
    <!-- hood sides -->
    <g fill="#2a4a1a">
      <rect x="40" y="16" width="8" height="24"/>
      <rect x="80" y="16" width="8" height="24"/>
      <rect x="40" y="40" width="48" height="8"/>
    </g>
    <!-- eyes -->
    <g fill="#1a1a1a">
      <rect x="56" y="24" width="4" height="4"/>
      <rect x="68" y="24" width="4" height="4"/>
    </g>
    <!-- green tunic body -->
    <g fill="#4a8a2a">
      <rect x="32" y="48" width="64" height="40"/>
    </g>
    <!-- brown belt -->
    <g fill="#6a3a14">
      <rect x="32" y="72" width="64" height="8"/>
    </g>
    <!-- quiver strap -->
    <g fill="#3a2a12">
      <rect x="56" y="48" width="8" height="40" transform="rotate(20 60 68)"/>
    </g>
    <!-- legs (dark green pants) -->
    <g fill="#1a3a10">
      <rect x="40" y="88" width="20" height="24"/>
      <rect x="68" y="88" width="20" height="24"/>
    </g>
    <!-- boots -->
    <g fill="#2a1a08">
      <rect x="40" y="108" width="20" height="8"/>
      <rect x="68" y="108" width="20" height="8"/>
    </g>
    <!-- LONGBOW across body -->
    <g fill="#8a5a1a">
      <rect x="16" y="8" width="4" height="112"/>
    </g>
    <g fill="#c88838">
      <rect x="20" y="8" width="2" height="112"/>
    </g>
    <!-- bowstring -->
    <g fill="#f0ecdc">
      <rect x="14" y="8" width="2" height="112"/>
    </g>
    <!-- bow tips curl -->
    <g fill="#8a5a1a">
      <rect x="20" y="0" width="4" height="8"/>
      <rect x="20" y="120" width="4" height="8"/>
    </g>
    <!-- quiver on back with arrows -->
    <g fill="#5a3a14">
      <rect x="96" y="48" width="12" height="32"/>
    </g>
    <g fill="#c8a868"><rect x="100" y="40" width="2" height="12"/><rect x="104" y="40" width="2" height="12"/></g>
    <g fill="#e84a2a"><rect x="98" y="36" width="6" height="4"/><rect x="102" y="36" width="6" height="4"/></g>
  </g>

  <text x="128" y="250" text-anchor="middle" font-family="monospace" font-size="10" fill="#f0ecdc">pixel_unified · archer</text>
</svg>
