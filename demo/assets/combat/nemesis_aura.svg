<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160">
  <!-- Nemesis burning aura. 160×160. Anchor = center (80, 80) drawn under feet.
       Pulsing red halo + 12 flame tongues + rotating outer ring.
       Developer draws this on ground below nemesis, z-order just above tiles.
  -->
  <defs>
    <radialGradient id="auraCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#ffea80" stop-opacity="0.9"/>
      <stop offset="35%" stop-color="#ff6a2a" stop-opacity="0.65"/>
      <stop offset="70%" stop-color="#c41a0a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#5a0a02" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="flame" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%"  stop-color="#c41a0a"/>
      <stop offset="50%" stop-color="#ff6a2a"/>
      <stop offset="100%" stop-color="#fff4a0"/>
    </linearGradient>
  </defs>

  <!-- slow rotating outer glow ring -->
  <g>
    <circle cx="80" cy="80" r="60" fill="none" stroke="#c41a0a" stroke-width="3" stroke-dasharray="16 10" opacity="0.7">
      <animateTransform attributeName="transform" type="rotate" from="0 80 80" to="360 80 80" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.55;0.95;0.55" dur="1.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- pulsing core halo -->
  <circle cx="80" cy="80" r="58" fill="url(#auraCore)">
    <animate attributeName="r" values="52;66;52" dur="1.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;1;0.8" dur="1.4s" repeatCount="indefinite"/>
  </circle>

  <!-- 12 flame tongues around perimeter -->
  <g stroke="#3a0a02" stroke-width="1.2" stroke-linejoin="round">
    <g transform="rotate(0 80 80)">
      <g transform="translate(80,30)">
        <path d="M-5 16 Q-3 4 0 -8 Q3 4 5 16 Z" fill="url(#flame)"/>
      </g>
    </g>
    <g transform="rotate(30 80 80)"><g transform="translate(80,30)"><path d="M-5 16 Q-3 4 0 -8 Q3 4 5 16 Z" fill="url(#flame)"/></g></g>
    <g transform="rotate(60 80 80)"><g transform="translate(80,30)"><path d="M-5 16 Q-3 4 0 -8 Q3 4 5 16 Z" fill="url(#flame)"/></g></g>
    <g transform="rotate(90 80 80)"><g transform="translate(80,30)"><path d="M-5 16 Q-3 4 0 -8 Q3 4 5 16 Z" fill="url(#flame)"/></g></g>
    <g transform="rotate(120 80 80)"><g transform="translate(80,30)"><path d="M-5 16 Q-3 4 0 -8 Q3 4 5 16 Z" fill="url(#flame)"/></g></g>
    <g transform="rotate(150 80 80)"><g transform="translate(80,30)"><path d="M-5 16 Q-3 4 0 -8 Q3 4 5 16 Z" fill="url(#flame)"/></g></g>
    <g transform="rotate(180 80 80)"><g transform="translate(80,30)"><path d="M-5 16 Q-3 4 0 -8 Q3 4 5 16 Z" fill="url(#flame)"/></g></g>
    <g transform="rotate(210 80 80)"><g transform="translate(80,30)"><path d="M-5 16 Q-3 4 0 -8 Q3 4 5 16 Z" fill="url(#flame)"/></g></g>
    <g transform="rotate(240 80 80)"><g transform="translate(80,30)"><path d="M-5 16 Q-3 4 0 -8 Q3 4 5 16 Z" fill="url(#flame)"/></g></g>
    <g transform="rotate(270 80 80)"><g transform="translate(80,30)"><path d="M-5 16 Q-3 4 0 -8 Q3 4 5 16 Z" fill="url(#flame)"/></g></g>
    <g transform="rotate(300 80 80)"><g transform="translate(80,30)"><path d="M-5 16 Q-3 4 0 -8 Q3 4 5 16 Z" fill="url(#flame)"/></g></g>
    <g transform="rotate(330 80 80)"><g transform="translate(80,30)"><path d="M-5 16 Q-3 4 0 -8 Q3 4 5 16 Z" fill="url(#flame)"/></g></g>
    <!-- all 12 flames pulse together -->
    <animate attributeName="opacity" values="0.7;1;0.7" dur="0.8s" repeatCount="indefinite"/>
  </g>

  <!-- central skull warning mark -->
  <g transform="translate(80,80)">
    <circle r="14" fill="#1a0604" stroke="#c41a0a" stroke-width="2"/>
    <g stroke="#fff8d0" stroke-width="1" fill="#fff8d0">
      <ellipse cx="0" cy="-2" rx="8" ry="7"/>
      <circle cx="-3" cy="-2" r="1.8" fill="#1a0604"/>
      <circle cx="3" cy="-2" r="1.8" fill="#1a0604"/>
      <rect x="-3" y="5" width="1.5" height="3"/>
      <rect x="-0.5" y="5" width="1.5" height="3"/>
      <rect x="2" y="5" width="1.5" height="3"/>
    </g>
    <animateTransform attributeName="transform" type="rotate" values="-3 0 0; 3 0 0; -3 0 0" dur="0.4s" repeatCount="indefinite" additive="sum"/>
  </g>
</svg>
