<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 256" width="512" height="256">
  <defs>
    <linearGradient id="iwScroll" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4ecd8"/>
      <stop offset="50%" stop-color="#e4d4a8"/>
      <stop offset="100%" stop-color="#c8b070"/>
    </linearGradient>
    <linearGradient id="iwRod" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2a1a"/>
      <stop offset="50%" stop-color="#1a0e04"/>
      <stop offset="100%" stop-color="#3a2a1a"/>
    </linearGradient>
    <filter id="iwBleed" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>
  <rect width="512" height="256" fill="#2a1a10"/>
  <!-- hanging scroll (kakemono) -->
  <!-- top rod -->
  <rect x="20" y="24" width="472" height="14" fill="url(#iwRod)" stroke="#0a0402" stroke-width="1.5" rx="4"/>
  <circle cx="20" cy="31" r="8" fill="#2a1a0a" stroke="#0a0402"/>
  <circle cx="492" cy="31" r="8" fill="#2a1a0a" stroke="#0a0402"/>
  <!-- silk ribbons -->
  <path d="M60 24 L56 12 L68 10 L64 24 Z" fill="#c41a1a" stroke="#6a0a0a" stroke-width="1"/>
  <path d="M448 24 L452 12 L440 10 L444 24 Z" fill="#c41a1a" stroke="#6a0a0a" stroke-width="1"/>
  <!-- paper -->
  <rect x="40" y="38" width="432" height="180" fill="url(#iwScroll)" stroke="#6a4a20" stroke-width="1.5"/>
  <!-- paper grain -->
  <g opacity="0.15" fill="#3a2a14">
    <rect x="60" y="60" width="2" height="140"/><rect x="120" y="50" width="2" height="160"/>
    <rect x="200" y="55" width="2" height="150"/><rect x="320" y="48" width="2" height="160"/>
    <rect x="420" y="60" width="2" height="140"/>
  </g>
  <!-- stains -->
  <ellipse cx="100" cy="70" rx="20" ry="5" fill="#8a6a3a" opacity="0.25"/>
  <ellipse cx="400" cy="190" rx="24" ry="6" fill="#8a6a3a" opacity="0.25"/>
  <!-- ink border stroke (hand-drawn) -->
  <rect x="60" y="56" width="392" height="144" fill="none" stroke="#1a1a1a" stroke-width="2" filter="url(#iwBleed)"/>
  <rect x="64" y="60" width="384" height="136" fill="none" stroke="#1a1a1a" stroke-width="0.6"/>
  <!-- bottom rod -->
  <rect x="20" y="218" width="472" height="14" fill="url(#iwRod)" stroke="#0a0402" stroke-width="1.5" rx="4"/>
  <circle cx="20" cy="225" r="8" fill="#2a1a0a" stroke="#0a0402"/>
  <circle cx="492" cy="225" r="8" fill="#2a1a0a" stroke="#0a0402"/>
  <!-- ink calligraphy title -->
  <text x="256" y="110" text-anchor="middle" font-family="serif" font-size="40" fill="#1a1a1a" font-weight="bold" letter-spacing="18">武 道 場</text>
  <text x="256" y="150" text-anchor="middle" font-family="serif" font-size="14" fill="#3a2a14" font-style="italic">— Inventory of the Ronin —</text>
  <!-- red seal -->
  <g transform="translate(430,180)">
    <rect x="-14" y="-14" width="28" height="28" fill="#c41a1a" stroke="#6a0a0a" stroke-width="1.5"/>
    <text x="0" y="6" text-anchor="middle" font-family="serif" font-size="16" fill="#f4ecd8" font-weight="bold">印</text>
  </g>
  <!-- bamboo stroke decoration -->
  <g stroke="#1a3a18" stroke-width="2.5" fill="none" stroke-linecap="round">
    <path d="M90 170 L94 110"/>
    <path d="M90 140 L82 130"/>
    <path d="M94 120 L104 112"/>
  </g>
  <text x="256" y="250" text-anchor="middle" font-family="serif" font-size="10" fill="#f4ecd8">ink_wash · ui_frame</text>
</svg>
