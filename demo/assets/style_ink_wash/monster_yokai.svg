<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <radialGradient id="iwYBg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#e4dcc4"/>
      <stop offset="100%" stop-color="#a89878"/>
    </radialGradient>
  </defs>
  <rect width="256" height="256" fill="url(#iwYBg)"/>
  <!-- ink smoke puddle under -->
  <ellipse cx="128" cy="215" rx="68" ry="14" fill="#1a1a1a" opacity="0.5"/>
  <path d="M60 200 Q80 225 100 210 Q120 230 140 215 Q160 235 180 215 Q200 230 220 205" stroke="#1a1a1a" stroke-width="2" fill="none" opacity="0.6"/>

  <!-- YOKAI (demon mask oni, top-down) -->
  <!-- tattered dark kimono -->
  <path d="M74 130 Q128 115 182 130 Q186 210 128 220 Q70 210 74 130 Z" fill="#1a1a1a"/>
  <path d="M88 200 L78 225 M104 210 L100 230 M128 215 L128 234 M152 210 L156 230 M168 200 L178 225" stroke="#1a1a1a" stroke-width="2.5" fill="none"/>
  <!-- gray body wash -->
  <path d="M100 140 Q128 128 156 140 L160 190 Q128 200 96 190 Z" fill="#6a5a4a" opacity="0.9"/>
  <!-- red oni face -->
  <path d="M102 90 Q128 70 154 90 Q158 120 128 128 Q98 120 102 90 Z" fill="#c41a1a" stroke="#2a0404" stroke-width="2.5"/>
  <!-- horns -->
  <path d="M106 86 L98 60 L112 82 Z" fill="#f4ecd8" stroke="#1a1a1a" stroke-width="1.5"/>
  <path d="M150 86 L158 60 L144 82 Z" fill="#f4ecd8" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- furious eyes -->
  <path d="M110 96 Q118 92 122 100" stroke="#1a1a1a" stroke-width="2" fill="#fff060"/>
  <circle cx="118" cy="98" r="2" fill="#1a1a1a"/>
  <path d="M134 100 Q138 92 146 96" stroke="#1a1a1a" stroke-width="2" fill="#fff060"/>
  <circle cx="138" cy="98" r="2" fill="#1a1a1a"/>
  <!-- fanged grin -->
  <path d="M110 114 Q128 126 146 114 L144 118 Q128 128 112 118 Z" fill="#1a1a1a"/>
  <polygon points="116,116 120,126 122,116" fill="#f4ecd8"/>
  <polygon points="136,116 138,126 142,116" fill="#f4ecd8"/>
  <!-- naginata (polearm ink stroke) -->
  <g>
    <line x1="40" y1="50" x2="220" y2="160" stroke="#1a1a1a" stroke-width="3"/>
    <path d="M24 38 L48 58 L36 62 Q28 52 24 38 Z" fill="#1a1a1a"/>
    <line x1="30" y1="44" x2="44" y2="54" stroke="#f4ecd8" stroke-width="1"/>
  </g>
  <!-- red seal -->
  <g transform="translate(220,30)">
    <rect x="-10" y="-10" width="20" height="20" fill="#c41a1a" stroke="#8a0a0a" stroke-width="1"/>
    <text x="0" y="4" text-anchor="middle" font-family="serif" font-size="12" fill="#f4ecd8" font-weight="bold">鬼</text>
  </g>
  <text x="128" y="250" text-anchor="middle" font-family="serif" font-size="10" fill="#3a2a14">ink_wash · yokai</text>
</svg>
