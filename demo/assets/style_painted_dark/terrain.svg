<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <radialGradient id="pdVign" cx="50%" cy="50%" r="70%">
      <stop offset="60%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.55"/>
    </radialGradient>
    <pattern id="pdNoise" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="#3a2a1e"/>
      <circle cx="1.5" cy="1.5" r="0.6" fill="#281a11" opacity="0.7"/>
      <circle cx="4.5" cy="4.5" r="0.4" fill="#4a3324" opacity="0.5"/>
    </pattern>
  </defs>
  <!-- deep earth base -->
  <rect width="256" height="256" fill="url(#pdNoise)"/>
  <!-- cracked stone slab (diablo-ish) -->
  <g opacity="0.95">
    <polygon points="40,50 120,40 135,130 50,140" fill="#55443a" stroke="#1a120c" stroke-width="2"/>
    <polygon points="135,130 220,120 210,210 125,220" fill="#50403a" stroke="#1a120c" stroke-width="2"/>
    <polygon points="120,40 200,55 220,120 135,130" fill="#4c3b34" stroke="#1a120c" stroke-width="2"/>
    <polygon points="40,140 125,135 125,220 45,210" fill="#4a3a32" stroke="#1a120c" stroke-width="2"/>
    <!-- cracks -->
    <path d="M70 80 L110 90 L118 120" stroke="#1a120c" stroke-width="1.5" fill="none"/>
    <path d="M160 70 L175 100 L205 110" stroke="#1a120c" stroke-width="1.5" fill="none"/>
    <path d="M80 165 L100 195" stroke="#1a120c" stroke-width="1.2" fill="none"/>
  </g>
  <!-- mossy edge (grass transition) -->
  <g>
    <path d="M0 0 Q40 25 90 10 T180 20 T256 0 L256 0 L0 0 Z" fill="#2d3a1e"/>
    <path d="M0 0 Q40 20 90 6 T180 14 T256 0 L256 0 L0 0 Z" fill="#3d4f22"/>
    <circle cx="30" cy="10" r="2" fill="#5a7a2e"/>
    <circle cx="70" cy="15" r="2" fill="#5a7a2e"/>
    <circle cx="140" cy="12" r="2" fill="#5a7a2e"/>
    <circle cx="210" cy="14" r="2" fill="#5a7a2e"/>
  </g>
  <!-- dried blood / rust stain -->
  <ellipse cx="180" cy="170" rx="28" ry="10" fill="#5c1a14" opacity="0.55"/>
  <ellipse cx="65" cy="110" rx="18" ry="6" fill="#5c1a14" opacity="0.35"/>
  <!-- vignette -->
  <rect width="256" height="256" fill="url(#pdVign)"/>
  <text x="128" y="246" text-anchor="middle" font-family="serif" font-size="10" fill="#8b6a4a">painted_dark · terrain</text>
</svg>
