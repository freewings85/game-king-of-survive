<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 256" width="512" height="256">
  <defs>
    <linearGradient id="pdLeather" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a2a1a"/>
      <stop offset="50%" stop-color="#3a1e10"/>
      <stop offset="100%" stop-color="#1e0e08"/>
    </linearGradient>
    <radialGradient id="pdStud" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#d4b47a"/>
      <stop offset="60%" stop-color="#8a6a3a"/>
      <stop offset="100%" stop-color="#2a1a0a"/>
    </radialGradient>
    <pattern id="pdInner" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#1a0f08"/>
      <circle cx="2" cy="2" r="0.7" fill="#2a1a0e"/>
    </pattern>
  </defs>
  <rect width="512" height="256" fill="#08060a"/>
  <!-- outer leather band -->
  <rect x="8" y="8" width="496" height="240" rx="14" fill="url(#pdLeather)" stroke="#000" stroke-width="2"/>
  <!-- inner engraved area -->
  <rect x="32" y="32" width="448" height="192" rx="8" fill="url(#pdInner)" stroke="#8a6a3a" stroke-width="2"/>
  <!-- corner iron plates -->
  <g fill="#3a2a1e" stroke="#000" stroke-width="2">
    <path d="M8 8 L64 8 L64 24 Q38 24 24 64 L8 64 Z"/>
    <path d="M504 8 L448 8 L448 24 Q474 24 488 64 L504 64 Z"/>
    <path d="M8 248 L64 248 L64 232 Q38 232 24 192 L8 192 Z"/>
    <path d="M504 248 L448 248 L448 232 Q474 232 488 192 L504 192 Z"/>
  </g>
  <!-- brass studs -->
  <g>
    <circle cx="24" cy="24" r="6" fill="url(#pdStud)"/>
    <circle cx="488" cy="24" r="6" fill="url(#pdStud)"/>
    <circle cx="24" cy="232" r="6" fill="url(#pdStud)"/>
    <circle cx="488" cy="232" r="6" fill="url(#pdStud)"/>
    <circle cx="256" cy="16" r="5" fill="url(#pdStud)"/>
    <circle cx="256" cy="240" r="5" fill="url(#pdStud)"/>
    <circle cx="128" cy="16" r="4" fill="url(#pdStud)"/>
    <circle cx="384" cy="16" r="4" fill="url(#pdStud)"/>
    <circle cx="128" cy="240" r="4" fill="url(#pdStud)"/>
    <circle cx="384" cy="240" r="4" fill="url(#pdStud)"/>
  </g>
  <!-- top skull emblem -->
  <g transform="translate(256,22)">
    <ellipse cx="0" cy="0" rx="14" ry="12" fill="#d4c19a" stroke="#1a0604" stroke-width="1.5"/>
    <ellipse cx="-5" cy="-1" rx="2.5" ry="3" fill="#1a0604"/>
    <ellipse cx="5" cy="-1" rx="2.5" ry="3" fill="#1a0604"/>
    <polygon points="0,4 -3,9 3,9" fill="#1a0604"/>
  </g>
  <text x="256" y="140" text-anchor="middle" font-family="serif" font-size="22" fill="#c8a66a" font-style="italic">— INVENTORY —</text>
  <text x="256" y="246" text-anchor="middle" font-family="serif" font-size="10" fill="#8b6a4a">painted_dark · ui_frame</text>
</svg>
