<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>V03 Engine Demo</title>
<link rel="stylesheet" href="/frontend/engine-demo/styles.css">
</head>
<body>
<main class="demo-shell">
  <canvas id="engineCanvas"></canvas>
  <div class="top-hud">
    <div class="avatar" id="avatarMark">
      <span>T</span>
    </div>
    <div class="bars">
      <div class="name" id="className">Tech Engineer</div>
      <div class="hp"><i id="hpFill"></i></div>
      <div class="xp"><i id="xpFill"></i></div>
    </div>
    <div class="survive" id="aliveText">ALIVE 18</div>
  </div>
  <div class="level-badge" id="levelBadge">LV 1</div>
  <div class="storm-badge" id="stormBadge">ZONE 01:40</div>
  <div class="mini-map" id="miniMap" aria-hidden="true">
    <i class="zone" id="miniZone"></i>
    <i class="dot player" id="miniPlayer"></i>
    <i class="dot rival" id="miniRival"></i>
    <i class="dot zombie z1"></i>
    <i class="dot zombie z2"></i>
    <i class="dot zombie z3"></i>
    <i class="dot loot l1"></i>
    <i class="dot loot l2"></i>
  </div>
  <div class="utility-stack" aria-hidden="true">
    <i class="gear-dot"></i>
    <i class="team-dot"></i>
    <i class="bag-dot"></i>
  </div>
  <div class="move-stick" id="moveStick"><i></i></div>
  <div class="skill-panel" id="skillPanel">
    <button class="skill blue active" data-skill="arc"><i></i><span>ARC</span></button>
    <button class="skill orange" data-skill="boom"><i></i><span>BOOM</span></button>
    <button class="skill gold" data-skill="fan"><i></i><span>FAN</span></button>
  </div>
  <div class="class-strip">
    <div class="class-card active" id="activeClassCard">
      <strong>Tech Engineer</strong>
      <span>Chain / burst control</span>
    </div>
    <div class="skin-row" id="skinRow"><i></i><i></i><i></i></div>
    <div class="class-buttons" id="classButtons">
      <button data-class="guardian">G</button>
      <button data-class="tech" class="active">T</button>
      <button data-class="ranger">R</button>
    </div>
  </div>
  <section class="class-showcase" id="classShowcase" aria-hidden="true">
    <div class="showcase-mark" id="showcaseMark">T</div>
    <div class="showcase-copy">
      <strong id="showcaseTitle">Tech Engineer</strong>
      <span id="showcaseRole">Chain / burst control</span>
    </div>
    <div class="showcase-skins" id="showcaseSkins"><i></i><i></i><i></i></div>
    <div class="showcase-thumbs" id="showcaseThumbs">
      <i><b></b></i>
      <i><b></b></i>
      <i><b></b></i>
    </div>
    <div class="showcase-skills">
      <i class="arc"></i>
      <i class="boom"></i>
      <i class="fan"></i>
    </div>
  </section>
</main>
<script src="/frontend/src/v03-runtime-config.js"></script>
<script src="/frontend/src/map-contract.js"></script>
<script type="module" src="/frontend/engine-demo/app.js"></script>
</body>
</html>
