<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Zombie BR V03 Framework</title>
<link rel="stylesheet" href="/frontend/v03-shell/styles.css">
</head>
<body>
<main class="shell">
  <section class="classes panel">
    <div class="sectionHead">
      <span class="kicker">Classes & Skins</span>
      <h1>Zombie BR V03 Framework</h1>
    </div>
    <div class="classGrid" id="classGrid"></div>
  </section>

  <section class="combat panel">
    <div class="sectionHead compact">
      <span class="kicker">Combat Language</span>
      <h2>Weapon Patterns & Horde Readability</h2>
    </div>
    <div class="combatShots">
      <canvas id="shotScatter" width="420" height="220"></canvas>
      <canvas id="shotPierce" width="420" height="220"></canvas>
      <canvas id="shotBlast" width="420" height="220"></canvas>
      <canvas id="shotChain" width="420" height="220"></canvas>
    </div>
  </section>

  <section class="skills panel">
    <div class="sectionHead compact">
      <span class="kicker">Skill Cards</span>
      <h2>Upgradeable Skill Cards</h2>
    </div>
    <div class="skillCards" id="skillCards"></div>
  </section>

  <section class="phoneWrap">
    <div class="phone">
      <div class="notch"></div>
      <canvas id="phoneCanvas" width="900" height="520"></canvas>
      <div class="phoneHud">
        <div class="stick"><span></span></div>
        <button class="hudBtn purple" aria-label="闪电技能"></button>
        <button class="hudBtn orange" aria-label="弹幕技能"></button>
      </div>
    </div>
  </section>
</main>

<script src="/frontend/src/v03-runtime-config.js"></script>
<script src="/frontend/src/map-contract.js"></script>
<script src="/frontend/src/render/map.js"></script>
<script src="/frontend/src/render/props.js"></script>
<script src="/frontend/src/render/cards.js"></script>
<script src="/frontend/src/render/v03-scene.js"></script>
<script src="/frontend/v03-shell/app.js"></script>
</body>
</html>
